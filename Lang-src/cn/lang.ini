[Block.11660]
Name=蒙古文字补充（Mongolian Supplement）
Text=Birga 字符是从 [[ps:Tibt|藏文]] “泄露”到蒙古文中的，用作句首标记。蒙古文是竖排书写（从上到下），而藏文是横排书写（从左到右），因此无法直接使用藏文的“句首符号”。\nUnicode 慷慨地为其分配了真正的码位，而不是将其作为书写变体——但它位于辅助平面，而不是 [[pt:bmp|基本多文种平面]]。\n\n图标对应于竖排书写，而字体中的 [[pt:character|字形]] 则逆时针旋转了 90°。

[Block.11680]
