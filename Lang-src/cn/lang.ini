[Block.0C00]
Name=泰卢固文字（Telugu）

[Block.0C80]
Name=卡纳达文字（Kannada）

[Block.0D00]
Name=马拉雅拉姆文字（Malayalam）

[Block.0D80]
Name=僧伽罗文字（Sinhala）

[Block.0E00]
Name=泰文字（Thai）

[Block.0E80]
Name=老挝文字（Lao）

[Block.0F00]
Name=藏文字（Tibetan）

[Block.1000]
Name=缅甸文字（Myanmar）

[Block.10A0]
Name=格鲁吉亚文字（Georgian）

[Block.1100]
Name=谚文字母（Hangul Jamo）
Text=谚文（韩语字母）包含 51 个字母（音素）。该区块的容量要大得多：同一个字母在音节的开头和结尾会被编码为不同的字符，而且该区块还包含许多废弃的音素。\n\n初声（Choseong）是首字母，中声（Jungseong）是中间字母，终声（Jongseong）是尾字母。该区块的设计很简单：首字母与中声字母之间，以及中声字母与终声字母之间的间距为负值，因此两三个字母写在一起时会自动组合成一个音节。

[Block.1200]
Name=埃塞俄比亚文字（Ethiopic）

[Block.1380]
Name=埃塞俄比亚文字补充（Ethiopic Supplement）
Text=塞巴特贝特语（Sebat Bet）的字母 {{nspk|sgw}} 以及声调符号。

[Block.13A0]
Name=切罗基文字（Cherokee）

[Block.1400]
Name=统一加拿大原住民音节文字（Unified Canadian Aboriginal Syllabics）

[Block.1680]
Name=欧甘文字（Ogham）

[Block.16A0]
Name=卢恩文字（Runic）

[Block.1700]
Name=他加禄文字（Tagalog）

[Block.1720]
Name=哈努诺文字（Hanunoo）

[Block.1740]
Name=布希德文字（Buhid）

[Block.1760]
Name=塔格班瓦文字（Tagbanwa）

[Block.1780]
Name=高棉文字（Khmer）

[Block.1800]
Name=蒙古文字（Mongolian）

[Block.18B0]
Name=统一加拿大原住民音节文字扩展（Unified Canadian Aboriginal Syllabics Extended）
Text=用于克里语、奥及布韦语（阿尔冈昆语系）、卡里尔语（Carrier）和德内语（阿萨巴斯卡语系）的字母。

[Block.1900]
Name=林布文字（Limbu）

[Block.1950]
Name=德宏傣文字（Tai Le）

[Block.1980]
Name=西双版纳新傣文字（New Tai Lue）

[Block.19E0]
Name=高棉文符号（Khmer Symbols）
Text=该区块的第一个字符 {{sm|᧠}} 是佛教阴阳历中第八个月的名称（高棉语称 ''Asat'' 或 ''Băthámsath''，梵语称 ''Ashadha''，相当于公历的 6 月至 7 月）。为了防止历法与季节变化脱节，这个月份每隔两三年会重复出现两次（即闰月）。符号 17D3 {{sm|◌៓}} 曾一度被 [[pt:deprecated|弃用]] 而改用此字符，且在 Unicode {{vkhmer}} 中目前仍不推荐使用。\n\n其余字符则是阴历中从新月到满月再回到新月的日期名称。

[Block.1A00]
Name=布吉文字（Buginese）

[Block.1A20]
Name=西双版纳老傣文字（Tai Tham）

[Block.1AB0]
Name=组合附加记号扩展（Combining Diacritical Marks Extended）
Text=用于德语和苏格兰方言学。

[Block.1B00]
Name=巴厘文字（Balinese）

[Block.1B80]
Name=巽他文字（Sundanese）

[Block.1BC0]
Name=巴塔克文字（Batak）

[Block.1C00]
Name=雷布查文字（Lepcha）

[Block.1C50]
Name=桑塔利文字（Ol Chiki）

[Block.1C80]
Text=源自印刷版教会书籍的西里尔字母变体：时间跨度从弗朗齐歇克·斯卡雷纳的圣经（布拉格，1519 年，早于伊万·费奥多罗夫）到基辅洞窟修道院规程（1893 年）。\n\n合字 ТЬ 则源自 2013 年新版汉特语 {{nspk|kca}} 字母表。

[Block.1C90]
Name=格鲁吉亚文字扩展（Georgian Extended）
Text=Mtavruli 是标准格鲁吉亚字体 Mkhedruli 的大写形式。来自 [[pk:10A0|主区块]] 的大写字母被称为 Asomtavruli，目前被视为已废弃。\n\nMtavruli 通常用于高亮显示和标题，且长期以来被视为一种字体变体。然而，学者们发现了 19 世纪和 20 世纪初的文献，其中 Mkhedruli 和 Mtavruli 是混用的。此外，格鲁吉亚字体通常成对出现（Mkhedruli 和 Mtavruli），这不仅增加了日常工作的复杂性，而且在无法切换字体时会导致格鲁吉亚文本的表现力下降。联盟（Consortium）的字体排印专家迈克尔·埃弗森（Michael Everson）曾收到一份 8 位编码的《爱丽丝梦游仙境》译本，其中的“DRINK ME”（喝我）就是用 Mtavruli 字体输入的。\n\n如今，Unicode 将 Mkhedruli 和 Mtavruli 视为小写字母和大写字母的关系，只是其使用规则有所不同——即整个单词都需要大写。图标下方那条几乎看不见的双横线是一个编辑标记，代表大写字母。

[Block.1CC0]
Name=巽他文字补充（Sundanese Supplement）
Text=用于巽他语的历史标点符号。

[Block.1CD0]
Name=吠陀文字扩展（Vedic Extensions）
Text=用于 [[ps:Deva|天城文]] 及其他印度系文字的吠陀字符。那时的发音与现代发音有很大不同，这些字符主要是语音符号。\n\n部分符号在不同语言中形态各异。例如，1CF5 在天城文中看起来像沙漏，而在孟加拉文中则像十字。1CF6 在天城文中看起来像短音符 ˘，在孟加拉文中则像直立或倒置的小写欧米伽 ω。还有一种看起来像直立欧米伽叠在倒置欧米伽之上的字形曾在 Unicode 中存在过一段时间，但与其说见于原始文献，不如说更多见于研究资料中。

[Block.1D00]
Name=音标扩展（Phonetic Extensions）
Text=源自乌拉尔语音标、古爱尔兰语音记法、《牛津英语词典》以及美式和俄式语音记法的字符。

[Block.1D80]
Name=音标扩展补充（Phonetic Extensions Supplement）
Text=国际音标的专用形式和废弃形式。

[Block.1DC0]
Name=组合附加记号补充（Combining Diacritical Marks Supplement）
Text=乌拉尔语音标字符、中世纪缩写符号以及 Teuthonista（一种用于书写德语方言的系统）。

[Block.1E00]
Name=拉丁文字附加扩展（Latin Extended Additional）
Text=带有各种符号的 [[pt:precomposed|预组合]] 字符。其中九十个是越南语字符，大约十几个是中世纪字符，包括大写 Eszett '''ẞ'''。

[Block.1F00]
Name=希腊文字扩展（Greek Extended）
Text=古希腊语若干方言中存在的多调语音系统：\n* dasia（粗气符）：表示送气（增加 h 音）；\n* psili（柔气符）：表示不送气（没有那个 h 音）；\n* iota subscript（下标约塔）：表示含 i 的双元音；\n* oxia（锐音符）：表示高/升调；\n* varia（重音符）：表示平/低调；\n* circumflex（扬抑符/曲折符）：表示一个音节内的声调变化；\n* breve（短音符）：表示短元音（如果字母表本身未区分，如 ε/η 和 ο/ω 那样）；\n* macron（长音符）：表示长元音；\n* diaeresis（分音符）：表示元音分开发音。\n\n这套系统是在公元初期添加的，直到 1982 年才被废除，尽管如此复杂的语音系统已经不存在许多个世纪了。

[Block.2000]
Name=通用标点符号（General Punctuation）
Text=标点符号（源自拉丁语 punctum，意为“点”）是一套符号系统，用于表达话语的句法和语调，同时也指在文本中使用这些符号的规则。\n\n显然，基本的标点符号（句号、逗号、冒号……）已经被编码在 [[pt:ascii|ASCII]] 和 [[pt:latin1|Latin-1]] 中。而专门的标点符号区块则包含了用于精美文本排版的所谓“排版符号”。

[Block.2070]
Name=上标与下标（Superscripts and Subscripts）
Text=该区块包含用于数学和语音学的上标、下标字母、符号和数字。\n\n早在互联网出现之前，人们就意识到：盲目复制文本可能会导致阿伏伽德罗常数“等于” 6.022×1023。因为某些系统（文本文件、互联网论坛……）可能不支持上标格式，而且强迫人们使用更复杂的系统，或者使用“6.022e23”或“6.022×10^23”这样的模拟写法也并无意义。\n\n此外，字体排印师设计的上标通常比文字处理器自动生成的上标效果更好。\n\n许多重要的上标和下标位于其他区块：例如矩阵转置符号 Aᵀ 就在 [[pk:1D40|语音扩展]] 区块中。

[Block.20A0]
Name=货币符号（Currency Symbols）
Text=货币字符主要分为两大类。第一类是在 17 至 19 世纪随着商业语言的发展而出现的：如美元符号 {{sm| $ }}、英镑符号 {{sm|£}}、[[ps:Taml|泰米尔]]卢比符号 {{sm|௹}}。另一类则是 20 世纪后期以来由国家官方引入的：如欧元 {{sm|€}}、格里夫纳 {{sm|₴}}、卢布 {{sm|₽}}、卢比 {{sm|₹}}。\n\nParatype 公司在 2009 年预计俄罗斯卢布符号终有一天会被正式采纳，于是便用它填充了该区块的剩余部分。PT 系列字体质量上乘且广为流传，因此如果 2021 年的新符号已经“支持”了 ₽ 这个符号，你也不必感到惊讶。

[Block.20D0]
Name=符号用组合附加记号（Combining Diacritical Marks for Symbols）
Text=只要字体中包含[[pt:ligature|连字]]，这些字符几乎都能正常显示——例如 {{sm| 1⃣}}。「Unicodia」的作者不得不在字体编辑器中手动组装除三个以外的所有示例。

[Block.2100]
Name=字母式符号（Letterlike Symbols）
Text=于字母的数学、技术和商业符号。\n\n空心字（如 {{sm|ℕℤℚℝℂ}}）源于用粉笔书写的粗体字。它随着 Gunning 和 Rossi 于 1965 年出版的著名复分析教科书而广为流传。\n\n用于表示集合势（基数）的字符 {{sm|ℵ}} 是由格奥尔格·康托尔引入的。

[Block.2150]
Name=数字形式（Number Forms）
Text=预组合分数的形式和罗马数字。分数 {{sm|↉}} 用于棒球统计，{{sm|↊}} 和 {{sm|↋}} 用于十二进制记数法。\n\n有三个分数已经被编码在 [[pt:latin1|Latin-1]] 中。

[Block.2190]
Name=箭头（Arrows）
Text=箭头是用于指示方向的字符。以下是箭头的几种用途：\n* 用于标记按钮；\n* 用于路标、交通地图；\n* 在数学中——表示映射、推论、极限、向量、单调函数；\n* 在化学中——表示单向或双向反应、气体释放、沉淀。

[Block.2200]
Name=数学运算符（Mathematical Operators）
Text=最基础的数学符号：运算符、比较符号、积分号、集合论符号。数学符号体系历经数个世纪演变而成，因国家、数学领域甚至数学学派的不同而有所差异。例如，圆圈加号 {{smfunky|⊕}} 在形式逻辑中可能表示“异或”，而在数值方法中则表示“机器加法”。{{sm|≔}}、{{sm|≝}}、{{sm|≡}} 等符号则用于表示“定义上的等价”。

[Block.2300]
Name=杂项技术符号（Miscellaneous Technical）
Text=用于技术绘图、电子学、编程、牙科、诗歌、化学、光学、用户界面的符号。\n\n还包括用于计算机数学排版系统（如 MathType，即“微软公式编辑器”，以及 TᴇX，发音为“tech”）中的字符，主要用于构建多行括号。

[Block.2400]
Name=控制符图形（Control Pictures）
Text=[[pt:control|控制]] 字符本身没有图形显示。这个区块收集了用于显示控制字符的符号。对我们来说最重要的是表示 [[pt:space|空格]] 的字符 {{sm|␣}}。\n\n在其他区块中也存在一些控制字符的图形符号：{{sm|↵←⌫}}。

[Block.2440]
Name=光学字符识别符号（Optical Character Recognition）
Text=光学和磁性墨水字符识别技术主要用于自动文档录入，如护照、银行支票和交通票据。与条形码不同，这两种技术识别的字符既能被人眼读懂，也能被机器读取，从而减少欺诈行为。这两种技术都使用特殊的等宽字体。这些字体（有时经过扭曲变形处理）在赛博朋克题材的电影和电子游戏中被广泛使用。\n\n1956 年，美国展示了磁性墨水字符识别技术（MICR）。该系统能识别十个数字和四个用于标识字段含义的特殊字符。磁性识别比光学识别可靠得多。如果你看到一种方形字体，其部分竖笔画较粗（例如在“Magnavox Odyssey”游戏机的包装盒上）——这就是风格化的 MICR 字体。\n\n1968 年，美国推出了第一种可实用的光学识别技术 OCR-A。它能识别包含小写字母在内的完整 [[ps:Latn|拉丁]] 字母表。为了分隔字段，该技术使用了一些特殊字符：钩形、椅形、叉形、扣形和蝶形。这种字体出现在《13 小时：班加西的秘密士兵》、《罪恶黑名单》、《伪装者》、《漏洞》等电影中。\n\n直到 20 世纪 90 年代，不依赖特定字体的光学识别技术才被开发出来。它主要用于书籍数字化和问卷处理，但可靠性要低得多。因此，带有 OCR-B 字体机读页的外国护照并不算过时。

[Block.2460]
Name=包围式字母与数字符号（Enclosed Alphanumerics）
Text=根据英文维基百科，这些字符主要用于列表——即“一半是编号，一半是项目符号”。{{em|Ⓜ}} 被用作地铁/捷运的 [[pt:emoji|表情符号]]。

[Block.2500]
Name=制表符（Box Drawing）
Text=用于绘制方框的[[pt:pseudographics|伪图形]]元素。像所有伪图形一样，它们主要与等宽字体配合使用。\n\n[[po:IBM]] 兼容机拥有两种线条：单线和双线。Unicode 在此基础上增加了粗线、点线和粗点线。\n''[[po:BBC Master]]'' 计算机则有圆角。

[Block.2580]
Name=方块元素（Block Elements）
Text=用于实心填充的 [[pt:pseudographics|伪图形]] 元素。像所有伪图形一样，它们主要在等宽字体中使用。在比例字体中，IBM 的半填充符 {{sm|▀}}、阴影填充符 {{sm|░}} 等字符通常会被垂直拉伸，而来自 ZX{{_}}Spectrum 的四分之一填充符 {{sm|▚}} 则会变成正方形。在这个字体中——即 DejaVu 的开源分支——一切显示都是正确的。\n\n伪图形通常没有字符间距。\n\n来自旧式计算机的部分伪图形（例如 2×3 方块）在此处缺失，直到 2020 年才被 [[pk:1FB00|添加]] 进来。

[Block.25A0]
Name=几何形状（Geometric Shapes）
Text=几何图形用于按钮标记和用户界面的草图绘制。例如，''索尼 PlayStation'' 的四个按键 {{sm|🞩○△□}}——其中三个就取自这个区块。字符 {{sm|◌}} 在 Unicode 中用于展示 [[pt:combining|组合]] 标记。

[Block.2600]
Name=杂项符号（Miscellaneous Symbols）
Text=这个区块包含了 [[pt:emoji|表情符号]]，以及来自天文学、占星术、桌面游戏、东方神秘学、宗教、政治领域的字符，还有仅用于装饰印刷文本的符号。许多字符取自日本的 ARIB STD B24 编码标准，该标准用于数字电视广播中的新闻、天气和交通拥堵信息。

[Block.2700]
Name=印刷符号（Dingbats）
Text=一个著名的计算机前时代印刷装饰符号库——''赫尔曼·察普夫装饰符号''（1977 年）。它曾作为 PostScript 字体被广泛分发，并确保存在于每一个 PDF 阅读器中。该区块包含若干个 [[pc:VS16]] [[pt:emoji|表情符号]]。\n\n只有少数新的表情符号不是来自该库：它们是在 6.0 或更高版本中添加的，并且不使用 VS16。

[Block.27C0]
Text=一些用于几何学、形式逻辑、程序验证、数据库理论以及其他数学领域的字符。此外还包括西方的长除法符号（前苏联主要使用倒 T 形或直 L 形）。

[Block.27F0]
Text=十六种不同的数学和技术用箭头，主要为圆形和细长形。

[Block.2800]
Name=盲文点字（Braille Patterns）

[Block.2900]
Text=来自纽结理论的交叉箭头、鱼叉形箭头、曲线箭头以及其他符号。

[Block.2980]
Text=各种数学符号：括号、角、空集、箱线图……

[Block.2A00]
Name=补充数学运算符（Supplemental Mathematical Operators）
Text=来自微积分、复变函数分析、Z 记号、数据库理论、控制理论、形式逻辑以及其他数学领域的符号。

[Block.2B00]
Name=杂项标志与箭头（Miscellaneous Symbols and Arrows）
Text=各种用途的箭头、几何图形、来自 ''Wingdings'' 和 ''Webdings'' 字体的字符、日本电视符号、占星术符号、评分星级以及棋评符号。\n\n''Hellschreiber 停顿符号'' 曾用于德国的电报机中。

[Block.2C00]
Name=格拉哥里文字（Glagolitic）

[Block.2C60]
Text=各种小语种的字符：梅尔帕语和尼伊语（巴布亚新几内亚）、绍纳语（津巴布韦）、维吾尔语以及其他语言。此外还包括七个乌拉尔语音标字母，以及克劳狄字母 Ⱶ，其含义与现代的 Y 相同，但设计初衷是为了配合现有的模板进行印刷。

[Block.2C80]
Name=科普特文字（Coptic）

[Block.2D00]
Name=格鲁吉亚文字补充（Georgian Supplement）
Text=已废弃的格鲁吉亚 [[pt:minuscule|小写]] 字体 ''Nuskhuri''。字母向右倾斜，且非常方正。首字母通常使用主区块中的 ''Asomtavruli'' 字体输入。\n\n早在 2000 年，格鲁吉亚信息技术国务部与天主教徒牧首（格鲁吉亚教会首领）就请求对 Nushkhuri 进行编码，联盟随后予以了支持。

[Block.2D30]
Name=提非纳文字（Tifinagh）

[Block.2D80]
Name=埃塞俄比亚文字扩展（Ethiopic Extended）
Text=用于以下语言的埃塞俄比亚字母：\n* 梅肯语： 尼罗-撒哈拉语系，{{nspk1|mym}}，自 2009 年起改用[[ps:Latn|拉丁文字]]；\n* 布林语（=比伦语）： 库希特语族，{{nspk1|byn}}，自 20 世纪 90 年代起改用拉丁文字；\n* 本奇语： 奥摩语系，{{nspk1|bcq}}，自 2008 年起改用拉丁文字；\n* 塞巴特贝特语： 埃塞俄比亚闪米特语支，{{nspk1|sgw}}。

[Block.2DE0]
Text=来自教会斯拉夫语的组合西里尔字母。

[Block.2E00]
Name=补充标点符号（Supplemental Punctuation）
Text=特殊标点符号：新约圣经文本学符号、古希腊纸莎草纸文献字符、德语词典标记、来自《礼拜规程》（15 世纪东正教礼拜章程）的字符等等。

[Block.2E80]
Name=中日韩符号与标点（CJK Symbols and Punctuation）
Text=康熙部首的变体形式，用作字典索引中的部首页。

[Block.2F00]
Name=康熙部首（Kangxi Radicals）
Text=您可能会问：如果不知道读音，该如何在字典中查找中日韩表意文字？解决方法是识别“部首”——即字符中的关键笔画或部件。\n\n中文《康熙字典》是于 1710 年至 1716 年间奉中国康熙皇帝之命编纂的，共收录 {{n|49030}} 个条目。直到 19 世纪末，它一直是标准的参考书。1831 年的修订版修正了约 {{n|2500}} 处因初版编纂仓促而产生的错误。\n\n通过 214 个部首对汉字进行“字母顺序”排列的体系最早于 1615 年提出。然而，正是《康熙字典》最终将这一方法标准化了。\n\nUnicode 的字形样本曾经过激烈的讨论，并已尽可能做到不偏向任何特定国家（地区）。

[Block.2FF0]
Name=表意文字描述字符（Ideographic Description Characters）
Text=Unicode 拥有一种描述未编码 [[ps:Hani|中日韩表意文字]] 的机制。要做到这一点，您需要指定该字由哪些部件拆分而成，以及每个部件内部包含什么。本区块负责实现第一步（即指定部件拆分）。\n\n所有字符都是可见的，渲染器通常不会重新构建表意文字的外观。壮族文字 [[pu:2DA21]] {{smb|𭨡}} 可以描述为 {{sm|⿰書史}}。在 Unicode 15.1 中，该区块已被完全填满，甚至有一个字符被分配到了 [[pk:31C0|中日韩汉字笔划]] 区块中。

[Block.3000]
Name=中日韩符号和标点（CJK Symbols and Punctuation）
Text=[[pt:cjk|中日韩]] 中使用的标点符号及其他字符：\n* 全角空格：即表意文字宽度的 [[pt:space|空格]]。\n* 叠字符号：中日韩文字通常不连续书写同一个表意文字，若需要重复——则使用叠字符号，该符号在横排和竖排文本、汉字及假名中写法不同。（现代中文印刷文本中虽常直接重复汉字，但在手写时仍使用叠字符号。）\n* 一些日本徽章符号。\n* 日式括号和引号。\n* 同上符号：即 “——//——”，广泛用于我们的列表中，这里仅指其表意文字形式。\n\n表意文字变体指示符 303E 在 Unicode 中没有特殊含义，其编码是为了兼容中国使用的双字节 GBK 编码。

[Block.3040]
Name=平假名（ひらがな）（Hiragana）

[Block.30A0]
Name=片假名（カタカナ）（Katakana）

[Block.3100]
Name=注音符号（Bopomofo）

[Block.3130]
Name=谚文兼容字母（Hangul Compatibility Jamo）
Text=用于兼容韩国编码 KS X 1001 的字符。

[Block.3190]
Name=汉文训读（Kanbun）
Text=汉文（字面意思为“汉人书写”）是日本中世纪一种基于 [[ps:Hani|中文]] 的书面语言。中文的语序是“主-谓-宾”，而日语是“主-宾-谓”，因此文本不能按书写顺序阅读，于是发明了“返り点”标记。这些标记通常比汉字要小。\n\n除了返り点之外，汉文还使用其他字符：词形变化标记、标点符号、汉字对应的日语读音（训读）标记，以区别于中文读音（音读）……\n\n在明治维新（19 世纪末）期间，汉文被废除。虽然现代日本学校仍教授汉文，但已不再创作新的汉文文本。\n\n本区块包含一个用于表示合略（合并阅读）和专有名词的符号（竖线），以及十五个表示阅读顺序的符号。

[Block.31A0]
Name=注音符号扩展（Bopomofo Extended）
Text=用于以下语言的语音字符：闽南语（Minnan）、客家话、苗语和粤语。

[Block.31C0]
Name=中日韩笔划（CJK Strokes）
Text=[[pt:cjk|中日韩]] 统一表意文字由八种基本要素构成：\n\n* 点 (D)；\n* 钩 (G)；\n* 横 (H)；\n* 捺 (N)（向右下落的笔画）；\n* 撇 (P)（向左下落的笔画）；\n* 竖 (S)；\n* 提 (T)（向上的横笔画）；\n* 折 (W)（顺时针弯曲的笔画）。\n\n在辅助要素中包括：扁 (B)、圈 (Q)、斜 (X)、断 (Z)。对于每一种笔画，都规定了其书写方向。\n\n所有名称均为中文：例如，B 来自 biǎn（扁），意为“扁平”。

[Block.31F0]
Name=片假名音标扩展（Katakana Phonetic Extensions）
Text=用于转写阿伊努语音位的小型片假名字符。

[Block.3200]
Name=包围式中日韩字符与月份（Enclosed CJK Letters and Months）
Text=被括号或圆圈包围的 [[ps:Kana|片假名]]、[[ps:Hang|谚文]] 和 [[ps:Hani|表意文字]]。\n\n此外还包括几个本应属于其他区块的字符：计量单位的缩写、圆圈内的数字 21 至 50，以及限速标志（圆圈或方框内的 10 至 80）。\n\n2019 年，又添加了“令和”符号——即代表新天皇德仁年号的表意文字。

[Block.3300]
Name=中日韩兼容字符（CJK Compatibility）
Text=用于兼容 [[pt:cjk|中日韩]] 编码的字符。包括各种日语缩写（如公寓、Alpha、安培、公亩=100 m²……）、电报符号、日本天皇年号，以及适配中日韩方块字形的计量单位。

[Block.3400]
Text={{n|6582}} 个罕见的 [[ps:Hani|汉字]]。2020 年又新增了 10 个，将该区块完全填满。\n\n第一个汉字意为“山丘、土堆、坟墓”，现已被字符 {{sm|丘}} 取代。第二个是一个废弃汉字，在不同文献中意为“舔”、“编织的席子”、“竹笋壳”或“昏暗”。

[Block.4DC0]
Name=易经六十四卦符号（Yijing Hexagram Symbols）
Text=《易经》（Yi Jing 或 I Ching）是一部由中国历代先贤共同完成的玄学典籍。其最古老的部分成书于公元前 700 年左右，描述了一种著名的“择占”方法，即利用随机数进行占卜。占卜者需随机得出一个“卦”，并解读其含义。\n\n据记载，占卜时使用的是 50 根一束的签条，传统上使用蓍草茎，但具体操作细节已不可考。使用硬币抛掷的方法出现得较晚，而现代使用签条的占卜方式属于一种重构。\n\n六十四卦的编码顺序与书中一致：取其序号 1…64，加上偏移量 4DBF₁₆=19903₁₀，即可得到对应的 Unicode 码位。\n\n中国还有一位名为“易京”的哲学家，与这部书无关。

[Block.4E00]
Name=中日韩统一表意文字（CJK Unified Ideographs）

[Block.A000]
Name=彝文字（Yi Syllables）

[Block.A490]
Name=彝文字部首（Yi Radicals）
Text=用于彝语词典“字母排序”的部首。

[Block.A4D0]
Name=老傈僳文字（Lisu）

[Block.A500]
Name=瓦伊文字（Vai）

[Block.A640]
Text=古斯拉夫语和教会斯拉夫语、1917 年之前的阿布哈兹语（乌斯拉尔西里尔字母，1862 年）、用于立陶宛方言学的声调符号。\n\n罕见的[[pt:ligature|连字]]“多眼 O”仅用于教会 epithet“多眼的”（мног{{funky|ꙮ}}кий）。在 Unicode 15 中，七个眼睛被替换为十个——很难数清原始手稿中有多少只眼睛，但更接近十个。

[Block.A6A0]
Name=巴姆穆文字（Bamum）

[Block.A700]
Name=声调修饰符号（Modifier Tone Letters）
Text=用于汉语、奇南特克语（墨西哥原住民语言）和非洲语言的国际音标字符，用于表达声调——即单个音位内的音高变化。\n\n字符 {{sm|꜀꜁}} 及其他符号用于汉语声调的词源分析。\n\n{{sm|꜈꜉}} 及其他符号——用于直接标示音高和“连读变调”。（“Sandhi”是一个梵文术语，意为音位因周围音位的影响而发生变化。例如，英语中 syn- + pathy = sy'''m'''pathy——但这种连读变调不涉及声调，因为英语是没有声调的语言。）\n\n{{sm|ꜗꜘꜙꜚ}} 用于奇南特克语。\n\n箭头用于表示“声调步”（即下一个音节的音高更低或更高）。感叹号是一种常用的替代符号，曾在字体广泛支持国际音标之前被使用。

[Block.A720]
Text=源自乌拉尔语音标、中世纪转录和记谱系统的字母，殖民时期使用的辅助玛雅字母，以及其他字符。

[Block.A800]
Name=锡尔赫特城文字（Syloti Nagri）

[Block.A830]
Name=通用印度数字（Common Indic Number Forms）
Text=这类字符见于 16 世纪的文献中，如今在印度北部、巴基斯坦和尼泊尔仍被用于书写尺寸、重量或价格的分数。

[Block.A840]
Name=八思巴文字（Phags-pa）

[Block.A880]
Name=索拉什特拉文字（Saurashtra）

[Block.A8E0]
Name=天城文字扩展（Devanagari Extended）
Text=源自《娑摩吠陀》（宗教颂歌集）的吟唱符号、''candrabindu''（鼻化元音）的变体、编辑标记、宗教符号，以及欧洲人为了印度小型无文字语言而发明的元音“ay”。

[Block.A900]
Name=克耶里文字（Kayah Li）

[Block.A930]
Name=勒姜文字（Rejang）

[Block.A960]
Name=谚文字母扩展 A（Hangul Jamo Extended-A）
Text=韩语的初声（choseong）古辅音字母。它们用于动态组合现代韩语中不存在——因此在 [[pt:precomposed|预组合]] 形式中也缺失的音节。

[Block.A980]
Name=爪哇文字（Javanese）

[Block.A9E0]
Text=用于巴利语（佛教礼仪用语）和傣仂语（缅甸，截至 2010 年约有 10 万使用者）的字母和数字。

[Block.AA00]
Name=占文字（Cham）

[Block.AA60]
Text=用于克钦语（缅甸、印度，截至 2007 年约有 1.3 万使用者）和傣艾通语（阿萨姆邦，截至 2006 年约有 1500 人使用）的文字。

[Block.AA80]
Name=越南傣文字（Tai Viet）

[Block.AAE0]
Name=曼尼普尔文字扩展（Meetei Mayek Extensions）
Text=来自曼尼普尔语（Meetei）的废弃字符，包括用于组合旧式 [[pt:ligature|连字]] 的 [[pt:virama|Virama]]（元音省略符）。

[Block.AB00]
Name=埃塞俄比亚文字扩展 A（Ethiopic Extended-A）
Text=用于以下语言的字母：\n* 加莫-戈法-道罗语：三个民族，一种语言，{{nspk1|gof}}；\n* 巴斯克托语：{{nspk1|bst}}；\n* 古穆兹语：{{nspk1|guk}}，自2007年起使用 [[ps:Latn|拉丁文字]]。

[Block.AB30]
Text=用于德语和苏格兰方言学的字母，美洲原住民和汉藏语系语言的转写，以及雅库特语的拉丁化书写（诺夫哥罗多夫字母，1920–1929 年）。

[Block.AB70]
Name=切罗基文字补充（Cherokee Supplement）
Text=该区块包含切罗基文小写字母，除了已收录在主区块中的六个字母外。

[Block.ABC0]
Name=曼尼普尔文字（Meetei Mayek）

[Block.AC00]
Name=谚文音节（Hangul Syllables）
Text=[[pt:precomposed|预组合]]谚文音节，主要用于与其他编码标准的兼容性。\n\n将韩语纳入 Unicode 的过程十分艰难。在 Unicode 1.0 中，该区块位于 3400…3D2D（即现在 [[ps:Hani|汉字]] 所在的位置）。到了 Unicode 2.0（1996 年），该区块被移到了最终位置，当时寄希望于那时的韩文 Unicode 文本还不多。这一事件被称为“韩语大混乱”。作为回应，联盟做出了主要的 [[pt:stability|稳定性]] 保证：没有任何一个字符会被移动或消失。

[Block.D7B0]
Name=谚文字母扩展 B（Hangul Jamo Extended-B）
Text=韩语的古中声（jungseong）和古终声（jongseong）字母。它们允许动态组合现代韩语中不存在的音节——因此在 [[pt:precomposed|预组合]] 形式中也不存在。

[Block.F900]
Name=中日韩兼容表意文字（CJK Compatibility Ideographs）
Text=该区块包含在其他编码标准中多次出现的 [[ps:Hani|中日韩表意文字]]，以防止在 [[pt:convertibility|往返转换]] 过程中丢失信息。这些文字的字形是严格规定的。不过，这里也能找到普通的[[pt:unification|统一]] 表意文字——例如 FA0E、FA0F、FA11、FA13、FA14……

[Block.FB00]
Name=字母呈现形式（Alphabetic Presentation Forms）
Text=用于 [[ps:Latn|拉丁]]、[[ps:Armn|亚美尼亚]] 和 [[ps:Hebr|希伯来]] 文字的标准 [[pt:ligature|连字]]。

[Block.FB50]
Name=阿拉伯文字呈现形式 A（Arabic Presentation Forms-A）
Text={{ArabPres1}}\n\nFDDx 到 FDEx 这 32 个位置是 [[pt:noncharacter|非字符]]。\n此外还包含 [[pt:spacing|占位]] 元音符号。\n\n{{ArabPres2}}

[Block.FE00]
Name=变体选择符（Variation Selectors）
Text=通常（例如在浏览器中），通过选择另一种字体或启用 OpenType 特性来选择字符的某种变体。\n\nUnicode 允许另一种方法：通过字符和选择符创建连字（或变体）。\n\n[[ps:Latn|拉丁]]、[[ps:Mymr|缅甸]] 和其他一些文字使用 VS1。[[ps:Hani|中日韩表意文字]]使用 VS1 到 VS3。[[pt:emoji|表情符号]] 可以变为彩色（VS16）或文本样式（VS15）。

[Block.FE10]
Name=竖排标点符号（Vertical Forms）
Text=[[ps:Hani|中文]] 最初是按列从右向左书写的，出于艺术目的（如诗歌、明信片、招牌），至今仍采用这种书写方式。\n\n该区块对来自中文编码标准 GB 18030（2000）中用于竖排的字符进行了编码。

[Block.FE20]
Name=组合用半记号（Combining Half Marks）
Text=跨越多个字符的变音符号部件。例如，你可以用一条线覆盖三个字母 {{sm|a︤c︦e︥}}。这一功能在大多数字体中实现得很差，而「Unicodia」的作者特意挑选了三个显示效果较好的字母。而教会斯拉夫语的 {{sm|Х︮с︯}} 看起来就很糟糕。

[Block.FE30]
Name=中日韩兼容标点符号（CJK Compatibility Forms）
Text=用于 [[pt:cjk|中日韩]] 竖排书写的字符，主要是为了与现有编码标准兼容。特别是与中文编码标准 CNS 11643 兼容——因此在 Unicode 1.0 中，该区块名为“CNS 11643 兼容性”。

[Block.FE50]
Name=小型标点符号（Small Form Variants）
Text=用于与中文编码标准 CNS 11643 兼容的小型标点符号。

[Block.FE70]
Name=阿拉伯文字呈现形式 B（Arabic Presentation Forms-B）
Text={{ArabPres1}}\n\n包含字符 FEFF，即 [[pt:bom|字节顺序标记]]。\n\n{{ArabPres2}}

[Block.FF00]
Name=半宽与全宽形式（Halfwidth and Fullwidth Forms）
Text=在中日韩文字中，一个表意文字传统上占据网格的整个单元格，而一个欧洲字母则占据半个单元格。因此，在字体选择不当的廉价中国商品上，常会出现滑稽的文字风格：在俄罗斯互联网上，“Athletism” 鞋垫就曾因此走红。\n该区块包含那些 “错误” 的字符——即占据半个单元格而非整个单元格的字符，反之亦然。

[Block.FFF0]
Name=特殊字符（Specials）
Text=这是位于 [[pt:bmp|基本多文种平面]] 末尾的一个短小区块。该区块共有 14 个码位（其中两个是[[pt:noncharacter|非字符]]），但仅分配了 5 个：三个用于行间注释的字符、复合文档中的替代字符（表示“此处有图”），以及一个表示读取失败的符号。\n\n最后这个符号，即 {{sm|�}}，是我们最常看到的。它意味着出现的“乱码”并非因为字体中缺少字形，而是因为解码失败。通常，这是因为有人试图用单字节编码来读取 [[pt:utf8|UTF-8]] 文本。

[Block.10000]
Name=线形文字 B 音节文字（Linear B Syllabary）

[Block.10080]
Name=线形文字 B 表意文字（Linear B Ideograms）

[Block.10100]
Name=爱琴数字（Aegean Numbers）
Text=米诺斯文明和克里特-迈锡尼文明使用的一种非常简单的十进制数字系统。见于 [[ps:Lina|线形文字A]]和[[ps:Linb|线形文字 B]] 中。在 [[ps:Cprt|塞浦路斯音节文字]] 中，曾发现一块刻有数字 100 的泥板。

[Block.10140]
Name=古希腊数字（Ancient Greek Numbers）
Text=阿提卡数字系统是 [[pt:acrophonic|首音字符]]——即使用单词的首字母来代表数字：\n* I = 1，来自 ἴος\n* 裁剪后的 Π = 5，来自 πέντε\n* Δ = 10，来自 δέκα\n* Η = 100，来自 ἑκατόν\n* Χ = {{n|1000}}，来自 χίλιοι\n* Μ = {{n|10000}}，来自 μύριοι\n\n由 Π 和 10/100/{{n|1000}}… 组合而成的字符被用来表示 50、500 等数值。\n\n后来，阿提卡系统被 [[ps:Grek|爱奥尼亚]] 数字系统（Α=1, Β=2, …, Ι=10, Κ=20, …, Ρ=100, Σ=200…）所取代。但文化间的交流影响了伊特鲁里亚人，进而演变出了罗马数字。\n\n该区块还包含古希腊的计量单位符号。\n\n“Litra”这个有趣的词（俄罗斯酒鬼用它来指代一升装的酒瓶）实际上与“升”有关。在古希腊，“litra”是一种硬币和重量单位。在法国，“litron”是一种干量单位，由此衍生出了“升”。

[Block.10190]
Name=古代符号（Ancient Symbols）
Text=用于货币、重量和度量衡的罗马符号。此外还包括希腊语的缩写符号“十字形”（较少情况下表示“基督”）。

[Block.101D0]
Name=费斯托斯圆盘符号（Phaistos Disc）
Text=费斯托斯圆盘是克里特-米诺斯（原始希腊）文化的文物。1908 年在克里特岛出土，这是一个未使用陶轮制作的粘土圆盘，直径 160 毫米，厚度 20 毫米。其年代约为公元前 2100–1100 年，圆盘两面刻有螺旋状的铭文，使用的是未知的文字系统，且通过印章压印而成。现陈列于伊拉克利翁考古博物馆（克里特岛）。\n\n目前普遍接受的假设是，文本从边缘向中心阅读（从右向左）。许多字符为了适应从左向右的书写而被镜像处理了：毕竟，最初的“行人”符号是朝右走的。没人知道这是否属于克里特文字，也没人知道它属于哪种类型。一些非主流的假设包括：这是发掘现场的一位艺术家伪造的赝品、克里特国王的领土清单，或者是一种竞赛游戏。\n\n2002 年，费斯托斯圆盘曾被提议加入 [[pt:private|私用区（ConScript Unicode Registry）]]，编码范围为 E6D0–E6FF；字符顺序保持一致（按阿瑟·埃文斯 1905 年的编号）。在费斯托斯圆盘被正式纳入标准 Unicode 后，该提案被撤回。有两个字符未能进入标准 Unicode，而是取自拉丁字母：| 和 ¦。字符名称采用了路易·戈达尔（1995年）的命名。

[Block.10280]
Name=吕基亚文字（Lycian）

[Block.102A0]
Name=卡里亚文字（Carian）

[Block.102E0]
Name=科普特闰余数字（Coptic Epact Numbers）
Text=这里的“Epact”一词（源自希腊语 ἐπακτός）意为“借用的”，而不是指那些用于从阳历转换为阴历或计算复活节日期的“积日”公式。事实上，这些数字是借用自 [[ps:Grek|希腊文字]] 的普通 [[ps:Copt|科普特文字]] 记数法的后代，在 10 至 19 世纪的科普特-阿拉伯世界中曾被广泛使用，特别是在公元 1800 年左右的天文表中。书写方向为从左到右。\n\n由于这种非标准的用途，这些数字被编码为一个独立的区块，而不是作为科普特字母的一个变体。\n\n在字符示例中，你会看到与 Unicode 表格有很大的差异：古代文字专家 Anshuman Pandey 追踪了古老的墨迹符号，而 Google Noto 项目则试图用等宽线条来重现它们。

