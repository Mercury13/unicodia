Text=用于“愿它受祝福”等短语的耆那教标点符号和 [[pt:ligature|连字]]。

[Block.11B60]
Name=夏拉达文字补充（Sharada Supplement）
Text=用于克什米尔语现代夏拉达文的元音标记，改编自 [[ps:Deva|天城文]]。要构成独立的首字母形式，这些标记需要附加在 [[pu:11183]]（即夏拉达文的辅音载体符号）或其他初始元音上。克什米尔语 {{nspk|ks}} 通常使用 [[ps:Arab|阿拉伯-乌尔都文]] 书写。

