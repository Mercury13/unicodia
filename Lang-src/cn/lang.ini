[Block.12000]
Name=楔形文字（Cuneiform）

[Block.12400]
Name=楔形文字数字与标点符号（Cuneiform Numbers and Punctuation）
Text=公元前 2000 年左右的巴比伦人设计了第一个位值制数字系统，它是六十进制的。{{sm|𒐕}} 代表 0 到 9 的单位，{{sm|𒌋}} 代表 0 到 5 的十位。零 {{sm|𒑊}} 仅写在数位之间，而不出现在数字的末尾，数字的位值顺序只能通过上下文来推断。\n在此之前，人们使用的是非位值制系统，即不同的物体和不同的位置用不同的符号来表示。

[Block.12480]
Name=早期王朝楔形文字（Early Dynastic Cuneiform）

[Block.12550]
Name=古楔形文字数字（Archaic Cuneiform Numerals）

[Block.12F90]
