[Version.1.1]
Text=这是首个成为 ISO 标准的版本，也是现存 Unicode 的基础版本。1.0 和 1.0.1 版本的基础数据是经过重构的。\n\n版本 1.0（1991 年 10 月，约 {{n|7200}} 个字符）：增加了大部分后来属于 1.1 版本的文字脚本，包括在 1.1 版本中被删除的 [[ps:Tibt|藏文]]，以及 {{n|2350}} 个在 [[pv:2.0|2.0]] 版本中被删除的 [[ps:Hang|韩文音节]]。\n\n版本 1.0.1（1992 年 6 月，约 {{n|28300}} 个字符）：增加了 {{n|20902}} 个 [[ps:Hani|中日韩统一表意文字]]，并删除了 6 个字符。\n\n版本 1.1：增加了 {{n|4306}} 个额外的韩文字符，并删除了藏文。

[Version.2.0]
Text=2.0 版本将 [[pt:precomposed|预组合]] 的 [[ps:Hang|韩文]] 音节移动到了它们现在的位置。在一片强烈的抗议声之后，Unicode 采纳了主要的 [[pt:stability|稳定性]] 保证：字符将不再移动或消失。

[Version.2.1]
Text=新增了欧元符号 '''[[pc:20AC|€]]''' 和对象替换符 [[pc:FFFC]]。

[Version.3.1]
Text=这是 [[pt:plane|平面]] 1 和 2 的首次使用。而 [[pt:utf16|UTF-16]] 编码标准以及 16 个辅助平面的构想，其实在五年前就已经被提出了。

[Version.4.1]
Text={{GrekCoptUni}}

[Version.6.2]
Text=新增了 2012 年 3 月发布的土耳其里拉符号 [[pc:20BA]]。

[Version.6.3]
Text=新增了 5 个用于 [[pt:bidi|双向]] 文本的 [[pt:format|格式]] 字符。

[Version.12.1]
Text=这是一次 Unicode 紧急发布，仅包含一个字符 [[pc:32FF]]，即日本传统历法中的“令和”年号。早在 2016 年，明仁天皇决定退位时，就已经为他的继承人预留了一个新的码点。当他最终于 2019 年 4 月 30 日退位后，该字符迅速被编码。

[Version.15.1]
Text=Unicode 联盟遭遇了人员问题：发布经理离职，汉学家去世。因此，他们决定进行一次小版本更新：包含 5 个表意文字描述字符、18 个向右看的表情符号，以及 10 个表情符号序列（包括青柠、凤凰和家庭剪影）。\n\n与此同时，中国政府也在紧急处理相关工作，参见 [[pk:2EBF0|中日韩统一表意文字扩展 I 区]]。

[Version.16.0]
Text=除了增加字符外，Unicode 内部还发生了许多变化：\n* 重写了阿拉伯文本的渲染算法。\n* 编写（定义）了在 Unicode 文本中不应存在的字符序列。\n* 增加了埃及象形文字的基础。\n* 将 PDF 格式的规范文档转为 HTML 网站。\n\nUnicode{{_}}16 可能正好包含 {{n|155000}} 个字符（不包括 65 个 [[pt:control|控制字符]]）——但有两个印度文字 [[pt:ligature|连字]] 被移除了。

[Version.17.0]
Text=* 制定了 [[pt:egyp|编码]] 埃及象形文字的规则，并交换了 [[pc:130F9]] ↔ [[pc:13ABE|ABE]] 和 [[pc:130FB]] ↔ [[pc:13AE8|AE8]] 的字形，以兼容加德纳（Gardiner）列表。\n* 改革了 [[ps:Adlm|阿德拉姆文字]]（Adlam），以提高其可读性。\n* 为最后一个表情符号——舞者——添加了 [[pt:inclusion|无性别]] 版本：拉丁舞代表女性，迪斯科代表男性，芭蕾舞代表无性别。\n* 添加了最后一个多种族表情符号——摔跤手和花花公子女孩。\n* 2025 年初，沙特里亚尔的符号被采纳，并迅速被分配到了 [[pu:20C1]]。

[Version.18.0]
Text=*  [[pt:egyp|埃及文字]] 持续改进以兼容加德纳列表。特别是交换了 [[pc:13277]] ↔ [[pc:13FDC]]。\n* 新增了多个音乐符号，包括现代软件中期待已久的 [[pc:1D1EB|升半音号]] 和 [[pc:1D1ED|降半音号]]。\n* 收录了基于 [[ps:Latn|拉丁文字]] 的历史转写字符。\n* 收录了古老的数学符号。\n* 收录了 [[pk:10EC0|阿拉伯文字]] “大写”字母（埃及，1932 年）。

[Update]
Head=检查更新
