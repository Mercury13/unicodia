[Block.0860]
Name=叙利亚文字补充（Syriac Supplement）
Text='''苏里亚尼（Suriyani）''' 或 '''卡尔肖尼（Karshoni）'''，是一种使用叙利亚字母书写 [[ps:Mlym|马拉雅拉姆语]] 的特殊形式。这种书写方式一直沿用到 19 世纪，使用者主要是印度的基督徒。

[Block.0870]
Text=用于《古兰经》注释的字符。此外还包括波斯尼亚语（塞尔维亚-克罗地亚语的一种方言，有时用阿拉伯字母书写）、佩贡文（用阿拉伯字母书写印度尼西亚语言）、埃及皮阿斯特（1834 年之前的货币）和埃及镑（现代货币）。\n\n[[pt:bmp|基本多文种平面]] 在 2021 年几乎已满，你可能会问：为什么要分配这样罕见的字符？Unicode 会预先分配从右向左书写的超级区块，而 0590…08FF 这个范围原本就是从右向左书写的。

[Block.08A0]
Text=用于 [[ps:Rohg|罗兴亚语]]（缅甸）、白俄罗斯语、鞑靼语、巴什基尔语、阿尔维语（印度、斯里兰卡）、沙赫穆基文（[[ps:Guru|旁遮普语]]）、欣德科语（巴基斯坦）以及非洲语言（如柏柏尔语）的阿拉伯字母补充。同时也包括《古兰经》的注释符号。

[Block.0900]
Name=天城文字（Devanagari）

[Block.0980]
