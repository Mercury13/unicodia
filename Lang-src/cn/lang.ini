[Block.13000]
Name=埃及象形文字（Egyptian hieroglyphs）

[Block.13430]
Name=埃及象形文字格式控制符（Egyptian Hieroglyph Format Controls）
Text=十六个字符提供了埃及象形文字的完整排版格式化功能。它们需要一个专门的排版引擎来支持。\n\n水平镜像标记既可以在排版引擎中实现，也可以在字体中实现。\n\n两个不换行的象形文字空格和四个用于表示完全损毁表面的填充符，都是简单的 [[pt:spacing|间距]] 字符。\n\n十五个用于表示严重受损象形文字的影线，理想情况下应能适应象形文字的实际宽度和高度。

[Block.13460]
Name=埃及象形文字扩展 A（Egyptian Hieroglyphs Extended-A）
Text=来自艾伦·加德纳（Alan Gardiner）标准列表之外的 3995 个象形文字。最初的提案质量很差，甚至不知怎的混入了一个带着笔记本电脑的人形符号，但学者们审核了所有内容，从而诞生了 Unikemet——Unicode 的埃及象形文字库。（Kemet 是古埃及的自称。）\n\n然而，这项工作最初的水准并不高，更深入的审查揭示了草率的[[pt:unification|非统一化]]处理（Unicode 17 版本交换了 [[pc:130FB]]↔[[pc:13AE8|AE8]] 及其他字符），以及字形与其描述之间的不一致。\n\n埃及学家们专门设计了用于指示阅读方向的箭头，即 [[pu:1F8C0]] 和 [[pc:1F8C1|C1]]。\n\n2025 年初，[[pt:egyp|象形文字编码规则]]正式确立。

