[Block.0000]
Name=基本拉丁文字（Basic Latin，ASCII）
Text='''美国信息交换标准代码（ASCII）'''是 1963 年在美国开发的一种七位字符编码。选择 7 位宽度是为了便于通过电报传输数据。如果位数过多，ASCII 可以很容易地减少到 6 位，留下字符 40…5F 和 20…3F。 '''基本拉丁文字''' 与 ASCII 相同，因此即使在错误编码的情况下，英语 Unicode 文本也是可读的。\n\n前 32 个字符，00…1F，是 [[pt:control|控制字符]]，其中只有少数至今仍在使用。随后是 95 个可打印字符。许多字符可以追溯到打字机：要打印 À，需要键入 A，回退一格，然后输入反引号。最后一个字符，7F=DEL，可以追溯到穿孔带所有轨道均打孔表示该字符是误打的，不应读取。\n\nASCII 存在许多国家标准变体：英国用英镑 £ 替换了井号 #，苏联用货币符号 ¤ 替换了美元 $，德国用变音符 ÄÖÜäöü 替换了 [\\]{|}，日本用日元 ¥ 替换了反斜杠 \\ …\n\n剩下的 128 个字符空间可以填充任何内容。一种名为 [[pt:latin1|拉丁文字西欧语言（Latin-1）]] 的 8 位编码也是如此，它后来也被引入了 Unicode。

[Block.0080]
Name=拉丁文字西欧语言补充（Latin-1 Supplement）
Text=拉丁文字西欧语言（Latin-1）是 8 位编码 '''ISO{{_}}8859-1''' 的别称， 该编码于 1987 年推出，将 [[pt:ascii|ASCII]] 扩展以支持欧洲语言。\n\n前 32 个字符（80…9F）是 [[pt:control|控制字符]]，是为了兼容 7 位编码: 早期的邮件程序会丢弃最高位，因此在此处使用 [[pt:graphic|可打印]] 字符是不可行的。如今，这些字符已不再按原意使用，常被重新定义为 [[pt:private|私有用途]]。例如，Windows-1252 是 Latin-1 的修改版，其中的控制字符位置被替换为印刷字符。这甚至导致万维网（WWW）标准规定：如果页面请求 ISO{{_}}8859-1，则按 Windows-1252 显示。\n\n我们在字母表中看到了乘号 × 和除号 ÷。最初那里本应是 Œœ，但法国代表坚持认为 OE 就足够了。

[Block.0100]
Text=包含中欧和东欧、波罗的海和凯尔特语言、萨米语、马耳他语、土耳其语、世界语及其他一些语言的字符。

[Block.0180]
Text=包含斯洛文尼亚语、克罗地亚语、罗马尼亚语、立窝尼亚语、壮语、汉语拼音（中文的拉丁转写）、非洲语言、美洲原住民语言以及旧苏联语言的早期（1930 年前）拉丁化形式的字符。

[Block.0250]
Name=国际音标扩展（IPA Extensions）
Text=基于拉丁字母的国际音标被语言学家、言语治疗师、歌手和演员用来记录语言的发音。为了表达额外的发音障碍，如牙齿摩擦声和咬舌音，使用了国际音标扩展。\n\n实际上，此区块中的大多数字符并不是扩展，而是常规的国际音标：例如，{{sm|ɦ}} 出现在俄语 “ага” ''(aha)''、乌克兰语 “гривня” ''(hryvnia)'' 和捷克语 “hrad” 中。\n\n歌剧演唱家经常用不熟悉的语言演唱，他们阅读转写符号的能力常被词典编纂者利用。特别值得一提的是著名的 “Yanny or Laurel” 声音是由歌剧演唱家 Jay Aubrey Jones 录制的——低沉的男声通过低质量的扬声器和和麦克风播放后，听起来变成了 “Yanny”。\n\n此外，利用国际音标字符还可以将文本倒置，以此作为玩笑。

[Block.02B0]
Name=占位修饰字符（Spacing Modifier Letters）
Text=修饰字符用于语音学和语言学中，以表示声调、长短音、腭化、不完全发音和条件音位：英语单词 ''car'' 写作 {{sm|[kɑːʳ]}}，其中最后两个字符是修饰符，分别表示长音和条件性的 {{t|r}}。\n\n该区块还包含 [[pt:spacing|独立占用宽度]] 的变音符号副本。

[Block.0300]
Name=组合附加记号（Combining Diacritical Marks）
Text=变音符号是附加在字母上方、下方或行内的字符，用于修改或阐明字母的含义。例如 ''résumé''（简历）中的重音符号。\n\nUnicode 提供了两种表示变音符号的方式：[[pt:precomposed|预组合]] 字符，以及 “主字符 + '''[[pt:combining|组合]] 符号'''” 的组合。为了简化这种混乱情况下的搜索，Unicode 引入了  [[pt:normalization|规范化]] 算法。\n\n字符 [[pc:034F]] CGJ 并非连接符，而是二合字母的 ''分隔符''。它被用于捷克语（ch 发音为 {{t|x}}，字母顺序为 ce &lt;{{_}}c+CGJ+h &lt;{{_}}ci &lt;{{_}}d &lt;{{_}}ch）、匈牙利语、希伯来语和其他一些语言中。

[Block.0370]
Name=希腊文字与科普特文字（Greek and Coptic）

[Block.0400]
Name=西里尔文字（Cyrillic）

[Block.0500]
Name=西里尔文字补充（Cyrillic Supplement）
Text= 小语种西里尔字母：阿布哈兹语、库尔德语（作为苏联的少数民族语言）、科米语、莫尔多瓦语、阿留申语、阿塞拜疆语（现使用 [[ps:Latn|拉丁文字]]）以及雅科夫列夫字母表（1873–1938 年使用）中的楚瓦什语。\n\n包含一个有趣的字母 {{sm|Ԥ}}（看起来像俄语中的脏话，意为“惨败”或“彻底搞砸”）。它最初是由列昂尼德·卡加诺夫“发明”的；但事实证明，他并非第一人：在他发帖（2008 年）的三年前，俄罗斯就已经在销售印有这个字母的 T 恤了。与此同时，阿布哈兹人也独立地做出了改变，他们开始用下伸笔画代替钩形笔画 {{sm|Ҧ}} {{t|pʰ}}，这也使得字母 {{sm|Ԥ}} 正式在 Unicode 中占有一席之地。

