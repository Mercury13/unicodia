[Block.16EA0]
Name=贝里亚埃尔菲文字（Beria Erfe）

[Block.16F00]
Name=柏格理苗文（Miao）

[Block.16FE0]
Name=表意文字符号与标点（Ideographic Symbols and Punctuation）
Text=用于旧式 [[pt:cjk|中日韩]] 文字的各种字符：[[ps:Nshu|女书]]、[[ps:Tang|西夏文]]、[[ps:Kits|契丹小字]]、以及旧式 [[ps:Hani|汉字]]。\n\n相同的表意文字不连续书写两次，而是使用叠字符号来代替。在现代印刷体中文中允许重复书写，但在中文非正式场合和日文中，则使用 {{sm|々}} [[pu:3005]]。\n\n钩号（Hook）在旧式手稿中表示句子或章节的结束。\n\n如果一段契丹小字是以单个表意文字开头而不是两个，则会在空缺处放置一个 [[pc:16FE4|填充符]]。\n\n虽然越南使用表意文字书写，但有两个字符被用来表达当地的发音。这两个字都有两种变体，且从不会在同一文本中同时出现，因此被 [[pt:unification|统一]] 了。第二种形式看起来分别像箭头 <big>↑</big> 和闪电 <big>ϟ</big>。

[Block.17000]
Name=西夏文字（Tangut）

[Block.18800]
Name=西夏文字部件（Tangut Components）
Text=用于西夏文现代研究的部件和部首。

[Block.18B00]
Name=契丹小字（Khitan Small Script）

[Block.18D00]
Name=西夏文字补充（Tangut Supplement）
Text=有九个字符在 2020 年被 [[pt:unification|分离]] 了。换句话说：这九个字符都是某人的同形字。例如，“pair”（一对）留在了原来的位置 17134，而同形字“foolish”（愚蠢）则获得了一个新编号 18D00。\n\n2021 年中国出版了一本西夏文词典，推动了新汉字的编码工作。

[Block.18D80]
Name=西夏文字部件补充（Tangut Components Supplement）
Text=来自新字典（2021）的部件和部首。

[Block.18E00]
Name=女真文字（Jurchen）

[Block.191A0]
Name=女真文字部首（Jurchen Radicals）
Text=源自 1984 年女真字典的五十个部首。其中一个部首被拆分成了两个，即 [[pc:191B6|23]] 和 [[pc:191B7|24]]。

[Block.1AFF0]
Text=用假名书写闽南语的台湾方言。这是二战前由日本语言学家发明的。

[Block.1B000]
Name=假名补充（Kana Supplement）
Text=包含一个已废弃的 [[ps:Kana|片假名]] 和 255 个 [[ps:Hent|变体假名]]（旧的 [[ps:Hira|平假名]]）。变体假名会在下一个区块中继续。

[Block.1B100]
Text=包含 31 个 [[ps:Hent|变体假名]]（旧的 [[ps:Hira|平假名]]），以及 4 个 [[ps:Kana|片假名]] 和平假名。

[Block.1B130]
Name=小型假名扩展（Small Kana Extension）
Text=小型的 [[ps:Kana|片假名]] 字符用来表示日语中缺失的音位。例如，小号 {{sm|ケヰ}} 用于表示圆唇化音 {{t|kʷi}}。此外，也添加了 [[ps:Hira|平假名]] 中对应的字符。

[Block.1B170]
Name=女书（Nushu）

[Block.1BC00]
Name=杜普雷速记文字（Duployan）

[Block.1BCA0]
Name=速记格式控制符（Shorthand Format Controls）
Text=用于罗马尼亚语和奇努克语（美国西北部的原住民）速记的 [[pt:ignorable|不可见]] 字符。

[Block.1CC00]
Name=旧式计算符号补充（Symbols for Legacy Computing Supplement）
Text=来自旧式计算机的最后一批符号。包括稀有的 [[pt:pseudographics|伪图形]]、游戏精灵图（有些那种电脑根本没有图形功能）、跨越多个 [[pt:mono|字符格]] 的大号字母……大概不会再有此类符号的大规模增加了，因为 2010 年代的微型计算机倾向于坚持使用标准编码。\n\nUnicode{{_}}17 将一些控制台符号从 [[pt:emoji|表情符号]] 中 [[pt:unification|分离]] 了出来。

[Block.1CEC0]
Name=杂项符号补充（Miscellaneous Symbols Supplement）
Text=小行星符号源自 19 世纪的天文学，当时人们刚开始发现它们。现代天文学家已经不再使用这些符号了。\n\n阿拉伯土占术（实际上是一种利用随机数进行的占卜，类似于 [[pk:4DC0|易经]]），涉及在沙地上绘制随机的图形。\n\n在现代化学中，带横线的圆圈（以上标形式出现）表示混合物的“标准”状态（便于计算），此时其成分取决于温度和压力。

[Block.1CF00]
Name=兹纳缅内音乐符号（Znamenny Musical Notation）
Text=兹纳梅尼圣歌（旗帜圣歌）或克留克圣歌（钩子圣歌） 是一种单声部（整个合唱团齐唱）的东正教圣歌。它的名字来源于“旗帜”——这是一种伴随着“记号”使用的音乐符号。最初，这些记号是用红色书写的；但在 17 世纪，亚历山大·梅泽涅茨发明了一种不需要使用朱砂（红色颜料）的记号系统。与欧洲音符编码首要为了简化程序员工作、并在 [[pt:plaintext|纯文本]] 中仅传达节奏不同，兹纳梅尼编码是完全功能性的。\n\n旗帜传达的是一个被唱出的乐形（多达 10 个音符），而音高则由记号来指定。\n\n最早的兹纳梅尼乐谱可追溯到 11 世纪。在 17 世纪的教会改革（“分裂”）期间，旗帜记谱法被基辅记谱法（“斧头”）所取代。直到 19 世纪，它逐渐被如今教堂中存在的多声部圣歌所取代。而兹纳梅尼圣歌和单声部音乐则成为了旧礼仪派的一个特征。\n\n圣歌有几种类型：康达克（一种教堂歌曲）、斯托尔普（柱子）、普特（道路）和杰梅斯特沃（起源不明，可能源自拉丁语 ''domesticus''）。最后一种具有多声部的元素。\n\n现代有一些复兴兹纳梅尼圣歌的尝试。双旗帜记谱法（同时使用旗帜和音符书写的乐谱）为理解兹纳梅尼记谱法提供了关键线索。它是由 Ponomar 项目引入 Unicode 的，该项目致力于绘制字体、构建教会斯拉夫语拼写和识别词典，以及书籍数字化。\n

[Block.1D000]
Name=拜占庭音乐符号（Byzantine Musical Symbols）
Text=关于拜占庭教会音乐，我们所知甚少，至于世俗音乐则更是一无所知。尽管如此，源自拜占庭的符号至少在 19 世纪之前一直被东正教所使用——即使是在土耳其统治时期——并且这些符号在 1800 年左右经历了一次改革。

[Block.1D100]
Name=音乐符号（Musical Symbols）
Text=看起来像现代音符的记谱法出现在 10 世纪。那时的音符是方形的，因为它们是用粗笔尖画出来的。谱表上为歌手画四条线，而为乐器画的线则更多。当时没有绝对的频率标准。到了 13 世纪，时值记号被发明了出来。圆形音符的出现，则是为了尝试用中等粗细的笔尖流畅地书写音符。甚至在今天，仍有专门为音乐家生产的特种钢笔。\n\n音符在 17 世纪随着十二平均律的普及演变成了现在的形式，这使得音乐可以在不同乐器间移植，并实现了管弦乐队的合奏。\n\n音乐属于 [[pt:universality|非文本]] 信息，因此不在 Unicode 的范畴之内。但是，利用现有的排版引擎将音符及其部件存储在字体中，以简化音乐软件并缩短乐谱 PDF 文件的大小，这种做法非常诱人。从这个角度来看，八个 [[pt:format|格式]] 字符（[[pc:1D173|符尾]]、[[pc:1D175|延音线]]、[[pc:1D177|连奏线]]、[[pc:1D179|乐句线]]）的用途并不明确。2013 年，开放标准 SMuFL（标准音乐字体布局）问世，它利用 [[pt:private|私用区]] 码位将该区块扩展到了 2600 个字符。\n\nUnicode 最初采纳的微分音记号（[[pc:1D132]] 和 [[pc:1D133|33]]）并未被广泛使用，很少有人“在实际应用”中见过这些字符。Unicode 18 版本增加了另一种记号（[[pc:1D1EB|升半音号]]、[[pc:1D1ED|降半音号]]），这种记号被音乐软件广泛使用。\n\n此外，这个区块还包含了一些来自已废弃音乐记谱法的字符。

[Block.1D200]
Name=古希腊音乐记号（Ancient Greek Musical Notation）
Text=关于古希腊人（的音乐），我们所知甚少。最初，他们一个八度内只有五个音符，通过各种乐器调律的方法来弥补这种短缺，但后来他们发展出了半音，有时甚至使用四分之一音。主要的乐器是阿夫洛斯管（一种同时吹奏的双管乐器）和里拉琴。\n\n乐师和歌手有不同的记谱法，这使得歌词、乐曲和给歌手的提示可以并行书写。音符是用字母书写的，而那些与正常希腊字母不同的字符，被毫无系统地汇集在这个区块中。

[Block.1D250]
Name=音乐符号补充（Musical Symbols Supplement）
Text=罕见的音乐符号，包括欧洲和阿拉伯/土耳其的。

[Block.1D2C0]
Name=卡克托维克数字（Kaktovik Numerals）
Text=这是 1980 年代由阿拉斯加卡克托维克镇（Kaktovik）的因纽特（爱斯基摩）学童发明的二十进制位值记数法。因纽特人习惯以二十为单位计数（74 = 3 × 20 + 15 − 1），在引入这套系统之前，他们的数学成绩曾位列全美国最差；但在那之后，成绩提升到了略高于平均水平，就像双语人群通常在语言学方面表现更好一样。\n\n人们还设计了一种二十进制算盘。它看起来像日本的“算盘”（soroban），但有三个“天珠”。和日本算盘一样，珠子靠近边缘表示“关闭”，靠近中梁表示“开启”。从二十进制转换为十进制也有简单的算法。\n\n这里没有专门表示小数部分的字符（“二十进制小数点”），有时会用中点来代替。

[Block.1D2E0]
Name=玛雅数字（Mayan Numerals）
Text=玛雅人使用了一种二十进制的位值记数法。数字是从上往下书写的。有时，人们会画出对应神祇的面孔来代替普通的数字符号。普遍观点认为，位值计数法和“零”的概念是在玛雅文明之前（可能是由奥尔梅克人）在公元前就发明了。贝壳、棍棒和圆点的符号形式表明，这些数字起源于计数板。\n\n一些资料指出，在日常生活中，玛雅人使用的是更简单的非位值记数法。

[Block.1D300]
Name=太玄经符号（Tai Xuan Jing Symbols）
Text=《太玄经》（Canon of Supreme Mystery）是一本公元 2 世纪的中国占卜书，灵感来源于 [[pk:4DC0|易经]]。这本书使用了 81 个“首”（tetragrams，即四重符号）。每一行（画）有三种样式：实线（天 tiān = 天），断一次（地 dì = 地）和断两次（人 rén = 人）。使用者应该随机生成四次数字，得到一个“首”，然后在书中查阅其含义。\n\nUnicode 联盟搞混了“地”和“人”。鉴于 [[pt:stability|稳定性]] 的保证，唯一能做的就是在这个错误的注释里解释这个“邪恶”的 mistake。\n\n一些单重和双重符号已经存在于基本平面中。

[Block.1D360]
Name=算筹数字（Counting Rod Numerals）
Text=算筹是教孩子数数的绝佳工具。古代中国人使用一种真正的位值制系统，由摆放在算板上的算筹组成，这一传统从战国时期（公元前 5 世纪）一直延续到 16 世纪。当时已经有了分数甚至负数（用另一种颜色的算筹表示）的记法。\n\n竖着的算筹代表个位、百位、万位……，横着的代表十位、千位、十万位……有时反之——算筹就是以这种形式进入 Unicode 的。算筹符号有时也会被写在纸上。\n\n如果你需要清点东西并记住数字，就会用到计数字号。欧洲的五号字 {{sm|𝍸}} 常让人联想到监狱。中国人则使用汉字 <font size='+1'>正</font>。林务员以十为单位计数，无论是在美国还是前苏联（在雅·伊·别雷尔曼的书中见过），但这种方法并未引入 Unicode。

[Block.1D400]
Name=数学字母数字符号（Mathematical Alphanumeric Symbols）
Text=数学家们用不同的字体来标记各种对象：\n* 向量用粗体，标量用斜体：{{sm|𝐅=𝑚𝐚}}；\n* 特殊集合——用粗体或空心体（双线体）：{{sm|ℕ}} 代表自然数集 1, 2, 3…；\n* 空间——用手写体：{{sm|𝒰}} 代表全集；\n* 集合的基数——用哥特体：{{sm|𝔠}} 代表连续统；\n* 同一对象的不同定义——用手写体或哥特体：海涅极限 {{sm|ℋlim}} 和柯西极限 {{sm|𝒞lim}}；\n* 函数——用不同的字体：期望值 {{sm|𝖤ξ}} 常用无衬线体；\n* 常数——用粗体或空心体：格点极限 {{sm|𝟘}} 和 {{sm|𝟙}}，虚数单位 {{sm|𝕚𝕛𝕜}}…\n\n空心体字体 {{sm|ℕℤℚℝℂ}} 源于用粉笔书写的粗体字。随着 Gunning 和 Rossi 编写的复分析教科书（1965年）的流行，这种字体得到了广泛传播。\n\n这类记法中最常见的已经存在于 [[pt:bmp|基本多文种平面]] 中，位于 [[pk:2100|字母式符号]] 区块。随着 Unicode 扩展到基本平面之外，使用各种字体书写的完整拉丁字母表和数字也被添加了进来。\n\n有些哥特文字几乎难以辨认。无论是 Unicode 图表还是大多数字体（包括 Windows 和 TᴇX），都是这样设计的，尽管一些数学家，尤其是非 [[ps:Latn|拉丁]] 字母国家的数学家，会使用更简单的字体。

[Block.1D800]
Name=萨顿手语记号（Sutton SignWriting）

[Block.1DB00]
Name=杂项符号与箭头扩展（Miscellaneous Symbols and Arrows Extended）
Text=截至 Unicode 18.0 版本，它仅包含一些过时的数学符号。

[Block.1DF00]
Text=包含各种用于言语障碍和语音学的字符： 如腭音和卷舌音音位、搭嘴音（啧音）以及其他符号。同时也收录了过时的数学符号、来自局部语音系统的字母、语言学家田野笔记中便于打字机输入的符号。还有用于英语启蒙教学的各种字母表字符： 与 [[ps:Dsrt|德瑟雷特文字]] 或 [[ps:Shaw|萧伯纳文字]] 不同，这些字母最终能引导孩子过渡到普通的英语拼写。

[Block.1E000]
Name=格拉哥里文字补充（Glagolitic Supplement）
Text=某些文献中证实存在上标形式的格拉哥里字母。\n\n这些文字在圆形的保加利亚式格拉哥里文中很少见（比在 [[ps:Cyrl|西里尔文字]] 中还要少见），而在方形的克罗地亚式中则几乎从未出现过。

[Block.1E030]
Text=用于使用西里尔字母书写转写的修饰字母。这种记法在前苏联各加盟共和国的学校和学院中非常普遍。

[Block.1E100]
Name=创世纪苗文（Nyiakeng Puachue Hmong）

[Block.1E290]
Name=投投文字（Toto）

[Block.1E2C0]
Name=万乔文字（Wancho）

[Block.1E4D0]
Name=纳格蒙达里文字（Nag Mundari）

[Block.1E5D0]
Name=奥纳尔文字（Ol Onal）

[Block.1E6C0]
Name=傣侥文字（Tai Yo）

[Block.1E7E0]
Name=埃塞俄比亚文字扩展 B（Ethiopic Extended-B）
Text=这是 2013 年设计的 Gurage 诸语言（埃塞俄比亚闪米特语族，使用者多达 500 万）的新正字法，它使得整个语族都有了书写系统，而不仅仅是 2005 年编码的 Sebat Bet {{nspk|sgw}}。一些旧字母现在 [[pt:obsolete|已废弃]]。

[Block.1E800]
Name=门德基卡库字（Mende Kikakui）

[Block.1E900]
Name=阿德拉姆字（Adlam）

[Block.1EC70]
Name=印度西亚格数字（Indic Siyaq Numbers）
Text=阿拉伯非位值数字在印度从 17 世纪（莫卧儿王朝统治时期）一直使用到 20 世纪中叶。阿拉伯语 siyaq 意为“顺序”。也被称为 raqm，即阿拉伯语的“账目”。\n\n小于 {{n|90000}} 的数字是 [[pt:acrophonic|首音记数法]]（acrophonic），源自阿拉伯语；从 {{n|100000}} 开始则使用印度词汇。书写顺序是从右向左，但其内部排序非常复杂：例如 515 会被写成 500、5（前缀变体）、10。

[Block.1ED00]
Name=奥斯曼西亚格数字（Ottoman Siyaq Numbers）
Text=阿拉伯非位值 [[pt:acrophonic|首音记数法]] 数字，用于中世纪晚期的土耳其，也称为“rakkamları”（源自阿拉伯语 ''raqm''，意为“账目”）。阿拉伯语 ''siyaq'' 意为“顺序”。\n\n书写顺序是从右向左，但其内部排序非常复杂：例如 123 会被写成 100、3、20。''Marratan'' 符号与千位符号连用，以表示百万。

[Block.1EE00]
Name=阿拉伯数学字母符号（Arabic Mathematical Alphabetic Symbols）
Text=阿拉伯人有他们自己的数学符号系统。他们使用 [[ps:Arab|自己]] 的字母，书写方向是从右向左。就像西方人有罗马体、粗体、斜体等不同字体一样，阿拉伯字母也有独立式、词首式、词尾式、拉伸式、环形和双线体等变体。\n\n数学符号在国际上是镜像对称的，但阿拉伯也有自己的符号——例如求和符号。甚至“任意”和“存在”这样的逻辑符号也是镜像的。\n\n这套符号系统最初是在 TᴇX（发音为“tech”）数学文本排版系统中实现的，经过七年的协商，这些工作最终在 2012 年被纳入了 Unicode。

[Block.1F000]
Name=麻将牌（Mahjong Tiles）
Text=赌博游戏麻将（通过罗马化拼音常被称为 mahjong）发明于 19 世纪末，现存最早的实物牌具可追溯至 1870 年。西方世界对麻将这种博弈游戏本身知之甚少，但其“单人纸牌”（即电脑上的麻将连连看/对对碰）却广为流传：从图形的两侧移除相同的牌。\n\n这种单人游戏是由学生布罗迪·洛卡德（Brodie Lockard）于 1981 年发明的——当时他从蹦床上摔下，导致全身瘫痪。在康复期间，他说服了 CDC 公司给他安装了一台终端机，他咬着棍子用嘴敲击键盘进行编程。这款单人游戏是两种中国游戏——麻将和用多米诺骨牌玩的“拆乌龟”——的混合体。PLATO 系统的终端机是单色的，分辨率为 512×512——这对于运行这样一个复杂的游戏来说已经足够了。\n\n麻将的花色源于“一文钱”（筒子/饼）、“一百文钱”（索子/条）和 {{n|10000}} 文钱（万字的字面意思即一万）。王牌牌（字牌）包括四风（东南西北）、三龙（中发白）、四季和四花。有些变体还包含其他的王牌——如职业（渔夫、樵夫、农夫、书生）或艺术（琴、棋、书、画）。\n\n……洛卡德虽然终身需坐轮椅，但他作为游戏和辅助软件开发者获得了名声，截至 {{ylockard}} 仍然健在。

[Block.1F030]
Name=多米诺牌（Domino Tiles）
Text=多米诺骨牌是由中国人在大约 13 世纪发明的。到了 18 世纪，这种游戏传入了意大利。\n\n关于其名称的词源有三种说法。第一种说法认为，获胜者会成为领主，即 ''domino''。第二种说法认为，这种游戏在修道院中是被允许的，修士们做每件事之前都要向主祈祷，即意大利语中的 ''Domino''。第三种说法则是为了纪念一种黑白相间的嘉年华服装 ''domino''，这种服装描绘的是僧侣的形象。\n\n在对 ''domino'' 这个词进行重新解读后，数学中出现了 ''trimino''（三格骨牌）、''tetramino''（四格骨牌）等术语——即由 3 个、4 个等正方形组成的图形。

[Block.1F0A0]
Name=扑克牌（Playing Cards）
Text=该区块统一了标准扑克牌和塔罗牌组。\n\n纸牌游戏大约发明于 12 世纪的东亚。在欧洲，纸牌最早见于 14 世纪的记载。虽然穆斯林否认他们将纸牌传到了西方，但事实证明，马穆鲁克人拥有他们自己的牌组，看起来很像塔罗牌。\n\n小丑牌（Joker）与塔罗牌的主牌（trumps）没有关系，它是 19 世纪才添加进去的。\n\n主牌的 Unicode 名称对应于法式塔罗牌（占卜通常使用意式牌组）。具体为：0 愚者，1 个人，2 童年，3 青年，4 成年，5 老年，6 早晨，7 下午，8 傍晚，9 夜晚，10 地与气，11 水与火，12 舞蹈，13 购物，14 户外休闲，15 艺术，16 春季，17 夏季，18 秋季，19 冬季，20 游戏，21 集体。\n\n该区块包含一个 [[pt:emoji|绘文字]]，即黑色小丑牌。

[Block.1F100]
Name=包围式字母数字补充（Enclosed Alphanumeric Supplement）
Text=日本的电视角色、Webdings 字体中的字符、知识产权符号……\n\n血型、停车标志以及其他一些字符都是 [[pt:emoji|绘文字]]。\n\n[[pt:country|国旗]] 绘文字是由区域指示符组成的：如果你输入“GB”绘文字，你就会得到大不列颠的国旗。

[Block.1F200]
Name=包围式表意文字补充（Enclosed Ideographic Supplement）
Text=带括号、方框或圆圈的表意文字，常用于日本的广告牌和电视节目。\n\n1F227…1F231, 1F240…1F248 是源自日本棒球报道的符号：投手、捕手、一垒手……这项运动在日本非常受欢迎，在 2021 年东京奥运会上，他们在棒球和垒球项目中都获得了金牌！1F214 具有双重用途：双语广播和二垒手。\n\n1F260…1F265 是源自中国民间信仰的六个字符：福、禄、寿、喜、爱、财。

[Block.1F300]
Name=杂项符号与图形（Miscellaneous Symbols and Pictographs）
Text=该区块包含 [[pt:emoji|绘文字]]（既有日本的也有国际通用的）、印刷符号（dingbats）以及用户界面中的字符。\n\n手枪 {{em|🔫}} 的命运非常引人注目：从苹果公司开始，各大厂商纷纷将其改为玩具枪的样式，以减少互联网上的威胁感。

[Block.1F600]
Name=表情符号（Emoticons）
Text=这段文字介绍了绘文字（Emoji）中最重要的一个类别——表情符号（Emoticons），以及它们从日本手机网络走向世界的历史。翻译过来是这样的：\n\n表情符号或笑脸图是用来表达情感的人物字符和象形图。在（2008年）提交提案时，表情符号已经在日本的蜂窝网络中流行了大约 9 年。根据（2019年）统一码联盟的一项研究，使用频率最高的十个 [[pt:emoji|绘文字]] 中，有六个是笑脸表情。

[Block.1F650]
Name=装饰印刷符号（Ornamental Dingbats）
Text=这是 ''Wingdings'' 和 ''Webdings'' 装饰印刷符号字体的一部分。

[Block.1F680]
Name=交通与地图符号（Transport and Map Symbols）
Text=该区块包含交通工具的图标和 [[pt:emoji|绘文字]]、地图符号以及导航标志，主要是为了与日本手机运营商的编码相兼容。

[Block.1F700]
Name=炼金术符号（Alchemical Symbols）
Text=安托万·拉瓦锡（18世纪末）通常被认为是化学的奠基人。例如，他推翻了燃素说。在他之前，存在着关于物质为何会发生反应的各种理论，有些甚至很奇怪。一些炼金术士甚至推测，科学可以制造黄金或创造人造生命。他们用于各种物质和加工方法的符号虽然缺乏系统性，但对于任何懂拉丁语和古代学说的人来说都是可以理解的。\n\n在 Unicode 15.0 版本中，新增了八个来自天文学和占星术的字符。

[Block.1F780]
Name=几何形状扩展（Geometric Shapes Extended）
Text=引入该区块是为了尝试对 ''Wingdings'' 和 ''Webdings'' 装饰印刷符号字体进行编码。它还允许人们使用粗细完全符合需求的箭头或十字符号。\n\n围棋游戏的字符和彩色图标是后来添加的——即使没有黄丝带的 [[pt:ligature|合字]]，组合 {{em|🎀🟨}} 也能让人看懂。

[Block.1F800]
Text=该区块包含来自 ''Wingdings'' 和 ''Webdings'' 字体的 148 个箭头。此外，还有来自 [[pk:1FB00|旧式]] 计算机、[[ps:Egyp|埃及学]]（用于表示纵向文本的阅读方向）和化学领域的箭头。\n\n1F8B8…BB 号箭头在 [[po:Ohio]] 系统上显示得非常粗，但统一码联盟决定以正常粗细来绘制它们。

[Block.1F900]
Name=补充符号与图形（Supplemental Symbols and Pictographs）
Text=该区块于 2015 年引入，包含各种用途的字符，主要是 [[pt:emoji|绘文字]]。此外，还包含几个来自《礼仪书》（Typicon）的字符，这是一部关于东正教礼拜的标准法规，大约于 1100 年编纂成典，最后一次重大修订是在 1695 年。

[Block.1FA00]
Name=棋类符号（Chess Symbols）
Text=在活字印刷时代，倒置的棋子字模常被用作 fairy chess（国际象棋变体）棋子的唯一选择。除了那些被削弱或从其他游戏中借用的棋子外，一些成熟的非标准棋子包括：\n* 中立棋子：双方玩家都可以移动它；\n* 骑士-皇后——也称为超级皇后、万能皇后、摩诃罗阇、亚马逊、龙、恐怖；\n* 骑士-主教——也称为大主教、红衣主教、公主、半人马；\n* 骑士-车——也称为女皇、元帅、大臣；\n* 蚱蜢——必须跳过一个棋子（己方或对方的）才能移动的皇后，通常画成倒置的皇后；\n* 人、王子——像国王一样移动但不是王（不能王车易位，也不需要被保护），通常画成倒置的国王；\n* 贝罗利纳兵、柏林兵、反兵——与普通的兵相反，它沿对角线向前移动一格，沿直线向前吃子，通常画成倒置或倾斜的兵；\n* 夜行者、骑士行者、骑士噩梦、独角兽——在一个方向上进行多次骑士跳跃，被己方棋子阻挡，并在落点吃掉对方的棋子，通常画成倒置或改变的骑士；\n* 其他骑士（3-2，4-1，与兵组合……）很少见但确实存在；\n* 等距跳跃者——选择任意一个棋子（己方或对方的），跳过它并在另一侧相同距离处落地。如果它向八个基本方向跳跃，从起点到终点的所有方格（除了跳板棋子）都必须是空的。机动性很高，但仅限于四分之一的方格。\n\n来自原始国际象棋的两个棋子：\n* 象（大象）——主教的前身，沿对角线移动两格，可以跳过棋子；\n* 维齐尔（大臣）——皇后的前身，沿对角线移动一格。\n\n该区块还包含中国象棋（Xiangqi）的棋子。

[Block.1FA70]
Name=符号与图形扩展 A（Symbols and Pictographs Extended-A）
Text=这是一个在 2019 年出现的 [[pt:emoji|绘文字]] 区块。包含了服装、医疗用品、娱乐、各种物品、食物等。

[Block.1FB00]
Name=旧式计算机符号（Symbols for Legacy Computing）
Text=该区块包含来自 20 世纪 70 年代和 80 年代不同计算机和系统的字符：[[po:AmstradCpc]]、[[po:Aquarius]]、[[po:Atari400]]、[[po:AtariSt]]、[[po:Trs80]]、[[po:CoCo]]、[[po:Oric]]、[[po:Apple2]]、[[po:C64]]、[[po:Zx80]]、[[po:Msx]]、[[po:RiscOs]]、[[po:Teletext]]、[[po:Minitel]]——以及，巧合的是，[[po:Korvet]]，一款苏联的个人电脑。\n\nUnicode 16 版本添加了更多系统：[[po:Smalltalk]]、[[po:SharpMz]]、[[po:Kaypro]]、[[po:Ohio]]、[[po:Robotron]] 和 [[po:Hp]]。\n\n'''未'''被纳入标准的内容：\n* 涉及知识产权的字符，例如苹果公司的标志；\n* [[pt:unification|已存在于]] 现有 [[pt:pseudographics|伪图形]] 区块中的符号。在正确的字体中，新旧伪图形应该能够无缝拼接：{{sm|█🬗}}\n\n最初（自 1.0 版本起）支持的系统：[[po:Ibm]]、[[po:Mac]]、[[po:Spectrum]]、[[po:BbcMaster]]。

[Block.20000]
Text=这是包含罕见及历史性的 [[ps:Hani|中日韩表意文字]] 的区块。这些字最初被打包进 Windows 的标准字体“SimSun-ExtB”中。后来，人们发现该区块存在许多错误，甚至有八个表意文字被错误地重复收录了。

[Block.2A700]
Text=该区块包含 {{n|4149}} 个在 2009 年加入的生僻及古老的表意文字。在 2021 年，又新增了 4 个字。

[Block.2B740]
Text=该区块包含 222 个在 2010 年加入的生僻及古老的表意文字。

[Block.2B820]
Text=该区块包含 {{n|5762}} 个在 2015 年加入的生僻及古老的表意文字。

[Block.2CEB0]
Text=该区块包含 {{n|7473}} 个在 2017 年加入的表意文字，其中包括生僻字、古汉字以及超过 {{n|1000}} 个壮族文字。

[Block.2EBF0]
Text=2022 年末，中国大陆曾试图通过将近 900 个用于中国人名的汉字映射到未分配的第 10 平面（Plane 0A），从而在技术上“分叉”Unicode。为了防止这种情况发生，专家们迅速对这些字进行了审核，并确认其中 622 个是可以编码的。\n\n字符集通常会在测试版发布前很早就冻结（不再变动）。例如，黑鸟（乌鸦/渡鸦）的编码从 1FABE 被改成了 {{em|🐦}}+[[pt:zwj|零宽连接符]]+{{em|⬛}} 的组合，导致 1FABE 这个位置成了空位。但这一次，字符集直到 Unicode 15.1 发布前一个月才被冻结。\n\n为了优先处理这项紧急任务，所有其他表意文字的收录都被推迟了。从 2023 年 8 月确定字符到 2024 年春季发布下一个测试版，中间只剩下半年时间，因此 Unicode 16 版本没有新增任何表意文字。

[Block.2F800]
Name=中日韩兼容表意文字补充（CJK Compatibility Ideographs Supplement）
Text=该区块于 2001 年引入。为了与台湾地区的 CNS{{_}}11643-1992 编码实现[[pt:convertibility|往返兼容]]，对 542 个表意文字进行了[[pt:unification|取消统一]]（即不再视为同一字符）。当然，该区块中的所有表意文字都是繁体字。

[Block.30000]
Text=2020 年，Unicode 迈入了第 3 平面（即表意文字第三平面，SIP），并在那里分配了 {{n|4939}} 个古老而罕见的字符。这个区块包含两个打破纪录的表意文字：\n* ''Biang''——在中文面食“biangbiang 面”中连写两次：[[pu:30EDD]] 简体 42 画，[[pu:30EDE]] 繁体 58 画；\n* ''Daito'' 或 ''Otodo''——一个由日本人发明的 84 画表意文字，意为“飞龙在天之貌”，编码为 [[pu:3106C]]。

[Block.31350]
Text=这是一批罕见的表意文字，主要来源于旧时的中文报纸。

[Block.323B0]
Text=这些表意文字来源广泛：包括中国人名、韩国历史地名、报纸档案以及台湾地区的编码标准等。\n\n[[pk:2EBF0|2022 年中国大陆试图分叉 Unicode 的事件]] 导致其他所有工作都被推迟，而距离 Unicode 16 测试版发布的时间又所剩无几。因此，这一批新的约 4000 个表意文字直到 Unicode 17.0 才得以收录。\n

[Block.3D000]
Name=小篆（篆书）

[Block.E0000]
Name=标签（Tags）
Text=该区块是 [[pt:ascii|ASCII]] 字符集的镜像。最初（Unicode 3.1，2001 年），这些标签用于通过收发双方的约定来指定语言。这种用法后来被完全[[pt:deprecated|弃用]]，但在 Unicode 9.0（2017 年），这些标签作为 [[pt:emoji|绘文字]] 修饰符“复活”了。现在它们仅用于生成地区旗帜，目前定义了三个地区：英格兰、威尔士和苏格兰。

[Block.E0100]
Name=变体选择符补充（Variation Selectors Supplement）
Text=补充变体选择符仅用于 [[ps:Hani|中日韩统一表意文字]]，以设定特定的地区变体。但字体设计师也可以酌情将它们用于其他字符。

[Script.Zyyy]
Name=无（None）
Text=文字系统以外的字符。

[Script.Adlm]
Name=阿德拉姆文字（Adlam）
Lang=富拉尼语（Fula）
LangNote=西非族语言
Note=20 世纪 80 年代末
Text=富拉尼人（Fula, Fulani, or Fulbe）是游牧牧民，在人类学上他们是撒哈拉以南非洲与欧洲人最接近的族群，也是西非最狂热的伊斯兰教倡导者。\n\n这种字母表是由伊布拉希马·巴里（Ibrahima）和阿卜杜拉耶·巴里（Abdoulaye Barry）两兄弟发明的，当时他们还只是十几岁的少年，旨在比拉丁字母或阿拉伯字母更好地传达富拉尼语。这种新文字迅速流行开来，目前在几内亚、利比里亚等国家的学校中教授，Android 系统也已对其进行了本地化支持。\n\n该字母表以四个字母命名：A, D, L, M。这些字母是“Alkule Dandayɗe Leñol Mulugol”的缩写——意为“保护民族免于消失的字母表”。\n\n字母之间是连写的，尽管许多现代出版物不再连写。\n\n在此之前，曾有两次创造富拉尼字母表的尝试，但均未收录于 Unicode：Dita 文字（约 1958 年，受前阿拉伯文化启发）和 Ba 氏字母表（1963 年）。有时也会使用 Ajami 或 Wolofal——即经过大幅修改的 [[ps:Arab|阿拉伯]] 字体。目前主要的文字系统是 [[ps:Latn|拉丁]] 文字。

[Script.Aghb]
Name=高加索阿尔巴尼亚文字（Caucasian Albanian，阿格旺文字（Aghwank）
Lang=阿格旺文（Aghwank） ''（即 Gargarean，高加索阿尔巴尼亚的语言）''
Text=该国与巴尔干半岛的阿尔巴尼亚毫无关系，其自称已不可考：“Albania”是希腊语名称，“Aghwank”则是现代亚美尼亚语的称呼。当地居民讲的是列兹金语族语言。自公元前 1 世纪起，这里曾拥有一个强大的王国。公元 461 年，该国被波斯人征服；7 世纪时，曾短暂臣服于可萨汗国，随后重获自由。从 10 世纪开始，阿尔巴尼亚的部分地区经历了突厥化，演变为希尔万（即现代阿塞拜疆的一部分）和卡拉巴赫。其他地区的居民则融入了亚美尼亚人、卡赫季格鲁吉亚人以及达吉斯坦人的民族形成过程。这种文字可能一直沿用到 12 世纪，才被其后继语言所取代。该国疆域跨越了现代的俄罗斯和格鲁吉亚，因此在传统上被归类为欧洲国家。\n\n亚美尼亚史料记载，这种文字是由 Mesrop Mashtots（也是 [[ps:Armn|亚美尼亚]] 文字的创造者）发明的——但这些史料中并未包含文字样本，且未得到非亚美尼亚史料的证实。1886 年，人们发现了一份 16 世纪的笔记，内容是用亚美尼亚语写的，但使用的是阿尔巴尼亚字母。1937 年，苏联的亚美尼亚学家发现了完整的字母表。1948 年，在修建水电站时，发掘出了一座 6 世纪的早期基督教神庙，里面有真实的铭文。1996 年，发现了“西奈重写本”，这是一部用阿尔巴尼亚语书写的圣经，后来被擦除并写上了格鲁吉亚语。这一发现极大地帮助了破译工作，首个破译成果于 2008 年问世。

[Script.Ahom]
Name=阿洪姆文字（Ahom）
Lang=泰-阿洪姆语 （Tai-Ahom，印度阿萨姆邦，正处于复兴中）
Text=定居在布拉马普特拉河谷的泰人创造了一种基于印度元音附标文字（Abugida）的文字系统。到了 19 世纪，这种语言最终被使用 [[ps:Beng|孟加拉]] 文字的阿萨姆语所取代。自 1954 年起该文字开始复兴，当时向其中添加了缺乏历史依据的阿拉伯数字。泰-阿洪姆语的声调系统已经完全失传——其文字系统原本并未记录声调。

[Script.Arab]
Name=阿拉伯文字（Arabic）
Lang=阿拉伯语 {{nspk}}、波斯语、乌尔都语、维吾尔语、普什图语……
Text=这种文字系统经由 [[ps:Syrc|叙利亚文]] 和/或 [[ps:Nbat|纳巴泰文]]，从 [[ps:Armi|阿拉米文]] 演变而来。阿拉伯语与伊斯兰教紧密相关；《古兰经》（610–632 年）即以此语言书写。正是《古兰经》的抄写员们确立了该字母表的最终形态。阿拉伯帝国同时推行了伊斯兰教和这套文字。许多伊斯兰民族（如土耳其人、哈萨克人、巴什基尔人）直到 20 世纪初仍在使用阿拉伯文字。\n\n计算机处理阿拉伯语的复杂性在于字母的书写方式：每个字母都有独立、词首、词中和词尾四种形式。在普通文本中，通常首选能根据在单词中的位置自动适应的“[[pt:character|通用形式]]”字母。但如果你需要在孤立状态下使用词尾形式，Unicode 也提供了“刚性”变体。

[Script.Armi]
Name=帝国亚拉姆文字（Imperial Aramaic）
Lang=帝国亚拉姆语 （Imperial Apamaic，即官方亚拉姆语——波斯帝国公元前 500 至 329 年的语言之一）
Text=公元前 593 年，阿契美尼德波斯征服了巴比伦，并基于亚拉姆语创造了一种书面通用语。这种语言规范化程度极高，以至于很难确定具体文献的出土地点和年代。随着亚历山大大帝征服波斯（公元前 330 年），语言开始分化，[[ps:Syrc|叙利亚语]]（[[ps:Arab|阿拉伯语]]的祖先）和犹太语（[[ps:Hebr|希伯来语]]的祖先）开始形成。\n\n数字是通过组合 1、2、3、10、20、100、{{n|1000}} 和 {{n|10000}} 这些 numeral（基数词）构成的：55 = 20 20 10 3 2；103 = 100 3；300 = 3 100（从右向左书写！）

[Script.Armn]
Name=亚美尼亚文字（Armenian）
Lang=亚美尼亚语（Armenian）
Text=这种文字是由学者兼祭司 Mesrop Mashtots（362–440）发明的。没人知道他是否借鉴了其他字母表（也许是某种已失传的古亚美尼亚字母）。这套字母表与基督教在亚美尼亚的传播密切相关。在 12 世纪，字母 {{sm|Օ}} 和 {{sm|Ֆ}} 被添加进来。\n\n人们认为，亚美尼亚文学比中古波斯语（伊斯兰教之前）文学更为丰富，因为亚美尼亚字母比 [[ps:Mani|摩尼文字]] 更简单。

[Script.Avst]
Name=阿维斯陀文字（Avestan）
Lang=阿维斯陀语（Avestan），中古波斯语
Text=这字母表与祆教（拜火教）及其圣典《阿维斯陀》密切相关。公元 400 年左右，萨珊波斯为了编纂《阿维斯陀》，基于巴列维文（中古波斯语手稿的文字系统）创造了一种专用字母表。当时祆教已有数百年历史，其语言已鲜为人知，而祈祷文必须被精确复诵才能生效——因此，这套字母表借鉴了邻近文字系统，配备了真正的元音字母。\n\n在阿拉伯人统治时期，祆教徒开始迁往印度，自 12 世纪起，他们使用当地的元音附标文字（Abugida）书写阿维斯陀语，传统上使用 [[ps:Gujr|古吉拉特文字]]。这些祆教徒中最著名的一位是弗雷迪·莫库里（Freddie Mercury）（尽管他的父母最终搬到了遥远的桑给巴尔）。\n\n2000 年，古文字被分为五类：\n* A 类（现代仍在使用——[[ps:Copt|科普特文字]]、[[ps:Runr|卢恩文字]]）；\n* B1 类（已研究，可编码——[[ps:Xpeo|波斯楔形文字]]）；\n* B2 类（已研究，不可编码——[[ps:Egyp|埃及象形文字]]）；\n* C1 类（非系统性，业余爱好者请求——[[ps:Xsux|苏美尔楔形文字]]）；\n* C2 类（未探索，业余爱好者请求——[[pk:101D0|费斯托斯圆盘]]）。\n阿维斯陀文最初被归入最重要的 A 类，这让它有机会被分配在 [[pt:bmp|基本多文种平面]]（BMP）中。但最终另一种观点占了上风：将阿维斯陀文和 [[ps:Phlp|巴列维文]] 编码在相邻位置，置于辅助平面中。这就为尚未编码的巴列维文书（Book Pahlavi）留下了一个空位。

[Script.Bali]
Name=巴厘文字（Balinese）
Lang=巴厘语（Balinese），萨萨克语
Text=它源自 [[ps:Kawi|卡维文字]]（古爪哇文字）。其固有元音是 {{t|a}}。巴厘文字在日常使用中已被 [[ps:Latn|拉丁文字]] 取代，但在印度教宗教活动中仍然非常重要。

[Script.Bamu]
Name=巴姆穆文字（Bamum）
Lang=巴穆姆语（Bamum，喀麦隆（Cameroon））
Text=这种文字是由喀麦隆西部的巴穆姆苏丹易卜拉欣·尼奥亚（Ibrahim Njoya）发明的。它经历了从 A 到 G 共七个版本（阶段）的演变，从最初的表意文字（象形）最终演变为音节文字。但是，尼奥亚的字母表并不能表达所有的声调，因此存在许多同形异义词（homographs）。\n\n1918 年法国人入侵，推翻了尼奥亚，并将该语言转用 [[ps:Latn|拉丁文字]]，但这套文字在尼奥亚于 20 世纪 30 年代去世前，仍在有限范围内继续使用。2007 年曾启动一项复兴计划，但进展甚微。你可以在 Unicode 的辅助平面中 [[pk:16800|看到]] 尼奥亚早期的艺术作品（指早期版本的字符）。\n\n辅音最初是清音，加上同一个元音符号后变为浊音：{{sm|ꚫ}} pa + {{sm|ꚠ}} a = ba。音节后的元音会替换原有元音：{{sm|ꚫ}} pa + {{sm|ꚧ}} o = po。字符上方的扬抑符（Circumflex）会以某种方式改变音节——例如加入声门塞音、去除鼻音化或改变元音……顶部的横线起到 [[pt:virama|止音符]]（virama）的作用，用于去除音节中的元音，目前仅发现用于 13 个符号之上。

[Script.Bass]
Name=巴萨文字（Bassa Vah）
Lang=巴萨语（Bassa）
Text=一位名叫托马斯·刘易斯（Thomas Lewis）的巴萨族人发现，来自美洲的前奴隶们使用一种奇特的文字。不过也有其他资料显示，这套文字其实是他自己创造的。巴萨人称这种文字为 Vah——意为“抛出一个符号”（throw a sign）。这种本土文字在 20 世纪曾广泛流传，但在 21 世纪，它正被 [[ps:Latn|拉丁文字]] 稳步取代。

[Script.Batk]
Name=巴塔克文字（Batak）
Lang=巴塔克语族（Batak，苏门答腊）
Text=巴塔克文字，就像其他印度尼西亚文字一样，源自 [[ps:Kawi|卡维文字]]（古爪哇文字）。德国人，随后是荷兰人，开始向岛民教授巴塔克文字和 [[ps:Latn|拉丁文字]]。在第一次世界大战前不久，巴塔克字母表被停用，并最终被拉丁字母取代，后者成为了印度尼西亚语的主要文字。\n\n其固有元音是 {{t|a}}。在不同的语言（卡罗语、曼代林语、帕克帕克语、托巴语、西马隆贡语）中，字母会有些许不同。这里有两种 [[pt:virama|止音符（virama）]]：水平的用于卡罗语和西马隆贡语，倾斜的用于其他语言。\n: ba {{sm|ᯅ}} + virama {{sm|◌᯳}} = b {{sm|ᯅ᯳}}\n: ba {{sm|ᯅ}} + i {{sm|◌ᯪ}} + ng {{sm|◌ᯰ}} = bing {{sm|ᯅᯪᯰ}}

[Script.Beng]
Name=孟加拉文字（Bengali）
Lang=孟加拉语（Bengali），阿萨姆语，梵语（孟加拉国，印度）
Note=11 世纪（从古迪文 Gaudi 分离），15 世纪（形成现代形式）
Text=它属于印度系文字的东部支系。它经由古迪文（Gaudi）起源于 [[ps:Sidd|悉昙文字]]（Siddham），是孟加拉文字和 [[ps:Orya|奥里亚文字]]（Oriya）的祖先。孟加拉文字和阿萨姆文的差异微乎其微，并且已经 [[pt:unification|统一]]。其固有元音是 {{t|ɔ}}，在 Unicode 中按惯例命名为“a”，在其他资料中也写作“ô”。若要改变元音，需添加元音符号：{{sm|ক}}=kô, {{sm|কি}}=ki。\n\n[[pt:virama|止音符]]（Virama，即“hôsôntô”，用于去除固有元音）极其罕见——{{sm|নাক্ }}= nôk——因为孟加拉语拥有大量由两个辅音组成的 [[pt:ligature|合字]]（ligatures）：{{sm|ক্ত}}=ktô。正因如此，孟加拉文被认为是世界上最美丽的文字之一。合字输入是标准化的：第一个字母，止音符，第二个字母。\n\n孟加拉国是仅有的两个拥有自己独特文字（非 [[ps:Arab|阿拉伯文]]，非 [[ps:Latn|拉丁文]]，非 [[ps:Cyrl|西里尔文字]]）的伊斯兰国家之一。另一个是 [[ps:Thaa|马尔代夫]]。

[Script.Berf]
Name=贝里亚埃尔菲文字（Beria Erfe）
Lang=扎加瓦语（Zaghawa，即贝里亚语）
Text=这套文字是由一位名叫亚当·塔吉尔（Adam Tajir）的学校教师，根据骆驼的部落烙印（clan brands）创造出来的。除了这些独特的符号（glyphs）外，这套字母表在结构上其实是对 [[ps:Arab|阿拉伯文字]] 的一种粗糙模仿。2000年，兽医西迪克·亚当·伊萨（Siddick Adam Issa）对这套文字进行了改良，使其变得颇受欢迎。\n\n贝里亚文字有一个非常奇特的特征：大写字母是向下延伸的。声调则使用普通的 [[pk:0300|变音符号]] 来标记：àáā。数字和标点符号则采用欧洲（拉丁）风格。

[Script.Bhks]
Name=拜克舒基文字（Bhaiksuki，箭头文字）
Lang=梵语（Sanskrit）
Text=它曾在 11 至 12 世纪 的东印度地区使用，并被花剌子模（今土库曼斯坦/乌兹别克斯坦一带）的学者比鲁尼（Al-Biruni）所记载。第一块铭文于 1884 年在加德满都被发现，据推测这就是比鲁尼笔下的“拜克舒基文”。目前仅存 4 部手稿和 11 块铭文，且全部为佛教文献。数字 0 和 3 的写法尚不明确，通常借用相似文字的写法。代表长元音 L 的起首字母也是未知的。\n\n其固有元音是 {{t|a}}，其余元音通过添加元音符号来表示，而辅音则通过 [[pt:virama|止音符]]（virama）变为纯辅音。由于存在广泛的“辅音-辅音”[[pt:ligature|连字]]（ligatures）系统，显式的止音符仅在词尾出现。\n: ka {{sm|𑰎}} + i {{sm|◌𑰰}} = ki {{sm|𑰎𑰰}}\n: ka {{sm|𑰎}} + virama {{sm|◌𑰿}} = k {{sm|𑰎𑰿}}\n: ka {{sm|𑰎}} + virama {{sm|◌𑰿}} + ta {{sm|𑰝}} = kta {{sm|𑰎𑰿𑰝}}

[Script.Bopo]
Name=注音符号（Bopomofo）
Lang=中文（Chinese）
Text=注音符号（Bopomofo，得名于其前四个字母），又称注音符号（Zhuyin Fuhao），是一套由吴稚晖在 1912 至 1913 年间发明，并于 1918 年正式采用的汉语注音系统。\n\n作者（吴稚晖）在国民党（Kuomintang）中身居高位，这注定了该系统的命运：在毛泽东掌权（1949年）后，它仅在中国台湾地区使用。在那里，注音符号也正逐渐被通用的拼音（Pinyin，即汉字的罗马化拼写）所取代，目前主要用于儿童的启蒙教学、手机输入法以及字典的读音检索。\n\n2007年，黑莓（Blackberry）智能手机在台湾上市，但它仅支持通过拼音输入，结果遭遇了低需求。在随后的版本中，RIM（黑莓制造商）承诺也会加入注音输入功能。

[Script.Brah]
Name=婆罗米文字（Brahmi）
Lang=梵语，巴利语，古印度语言
Note=公元前 3 世纪之前（确凿无疑），公元前 8-7 世纪（主流假说）
Text=没人确切知道婆罗米文字是何时出现的，它的祖先是谁——通常认为它源于公元前8-7世纪的[[ps:Armi|阿拉米文字]]（Aramaic）。另一些学者则将婆罗米文字与更古老且尚未破译的印度河文字（Indus script）联系起来。来自可靠来源的最古老实物是阿育王石柱（公元前3世纪）。更早的来源年代测定模糊不清。\n\n婆罗米文字具有以下特征：从左向右书写，辅音字母代表带有{{t|a}}音素的音节，其余元音通过变音符号添加，固有的{{t|a}}通过[[pt:virama|止音符（virama）]]去除。\n\n源自婆罗米的文字极大地改变了字符的图形和固有音素，但保留了这些特征，因此被称为“婆罗米系元音附标文字”（Brahmic abugidas）。\n\n辅音连字通常以字母堆叠的形式书写：brāhmī={{sm|𑀩𑁆𑀭𑀸𑀳𑁆𑀫𑀻}}（在Windows 7/8上可能无法正确渲染）。\n\nUnicode并不按时间和地点区分婆罗米文字；大多数字体都接近阿育王石柱的几何风格。到了公元5世纪，婆罗米文字分化为两大支系：\n* 北系（=笈多文，后婆罗米文，北婆罗米文）→ [[ps:Shrd|夏拉达文字]]（Sharada），[[ps:Sidd|悉昙文字]]（Siddham），[[ps:Deva|天城文字]]（Nagari），[[ps:Tibt|藏文字]]（Tibetan），[[ps:Bhks|拜克舒基文字]]（Bhaiksuki）；\n* 南系 → [[ps:Gran|古兰塔文字]]（Grantha），[[ps:Khmr|高棉文字]]（Khmer）……高棉文字、[[ps:Sinh|僧伽罗文字]]（Sinhala）以及其他非印度文字通常被单独划分为东南支系。

[Script.Brai]
Name=盲文凸印
Lang=世界主要语言，包括拉丁语、西里尔语、婆罗米系文字、阿拉伯语、中文。
Text=盲文是一种专为盲人设计的点字书写系统。它使用 2×3 的点阵组合进行二进制编码，有时也会增加第四行。即使是英式盲文和美式盲文，其编码也有所不同。它拥有多种“模式”（字母、数字、高亮），并通过特殊字符进行“切换”。\n\n路易·布莱叶（Louis Braille）是一位皮革匠的儿子，他在 3 岁时被锥子刺伤而失明。布莱叶设法进入了瓦伦丁·阿维（Valentin Haüy）创办的盲人学校，在那里使用的是线条凸印字体。布莱叶的另一个原型是查尔斯·巴比耶（Charles Barbier）的“夜视书写法”（night writing）。巴比耶使用的是 2×6 的矩阵，每列压印 1 到 6 个点，这对于偶尔通过触觉阅读的视力正常的军官来说还可以，但对于阅读长篇文本的盲人来说就不太好用了。布莱叶通过使用二进制代码缩小了点阵。布莱叶在 15 岁时发明了他的代码，并在阿维的学校工作，但视力正常的老师们强烈反对，以至于直到他去世 2 年后，盲学生才说服老师们采用这套系统。\n\n布莱叶实现了盲人辅助技术的工业化：易于压印，当在正常文本旁边甚至上方压印时，不会干扰视力正常人的阅读。

[Script.Bugi]
Name=布吉文字（Buginese，隆塔拉文字（Lontara））
Lang=布吉语（Buginese）以及苏拉威西岛的其他语言
Text=布吉文字，又称隆塔拉文字（Lontara），是经由[[ps:Kawi|卡维文字]]（Kawi）演变而来的[[ps:Brah|婆罗米文字]]（Brahmi）的后裔，其运作原理也与之相似。自荷兰殖民时期以来，它正逐渐被[[ps:Latn|拉丁文字]]（Latin）所取代。“隆塔拉”（Lontara）这个名字源于当地的一种棕榈树，布吉人曾用这种树的叶子来书写。\n\n其固有元音是{{t|a}}：{{sm|ᨀ}}=ka，{{sm|ᨀᨚ}}=ko。词首元音则附加在字母{{sm|ᨕ}}上：{{sm|ᨕᨚ}}=o。[[pt:virama|止音符（Virama）]]是缺失的：最常用的辅音连字有单独的字母表示，其余的则不书写。隆塔拉文的这一“缺陷”甚至被用作一种谜题：正确解读双关语并找出隐藏的含义。一些古文字专家会使用止音符。

[Script.Buhd]
Name=布希德文字（Buhid）
Lang=布希德语
LangNote=民都洛岛（Mindoro Island）是菲律宾中部的一个岛屿，位于米沙鄢群岛最西端，北对吕宋岛西南部。
Text=该文字由菲律宾的一个少数民族——曼扬人（Mangyan）使用。这种文字可以追溯到[[ps:Brah|婆罗米文字]]（Brahmi），并且是[[ps:Tglg|他加禄文字]]（Tagalog）的“姊妹文字”。\n\n该语言只有 15 个辅音和 3 个元音：{{t|a}} 是固有元音，{{t|i}} 和 {{t|u}} 是元音符号。词首元音有单独的字母。其他辅音可能会出现在音节之间，但它们通常被省略：例如 {{sm|ᝐᝒᝑᝋᝓ}} 意为 ''sihamu''，但实际发音却是 ''singhanmu''。

[Script.Cakm]
Name=查克马文字（Chakma）
Lang=查克马语（Chakma）
Text=说查克马语的人很多，它并未出现在濒危语言列表中，但这种文字正逐渐被[[ps:Beng|孟加拉文字]]（Bengali）所取代。这种文字源自[[ps:Mymr|缅甸文字]]（Myanmar），历史非常悠久，可能比已知的缅甸文实物（11世纪）还要早。\n\n它是一种婆罗米系的元音附标文字，固有元音是 {{t|ā}}（长元音 a），并且经常使用 [[pt:virama|止音符（virama）]]——即“maayaa”。第二种止音符用于构建连字，但其中大部分在 2001 年的文字改革中被废除了。\n: kā {{sm|𑄇}} + i {{sm|◌𑄨}} = ki {{sm|𑄇𑄨}}\n: kā {{sm|𑄇}} + maayaa {{sm|◌𑄴}} = k {{sm|𑄇𑄴}}\n: kā {{sm|𑄇}} + virama {{sm|◌𑄳}} + tā {{sm|𑄖}} = ktā {{sm|𑄇𑄳𑄖}}

[Script.Cari]
Name=卡里亚文字（Carian）
Lang=卡里亚语（Carian，安纳托利亚）
Text=该文字使用于公元前 7 世纪至公元前 1 世纪。字母表存在许多变体。在安纳托利亚（小亚细亚），从左到右的书写方式占主导地位，而在埃及的雇佣兵则使用从右到左的书写方式。\n\n当时的苏联科学家维塔利·舍沃罗什金（Vitaly Shevoroshkin）在 1960 年证明了该文字是拼音文字（alphabetic），而非音节文字（syllabic）。关于破译的关键著作（伊格纳西-哈维尔·阿迪埃戈 Ignasi-Xavier Adiego 著）出版于 1993 年。1996 年发现的一块带有[[ps:Grek|希腊文字]]的双语铭文证实了他是正确的。仍有一些字符尚未被知晓。

[Script.Cans]
Name=加拿大原住民音节文字（Canadian Aboriginal syllabics）
Lang=加拿大原住民语言：克里语、奥吉布瓦语（阿尔冈昆语系）、纳斯卡皮语、因纽特语（爱斯基摩语系）……
Text=由传教士詹姆斯·埃文斯（James Evans）于 1833 年发明。在研究奥吉布瓦语（Ojibwe）时，他遇到了两个难题：大量重复的音节使得书写变得非常冗长，而且学生们经常混淆英语规则和原住民语言规则。正因如此，他为克里语（Cree）创造了一种全新的文字（后来被一些奥吉布瓦部落采用）。\n\n元音标记通过旋转字母来实现：ke={{sm|ᑫ}}，ki={{sm|ᑭ}}，ko={{sm|ᑯ}}，ka={{sm|ᑲ}}。更复杂的音节（例如长元音）则用变音符号书写：kii={{sm|ᑮ}}。单纯的辅音则是一个小字母：k={{sm|ᒃ}}。

[Script.Cham]
Name=占文字（Cham）
Lang=占语（Cham）
Text=占文源自帕拉瓦文（Pallava，早期的[[ps:Gran|古兰塔文字]]），其固有元音是 {{t|a}}。它没有 [[pt:virama|止音符]]（即“去除元音”的符号），而是通过书写词尾辅音来表示：{{sm|ꨆ}}=ka，{{sm|ꨆꨯ}}=ko，{{sm|ꨆꨯꩃ}}=kong。\n\n大多数占族人信奉伊斯兰教并使用[[ps:Arab|阿拉伯文字]]（Arabic）书写，只有越南的一些占族人仍在使用占文字。

[Script.Cher]
Name=切罗基文字（Cherokee）
Lang=切罗基语（Cherokee）
Text=未来的酋长、切罗基文字的发明者塞阔雅原本是个文盲，但他从现有的书籍中借用了字符——因此这些字母的含义与原型语言（英语）中的完全不同。例如，元音 {{t|i}} 是用字母 {{sm|Ꭲ}} 来书写的。\n\n他的第一个学生是他六岁的女儿阿约卡（Ayoka）。这项发明起初遭到了怀疑，他被视为被附身了（或中邪了），但塞阔雅和阿约卡出色地通过了一项测试，他们互相朗读对方记下的笔记。这种文字迅速在部落中传播开来，到 1830 年，{{%|90}} 的切罗基人都具备了读写能力。\n\n自 1828 年起，塞阔雅参与了与美国政府关于切罗基土地的谈判。

[Script.Chis]
Name=奇索伊文字（Chisoi）
Lang=库尔马利语（Kurmali）
Text=库尔马利语通常使用[[ps:Deva|天城文字]]（Devanagari）、[[ps:Orya|奥里亚文字]]（Odia）、[[ps:Beng|孟加拉文字]]（Bengali）或[[ps:Latn|拉丁文字]]（Latin）书写。这种文字是由贾扬塔·库马尔·马哈塔（Jayanta Kumar Mahata）创造的。字母形状大致基于当地的文字。名字“Chisoi”源自一首童谣。\n\n尽管它与[[ps:Sora|索拉文字]]（Sora）或[[ps:Wara|瓦兰齐地文字]]（Warang Citi）相似（固有元音 {{t|ɔ}} 可以通过 [[pt:virama|止音符]] 静音），但资料一致认为：它是一种拼音文字（alphabet）。

[Script.Chrs]
Name=花剌子模文字（Chorasmian）
Lang=花剌子模语（Chorasmian，现代土库曼斯坦/乌兹别克斯坦地区）
Text=该语言在阿姆河（Amu Darya）附近的花剌子模地区使用，直到13世纪，逐渐被波斯语取代。科学家比鲁尼（Biruni）和神学家扎马赫沙里（Zamakhshari）都讲这种语言——但源自[[ps:Armi|阿拉米文字]]（Aramaic）的古老文字在8世纪被[[ps:Arab|阿拉伯文字]]（Arabic）所取代。\n\n阿拉米字母表中的22个字母里，有三个——''teth, sadhe, qoph''——没有对应的花剌子模字母。有两个字母有变体，总共有21个字母。在大多数铭文中，字母是不连写的，只有在形状允许的情况下才较少见地连写。

[Script.Copt]
Name=科普特文字（Coptic）
Lang=科普特语（Coptic）
Text=该语言起源于[[ps:Egyp|古埃及语]]，是研究古埃及语的重要资料来源；而其文字则源自[[ps:Grek|希腊文字]]。世俗体（Demotic）是一种意音文字（ideo-consonant），而用希腊字母书写埃及语（即所谓的“古科普特文字”）早在公元前6世纪就已经被常规使用，这比亚历山大大帝征服埃及要早得多。基督徒在公元3世纪左右完成了从世俗体到希腊文的最终转变。科普特字母表本身是在借用了世俗体中的6或7个字母（取决于方言）后形成的。科普特语的上埃及（Upper Egypt）方言在公元4世纪成为文学语言，到了11世纪，它被下埃及（Lower Egypt）的方言所取代。\n\n“Copt”（科普特）一词是“Egypt”（埃及）在[[ps:Arab|阿拉伯文字]]影响下的缩略形式。它的含义从指代所有埃及人转变为专指埃及基督徒。科普特语言和文字至今仍被科普特人作为礼仪用途使用。科普特人现在说阿拉伯语，作为日常会话语言的科普特语在17至19世纪期间消亡。\n\n{{GrekCoptUni}}

[Script.Cpmn]
Name=塞浦路斯-米诺斯文字（Cypro-Minoan）
Lang=埃特塞浦路斯语（Eteocypriot，推测），以及菲利士语（仅存少量铭文）
Text=据推测，该文字源自[[ps:Lina|线性文字 A]]（Linear A）。约在公元前11世纪，它演变成了[[ps:Cprt|塞浦路斯音节文字]]（Cypriot）。铭文发现于塞浦路斯和巴勒斯坦地区。\n\n学者们对大约30个字符达成了共识，但完全破译的前景尚不明朗：目前仅存250篇铭文，总字符数约为{{n|2500}}个。作为对比：尚未破译的线性文字 A 有 {n|7000}} 个字符，而[[ps:Linb|线性文字B]]（Linear B）在破译时拥有 {n|30000}} 个字符。\n\n图中的图像是真实的，字体基于迈克尔·埃弗森（Michael Everson）2020年的描摹。

[Script.Cprt]
Name=塞浦路斯音节文字（Cypriot Syllabary）
Lang=古希腊语、埃特塞浦路斯语（Eteocypriot）、腓尼基语（仅存一篇短铭文）
Text=它源自[[ps:Lina|线性文字 A]]（Linear A），经由[[ps:Cpmn|塞浦路斯-米诺斯文字]]（Cypro-Minoan）演变而来（请勿混淆！）。使用时间从公元前11世纪持续到公元前 3 世纪。目前尚未发现公元前 9 至 8 世纪的铭文，之后该文字分化为两个分支：帕福斯（Paphos）分支保留了从右向左（→）的书写方向，而塞浦路斯通用分支则翻转为从左向右（←）。\n\n该文字于 1871 年通过新发现的与[[ps:Phnx|腓尼基文字]]（Phoenician）的双语铭文被部分破译，并在 1876 年前被完全破译。

[Script.Cyrl]
Name=西里尔文字（Cyrillic）
Lang=俄语、乌克兰语、白俄罗斯语、卢森尼亚语、保加利亚语、马其顿语、塞尔维亚-克罗地亚语（塞尔维亚地区）、哈萨克语、吉尔吉斯语、塔吉克语以及俄罗斯的少数民族语言
Text=约公元863年，拜占庭传教士西里尔（Cyril）和美多德（Methodius）在摩拉维亚（Moravia）传教时发明了[[ps:Glag|格拉哥里文字]]（Glagolitic）。不久西里尔去世，拜占庭传教士被驱逐至保加利亚。那里的人们通晓[[ps:Grek|希腊文]]，其中一位学生（据推测是奥赫里德的克莱门特）以[[ps:Grek|希腊文字]]的安色尔体（uncial script）为基础，并补充了希腊语中缺失的音素，发明了西里尔文字。像 Ѯ 和 Ѳ 这样的希腊字母被加入其中，用于规范希腊借词和数字的拼写。\n\n西里尔文字在南斯拉夫人中传播，并随着基督教化传入罗斯（Rus）。在受罗马（天主教）影响的国家，西里尔文字曾被明令禁止。\n\n现代西里尔文字源于彼得大帝引入的民用字体（civil script）。该字体是西化派与传统主义者之间的妥协产物。\n\n苏联为其大多数加盟共和国的语言制定了西里尔文字方案。随着苏联解体，阿塞拜疆、摩尔多瓦、土库曼斯坦和乌兹别克斯坦转用了 [[ps:Latn|拉丁文字]]。

[Script.Deva]
Name=天城文字（Devanagari）
Lang=印地语、马拉地语、梵语（Sanskrit）以及印度的其他语言
Text=天城文字（字面意思为“来自天神之城”）由婆罗米文字演变而来，并成为大多数印度语言的字母系统。天城文的一个显著特征是：字母悬挂在一条水平线上。\n\n辅音字母代表带有元音 {{t|a}} 的音节（在某些语言和方言中为 {{t|ə}}）。要表示其他音节，需要添加元音符号：ka {{sm|क}} + i {{sm| ि}} = ki {{sm|कि}}。要获得单独的辅音，需添加 [[pt:virama|止音符]]（virama，意为“停止”或“消除”）符号：k{{_}}{{sm|क्}}。\n\n在天城文字中，止音符很少见，且大多出现在词尾，这是因为存在[[pt:ligature|连字]]：\n: ka {{sm|क}} + 止音符 {{sm|◌्}} + ša {{sm|ष}} = kša {{sm|क्ष}}\n\n“Unicodia”因覆盖范围广而使用“Noto Serif Devanagari”字体。在实际文本中，最好使用其他字体：例如 [[http://www.sanskritweb.net/itrans/index.html#SIDDHANTA|Siddhanta]] 或 [[https://software.sil.org/annapurna/|Annapurna SIL]]。

[Script.Diak]
Name=迪维希文字（Dives Akuru，古马尔代夫文字（ancient Maldivian））
Lang=迪维希语（Divehi，马尔代夫语）
Text=该文字在马尔代夫由[[ps:Gran|古兰塔文字]]（Grantha）演变而来，一直使用到 18 世纪，在部分岛屿甚至延续到 20 世纪。学者将早期的形式（12 世纪以前）称为“埃维拉阿库鲁文”（Evela Akuru）（这是后世术语，并非当时的自称！）。随着 1153 年从佛教改信伊斯兰教，“埃维拉”演变成了“迪维希”，但仍保持从左向右的书写方向。自 17 世纪以来，它逐渐被 [[ps:Thaa|它拿文字]]（Thaana）取代。\n\n古马尔代夫语拥有丰富的音位和字母变体：同一份文件中，词首元音既有作为独立字母的形式，也有作为[[pu:11925]]（辅音）上的附标形式。“迪维希”文字保留了后一种形式，舍弃了腭音和送气辅音。\n\n固有元音是{{t|a}}，可通过元音[[pt:combining|附标]]替换为其他元音，在词尾则通过 [[pt:virama|止音符]] 符号（halanta）去除。在词中，止音符意味着元音“u”的变读。另一种止音符纯粹是虚拟的，用于辅音连写——即两个字母直接粘在一起（此外还存在 13 种如“sta”这样的[[pt:ligature|连字]]）。\n: ka {{sm|𑤌}} + i {{sm|◌𑤱}} = ki {{sm|𑤌𑤱}}\n: ka {{sm|𑤌}} + halanta {{sm|◌𑤽}} = k {{sm|𑤌𑤽}}\n: ka {{sm|𑤌}} + virama {{sm|◌𑤾}} + ta {{sm|𑤛}} = kta {{sm|𑤌𑤾𑤛}}\n: sa {{sm|𑤬}} + virama {{sm|◌𑤾}} + ta {{sm|𑤛}} = sta {{sm|𑤬𑤾𑤛}}\n: sa + halanta + ṭa + halanta + na = súṭúna {{sm|𑤬𑤽𑤖𑤽𑤟}}

[Script.Dogr]
Name=多格拉文字（Dogra）
Lang=多格拉语（Dogri）
Text=多格拉语是印度的一种语言。其文字借用自[[ps:Takr|塔克里文字]]（Takri），于 19 世纪中叶在兰比尔·辛格（Ranbir Singh）大君统治时期进行了标准化。兰比尔于 1885 年去世后，在英国人的压力下，[[ps:Arab|乌尔都语]]（Urdu）被选为官方语言。20 世纪，使用[[ps:Deva|天城文字]]（Devanagari）书写逐渐占据主导地位，而自 21 世纪以来，人们开始对本土文字重新产生兴趣。\n\n多格拉文字属于婆罗米系元音附标文字，固有元音为{{t|ə}}（在 Unicode 惯例中通常标记为“a”），在非重读音节中会像[[ps:Guru|旁遮普语]]（Punjabi）那样大幅弱化。多格拉文字中也存在[[pt:ligature|连字]]，但在此字体中未编码。这就是为什么[[pt:virama|止音符（virama）]]在多格拉文字中很少见，它仅见于该语言的自称中：{{sm|𑠖𑠵𑠌𑠤𑠬}} {{t|do-gᵊ-rā}}。\n\n数字借用了塔克里文字。

[Script.Dsrt]
Name=德瑟雷特文字（Deseret，摩门文字（Mormon））
Lang=英语，以及部分美洲原住民语言
Text=19 世纪曾有许多尝试为英语创造一种表音文字，摩门教（耶稣基督后期圣徒教会）的第二任领袖杨百翰（Brigham Young）既不是第一个，也不是最后一个。据称，这种文字将为移民提供一个更容易学习英语的机会。主要工作由帕利·普拉特（Parley Pratt）和乔治·瓦特（George Watt）完成。\n\n“德瑟雷特”（Deseret，意为“蜜蜂”，源自《摩尔门经》中的一种语言）是摩门教州（Mormon state）的一个项目，其实施规模小于“犹他”（Utah），但在摩门教徒中具有象征意义（例如，“德瑟雷特大学”，现为“犹他大学”）。\n\n该字母表特意设计为没有上伸笔画（ascenders）和下延笔画（descenders），以减少金属活字的磨损。在现代字体中，有时会添加上伸和下延笔画。\n\n有四本书是用这种新字母表出版的。当杨百翰意识到出版整个图书馆的藏书需要多少费用时，实验就停止了。\n\n1997 年，该字母表被编码进 [[pt:private|ConScript Unicode Registry]]（ConScript Unicode注册表）。2001 年，当德瑟雷特文字正式出现在Unicode 中时，它被移除。

[Script.Dupl]
Name=杜普雷速记文字（Duployan shorthand）
Lang=最初是法语，然后是罗马尼亚语、英语、西班牙语、德语，以及部分美洲原住民语言
Text=由法国神父埃米尔·迪普洛耶（Émile Duployé）发明的速记系统。被归类为几何速记法（字符由点、线、圆构成）和字母速记法（同等重视辅音和元音）。\n\n单词通常一笔写成，书写轨迹可能会远远超出基准线的上方或下方。“Unicodia”为了清晰起见使用旧的“Noto Sans Duployan 2”字体，它只是简单地将一些字形赋予 Unicode 字符。而在 2023 年发布的 Noto 3 字体则真正模拟了复杂的书写规则——它大小达 2 兆字节，包含 {{n|10000}} 个字形和 500 条规则，在佩罗英语系统（Perrault system for English）中，“cats”一词（K+A+TS，[[pc:1BC05]]+[[pc:1BC41]]+[[pc:1BC36]]）看起来像这样：\n:{{DuplCats}}

[Script.Egyp]
Name=埃及象形文字（Egyptian Hieroglyphs）
Lang=古埃及语
Text=埃及文字经历了一条常规的发展道路：从表意文字（用图画传达词义），发展到表意符号（出现抽象概念——例如“太阳”的象形字意味着“白天”），再到辅音文字（开始出现表音符号）。我们在其他发达文明中也见过同样的路径，例如 [[ps:Xsux|苏美尔文明]]。\n\n书写方向主要是从右向左，有时也会从左向右或从上到下。人物和动物符号总是面朝一行文字的开头。由于学者们为了方便通常会将文本镜像处理，因此在计算机编码中被设定为从左向右的脚本。\n\n除了圣书体，还有两种未被单独编码的字体：\n僧侣体（意为“神圣的”）——大幅简化的圣书体；用于书籍和商业文件；\n世俗体（意为“人民的”）——出现于公元前7世纪，具有更多字母化特征；最初用于信件和商业文件，后来也用于书籍。\n\n但我们对圣书体最为熟悉，因为它们被很好地保存在石刻中。尽管世俗体不断普及，圣书体仍在使用，尽管理解这种复杂文字的人不断减少。随着基督教的传入，圣书体最终被废弃，最后的铭文日期为公元 394 年。\n\n利用 [[ps:Grek|希腊文字]] 的双语对照和 [[ps:Copt|科普特语]] 的知识，让-弗朗索瓦·商博良在19世纪20年代成功解读了最初的人名，然后是文本，随后不久便去世了。他的研究成果在他去世很久之后的 19 世纪 60 年代才得到验证。\n\n在  Windows 字体中，有三个阴茎的象形字被隐藏了——只有在与其他象形字相邻时才会显示。\n在 Unicode 5.2（2009年）中，示例字符取材于足够古老的历史资料（来自 1957 年艾伦·加德纳的书籍），但比较原始。在Unicode 9.0（2016年）中，它们由专业设计师重绘，在一定程度上偏离了真实。自 Unicode 14.0（2021 年）以来，埃及学家正在修正错误，有些字符（例如1309A）甚至被修改了两次。头发和胡须的样式定义了所画人物的身份——是神、国王、埃及人还是外国人。

[Script.Elba]
Name=埃尔巴桑福音字母（用于阿尔巴尼亚文字（Albanian））
Lang=阿尔巴尼亚语（Albanian）
Text=唯一的来源是 18 世纪中叶的《埃尔巴桑福音书》，全书仅 59 页，尺寸只有 7×10 厘米。1945 年，亲纳粹的语言学家兼收藏家莱夫·诺西被社会主义政府逮捕，随后被判处死刑，而这份手稿正是在他的收藏中被发现的。其作者通常被认为是阿尔巴尼亚修士格里戈尔·杜什卡（Gregory of Durrës）。\n\n{{Albanian}}\n\n请勿与 [[ps:Todr|托兹里]] 字母混淆，后者有时也被称为爱尔巴桑文字！

[Script.Elym]
Name=埃利迈文字（Elymaic）
Lang=埃兰语（Elamite，波斯湾地区）
Text=波斯帝国在亚历山大大帝的军事打击下灭亡后便不复存在。亚历山大的继承者们无力维持这个庞大的多民族帝国，在帝国分崩离析后，埃利迈斯王国便与其他国家一同出现了。\n\n该国存在于公元前 147 年至公元 224 年，经常臣服于帕提亚（安息帝国）的统治，并拥有一种源自 [[ps:Armi|阿拉米文字]]、字母不连写的文字。除了空格之外，目前尚未发现其他标点符号。其本土的字母名称已不可考，目前使用的是借用的阿拉米字母名称。\n\n请勿与线性埃兰文字（公元前 2000 年，2020 年破译）和埃兰楔形文字（公元前 1 千纪，19 世纪 40 年代破译）混淆。

[Script.Ethi]
Name=埃塞俄比亚文字（Ethiopic，Ge’ez）
Lang=阿姆哈拉语 {{nspk}}，提格里尼亚语（截至 2020 年约 1000 万人使用）以及其他埃塞俄比亚闪米特语言
Note=作为元音附标文字
Text=埃塞俄比亚文字（即吉兹字母）最初是用于书写吉兹语的，这门语言在 13 世纪就不再作为日常口语使用了。这种文字源自 [[ps:Sarb|南阿拉伯文字]]，随着公元 4 世纪基督教的传入，出现了元音标记。吉兹语至今仍被埃塞俄比亚基督徒作为礼仪语言使用，而这种文字系统则传播到了埃塞俄比亚的其他语言中。\n\n它拥有一套 [[ps:Grek|希腊式]] 的数字系统，仅用 26 个辅音字母来表示 1 到 9 以及 10 到 90 的数值。例如 83692 写作 {{sm|፰፼፴፮፻፺፪}}，即 8-10000-30-6-100-90-2。\n\n自 20 世纪末以来，其影响力逐渐减弱。除了埃塞俄比亚闪米特语族（以及布林语——属库希特语族，梅坎语——属尼罗-撒哈拉语系）之外，其他语言都开始引入[[ps:Latn|拉丁文字]]。

[Script.Gara]
Name=加莱文字（Garay）
Lang=沃洛夫语 {{nspk}}，曼丁卡语 {{nspk|mnk}}
Text=非洲独立后，涌现出了许多新的文字系统。这一种是由来自塞内加尔的阿萨内·法耶创造的。加莱（Garay）这个名字来源于当地的一个洞穴。\n目前的使用群体很小，大约有 200 人。沃洛夫语和曼丁卡语通常使用 [[ps:Latn|拉丁文字]]、[[ps:Arab|阿拉伯文字]] 和 [[ps:Nkoo|西非书面文字]] 书写。\n\n大写字母带有一个大钩子。源自阿拉伯的文字通常字母连写，但加莱文字（Garay）不连写。有时整个单词下方会有一条从最后一个字母延伸出来的大花饰下划线。\n\n元音是附着在辅音上的标记。词首元音悬挂在元音载体字母（A）上。\n\n请阅读其自称：{{sm|&rlm;&#68953;&#68938;&#68990;&#68938;&#68988;}}

[Script.Geor]
Name=格鲁吉亚文字（Georgian）
Lang=格鲁吉亚语（Geogian）{{nspk}}，明格列尔语 {{nspk|xmf}} 以及其他卡特维尔语言
Text=没人知道格鲁吉亚文字究竟是在何时创造的，也不知道它的原型是什么。一种广为流传的观点认为，格鲁吉亚字母是由 [[ps:Armn|亚美尼亚]] 字母的创造者梅斯罗普·马什托茨制作的，但这一观点已被科学家们否定。其字母表的排列顺序遵循 [[ps:Grek|希腊]] 模式。\n\n格鲁吉亚语虽然是单字体的，但在历史上 Unicode 编码包含了四种书写风格，按代码顺序排列如下：\n* Asomtavruli——过时的“大写字母”。由于样本匮乏，[[pt:character|字形]] 被归入了Asomtavruli 风格；\n* Mkhedruli——普通的格鲁吉亚文，带有许多上伸和下延笔画；\n* [[pk:1C90|Mtavruli]]——普通格鲁吉亚文的“大写”形式，没有上伸和下延笔画；\n* [[pk:2D00|Nuskhuri]]——斜体的教会 [[pt:minuscule|小写体]]。

[Script.Glag]
Name=格拉哥里文字（Glagolitic）
Lang=原始斯拉夫语（Proto-Slavic）
Text=格拉哥里字母大约是在公元 863 年由拜占庭人西里尔和美多德发明的，目的是执行一项政治任务——将西方传教士驱逐出摩拉维亚，并建立一个独立的教会以防止被法兰克人征服。这次任务失败了，西里尔很快去世，拜占庭人被西方教会驱逐，而从摩拉维亚逃出的难民在保加利亚传播基督教并发明了 [[ps:Cyrl|西里尔文字]]。\n\n直到 20 世纪，人们才最终证实格拉哥里字母比西里尔字母更古老：昂贵的羊皮纸经常被重复使用，在重写本（即擦除旧文本并写上新文本的羊皮纸）中，人们发现格拉哥里文字被西里尔文字覆盖。语言学上的论据也支持这一点。尽管如此，格拉哥里文字与西里尔文字共存直到 19 世纪，并从中借用了字母形式，这也引发了一些争议。有可能“西里尔文字”这个名字最初指的就是格拉哥里文字。\n\n格拉哥里文字在罗斯很少出现，更多是在保加利亚和克罗地亚使用。保加利亚风格是圆体的，克罗地亚风格是方体的，两者都已 [[pt:unification|统一]]。

[Script.Gong]
Name=贡贾拉贡德文字（Gunjala script，贡德语 （Gondi））
Lang=南贡德语（Southern Gondi）
Text=2006 年，在贡贾拉村发现了一些 1750 年的文件。能够阅读这种文字的人后来证实，这是贡德语。这一发现于 2014 年公布，安得拉邦政府随后开始着手复兴这种文字。此外，这种语言实际上没有书面文字，人们偶尔会使用 [[ps:Deva|天城文字]] 和 [[ps:Telu|泰卢固文字]] 来书写。\n\n每个字母代表一个带有 {{t|a}} 的音节。要构成其他元音，则需添加元音符号。该文字不区分长音和短音的 {{t|e}} 和 {{t|o}}，关于是否引入新字母存在争议。[[pt:virama|止音符]]（“去除元音”符号）仅在词尾可见。在辅音连写中，它用于将字母与顶线分离。\n: ka {{sm|𑵱}} + i {{sm|◌𑶋}} = ki {{sm|𑵱𑶋}}\n: ka {{sm|𑵱}} + virama = k {{sm|𑵱𑶗}}\n: ka {{sm|𑵱}} + virama + ta {{sm|𑵳}} = kta {{sm|𑵱𑶗𑵳}}

[Script.Gonm]
Name=马萨拉姆贡德文字（Masaram script，贡德语 （Gondi））
Lang=贡德语（Gondi）{{nspk}}，马拉地语
Text=根据 2011 年的人口普查，有 1300 万人自认为是贡德人，但只有 300 万人掌握贡德语。贡德语通常使用 [[ps:Deva|天城文字]] 和 [[ps:Telu|泰卢固文字]] 书写，但蒙希·曼加尔·辛格·马萨拉姆在 1918 年基于其他印度文字创造了一种文字。这种文字的现代使用率微不足道。\n\n每个字母都有一条横线，代表 {{t|a}} 元音。要获得其他元音，需在该横线上添加元音符号。这里有两个 [[pt:virama|止音符]]：一个是可见的，用于在词尾只保留一个辅音；另一个是不可见的，用于在辅音连写中去掉横线：\n: ka {{sm|𑴌}} + virama + ta {{sm|𑴛}} + virama + va {{sm|𑴨}} = ktva {{sm|𑴌𑵅𑴛𑵅𑴨}}\n\n有几个包含 {{t|r}} 音素的 [[pt:ligature|连字]]：\n: ka {{sm|𑴌}} + ra-kara {{sm|◌𑵇}} = kra {{sm|𑴌𑵇}}

[Script.Goth]
Name=哥特文字（Gothic）
Lang=哥特语（Gothic）
Text=人们认为乌尔菲拉主教创造了这套字母：他将《圣经》翻译成了哥特语，并且不希望神圣的文本是用 [[ps:Runr|如尼文字]] 书写的。公元 4 至 6 世纪的哥特语资料都是用这种文字书写的。\n\n这套字母表源自 [[ps:Grek|希腊文字]]，但字母名称与如尼文字相同。有两个字母仅具有数值意义：{{sm|𐍁}}=90 和 {{sm|𐍊}}=900。由于这套文字的起源如此，那些“看起来像经典哥特体”的字母是用粗笔而不是尖锐物体书写的。\n\n字母 {{sm|𐌹̈}} 由字母 {{sm|𐌹}} 和组合分音符 [[pu:0308]] 组成。

[Script.Gran]
Name=古兰塔文字（Grantha）
Lang=梵语（Sanskrit），泰米尔语（Tamil）
Note=4 世纪（帕拉瓦文物），7 世纪（中古古兰塔文物）
Text=古兰塔文字是 [[ps:Brah|婆罗米文字]] 南部分支演化过程中的一个中间阶段。古兰塔文字的早期变体被称为“帕拉瓦文字”，曾在帕拉瓦王国（275–897）使用。古兰塔文字用于泰米尔语直到 17 世纪，用于梵语直到 19 世纪。它影响了 [[ps:Taml|泰米尔文字]]、[[ps:Mlym|马拉雅拉姆文字]]、[[ps:Sinh|僧伽罗文字]]。印度图书馆中保存了约 20 万件样本，既有写在棕榈叶上的，也有印刷品。\n\n约在 2010 年，试图将古兰塔文字与泰米尔文字进行 [[pt:unification|统一]] 的尝试失败了。由于强烈的反对（泰米尔人中民族主义情绪强烈），这两种文字最终未被统一，仅保留了泰米尔文字和晚期古兰塔文字中相同的数字。\n\n固有元音是 {{t|a}}。辅音连写有多种 [[pt:ligature|连字]]。\n: ka {{sm|𑌕}} + i {{sm|◌𑌿}} {{_}} = ki {{sm|𑌕𑌿}}\n: ka {{sm|𑌕}} + virama {{sm|◌𑍍}} = k {{sm|𑌕𑍍}}\n: ka {{sm|𑌕}} + virama {{sm|◌𑍍}} + ta {{sm|𑌤}} = kta {{sm|𑌕𑍍𑌤}}

[Script.Grek]
Name=希腊文字（Greek）
Lang=希腊语（Greek）
Note=主要假说
Text=希腊文字是基于 [[ps:Phnx|腓尼基文字]] 创造的，而没有参考早期的希腊书写系统，如 [[ps:Linb|线形文字 B]] 和 [[ps:Cprt|塞浦路斯音节文字]]。腓尼基字母是一种 [[pt:abjad|辅音音素文字]]，这对于词根由辅音骨架构成、元音作为后缀的闪米特语系语言来说非常适用：在 [[ps:Arab|阿拉伯语]]（也是一种闪米特语言）中，“jihad”（圣战）是由“mujahid”（圣战者）来完成的。\n\n希腊人添加了元音，使希腊文字成为已知的第一种同时编码辅音和元音的真正字母表。字母的名称没有太大变化，但失去了原有的含义：例如，“alef”（意为公牛）变成了“alpha”。\n\n希腊文字成为了 [[ps:Latn|拉丁文字]]、[[ps:Cyrl|西里尔文字]]、[[ps:Copt|科普特文字]] 的祖先，并且可能也影响了 [[ps:Armn|亚美尼亚文字]] 和 [[ps:Runr|如尼文字]]。\n\n{{GrekCoptUni}}

[Script.Gujr]
Name=古吉拉特文字（Gujarati）
Lang=古吉拉特语（Gujarati） {{nspk}}，阿维斯陀语（Avestan）
Text=古吉拉特文脱胎于 [[ps:Deva|天城文]]，看起来也与其相似，但即便是早期的古吉拉特文也失去了标志性的顶线。其固有元音是 {{t|ə}}。在古吉拉特语（作为主要书写语言）中，[[pt:virama|止音符]] 并不存在，它在计算机排版中仅用于生成辅音连写的 [[pt:ligature|连字]]；但在使用该文字书写的一些小语种中，止音符是存在的。当输入合字时，如果辅音右侧有竖杠，该竖杠会被省略。\n{{smtable|kə|*ક|+ i|**◌િ|= ki|*કિ}}\n{{smtable|dhə|*ધ|+ virama|**◌્|+ kə|*ક|= dhkə|*ધ્ક}}\n\n祆教徒（拜火教徒）为躲避穆斯林而逃往印度，并开始用当地文字书写 [[ps:Avst|阿维斯陀语]]，传统上使用的是古吉拉特文字。这些祆教徒中最著名的一位是弗雷迪·莫库里（Freddie Mercury）（尽管他的父母搬到了遥远的桑给巴尔）。古吉拉特语中缺少字母 {{t|z}}，因此它被写作带有点下符（nukta，即下方的点）的“j”。

[Script.Gukh]
Name=古隆凯玛文字（Gurung Khema）
Lang=古隆语（Gurung）
Text=由巴尔·纳尔辛格·古隆（Bal Narsingh Gurung）发明。1997 年，印度锡金邦承认了古隆语，并将凯玛文定为官方文字。\n\n该文字没有用于辅音连写的合字，[[pt:virama|止音符]]（tholhoma）总是可见的。元音长度标记仅用于 [[pt:normalization|分解]]。标点符号采用 [[pt:ascii|ASCII]] 标准，外加一个来自 [[ps:Deva|天城文字]] 的竖线 danda。\n\n在撰写本文时，凯玛文尚无 Unicode 字体，但在手写体中，空心的鼻化音标记（anusvara）是一个勾号，而当它内部包含一个圆圈时（例如在 E+anusvara 中），则画成一个笑脸。

[Script.Guru]
Name=古木基文字（Gurmukhi）
Lang=旁遮普语（Punjabi）
Text=自 10 世纪以来，旁遮普地区一直使用 [[ps:Shrd|夏拉达文字]]（Sharada），但它无法很好地表达当地语言。新的文字是由锡克教创始人之一、上师安格德（Guru Angad）发明的。他创办了学校，让人们学习本土的旁遮普语，而不是经典的梵语；他还设立了公共食堂（Langar），让人们不分印度教种姓，围坐在一起用餐。\n\n固有元音是 {{t|ə}}（在 Unicode 中按惯例写作“a”）。其余元音通过元音符号添加：{{sm|ਕ}}=kə, {{sm|ਕਿ}}=ki。元音 {{t|ə}} 在非重读音节中会大大弱化，在词尾则完全静音，这一点在该文字的自称中体现得很明显：{{sm|ਗੁਰਮੁਖੀ}} “gu-rᵊ-mu-khii”（古木基）。此外还有下标字母{{-}}{{sm|ਕ੍ਰ}}{{_}}{{t|krə}}，它们按标准方式输入：主字母、[[pt:virama|止音符]]、下标字母。这就是为什么旁遮普语在键盘输入时需要止音符，但在排版印刷中却不需要（因为不显示），不过止音符仍用于字典和梵语中。若要以元音开头书写单词，元音符号需附加在一个“零辅音”上，该符号因元音不同而有所区别。\n\n古木基文字与锡克教紧密相连，其名字意为“出自上师之口”。旁遮普穆斯林则使用沙赫穆基文（Shahmukhi，意为“出自沙阿/国王之口”），这是一种 [[ps:Arab|阿拉伯文字]] 的变体。

[Script.Hang]
Name=谚文（Hangul）
Lang=韩语（Korean）
Text=谚文是一种韩语的音节字母文字（alphasyllabic script）。51 个“字母”（jamo）被组合成近似音节的方块字。\n\n它是由世宗大王领导的一群科学家发明的，世宗大王认为 [[ps:Hani|汉字]] 难以准确表达韩语，且对百姓来说太难学。受过教育的精英阶层曾傲慢地看待谚文，视其为妇女、儿童或方言使用的文字，因此得名“谚文”（eonmun，意为通俗文字/方言文字）。后来的国王甚至曾禁止使用谚文。诗歌的发展和西方传教士的工作在一定程度上推广了谚文的使用。19 世纪末的亲日政府开始禁止一切汉字并推行谚文。在日本吞并朝鲜半岛（1910 年）后，日语被强制推行，也就是在那时，“Hangul”这个名字被创造出来，字面意思是“伟大的文字”。1946 年，在摆脱日本统治后，新的正字法颁布。如今它是朝鲜的唯一文字，也是韩国的主要文字。

[Script.Hani]
Name=中日韩表意文字（CJK Ideographs）
Lang=中文 {{nspk}}，日文 {{nspk|Hira}}，历史上还包括越南语和韩语
LangNote=由北方方言=普通话和几种姐妹语言组成的语支
Text=考古学家已经发现了可以追溯到约公元前 6000 年的图画文字。最早的确切文本铭文是约公元前 1200 年刻在甲骨上的占卜问辞。到了公元前 200 年，汉字的风格已经变得与现代汉字相似。\n\n到了公元纪元，人们其实已经放弃了纯粹的表意文字，但中国出于以下几个原因保留了这种古老的文字系统：\n* 多民族人口——除了建立国家的汉族人，还有大约十多个其他民族，他们至少在书面语上能够互相理解；\n* 适合的语法——词义的细微差别通过虚词（功能词）来指示；\n* 崇尚传统——即使是今天，中国人也相当保守；\n* 某种程度有效的精英政治（科举制）——数千个字符以及书写美观的能力，可以筛选出受过良好训练的人才。\n\n在公元 3 世纪，汉字传到了日本。许多汉字同时拥有中文读音和日文读音：例如，{{sm|月}}（月亮）有中文读音“getsu”和“gatsu”，以及日语固有读音“tsuki”。阅读方式由上下文决定：{{sm|月曜日}}=getsuyōbi（星期一），{{sm|月見}}=tsukimi（赏月）。\n\n汉字在中国、台湾、日本和韩国存在差异。Unicode 并不对这些差异进行编码：书写细节通过字体来传达，即使字体显示不完美，也能理解写的是什么。\n\n越南在 1945 年废除了汉字。朝鲜不使用汉字，韩国也很少使用。\n\n汉语仍然分裂成多种方言，因此无法推行纯粹的拼音文字。

[Script.Hano]
Name=哈努诺文字（Hanunó’o）
Lang=哈努诺语（Hanunó’o） {{nspk}} 以及菲律宾民都洛岛的其他民族
Text=哈努诺文字源自 [[ps:Brah|婆罗米文]]。就像其近亲 [[ps:Tglg|他加禄文字]] 一样，它最初是向外（从左到右）写在竹片上，并从左到右阅读。\n\n{{t|i}} 标记总是在字母上方，而 {{t|u}} 则附着在方便的位置：{{sm|ᜪᜳ}} bu，{{sm|ᜱᜳ}} hu。历史上 {{t|r}} 看起来像一条水平或倾斜的短划线，但在 2010 年代其形状发生了改变。

[Script.Hatr]
Name=哈特拉文字（Hatran，亚述（Ashurian））
Lang=哈特拉（Hatran，亚述（Ashurian））阿拉米语（Aramaic）
Text=[[ps:Armi|阿拉米文字]] 的后裔。在公元 3 世纪之前一直用于哈特拉（现代伊拉克境内），直到哈特拉被萨珊王朝的沙普尔一世（Shapur I）摧毁。所有已知的铭文都很简短，最长的一篇也只有 13 行。

[Script.Hebr]
Name=希伯来文字（Hebrew）
Lang=希伯来语（Hebrew） {{nspk}}、拉迪诺语、意第绪语、阿拉米语，历史上还包括卡拉伊姆语和克里姆查克语\n
Text=约公元前 500 年，在巴比伦统治时期，犹太人从古希伯来文字（它几乎是 [[ps:Phnx|腓尼基文字]] 的翻版）转用 [[ps:Armi|阿拉米文字]]。在犹太神秘主义中，这套字母几乎是宇宙的支柱；这 22 个阿拉米字母一直沿用至今，并在公元前 2 世纪定型为现代形式。\n\n这套文字只书写辅音音素，但有四个字母 {{sm|אהוי}} 可以表示元音，这类字母被称为 [[pt:abjad|matres lectionis]]（读音母）。在公元 6 至 8 世纪，人们发明了元音标记——即字母上方的点，这对于准确诵读《托拉》（Torah）至关重要。\n\n到了公元 10 世纪，希伯来语已退出日常口语，仅作为书面语存在，但希伯来字母也被用于书写犹太人的口语，如意第绪语、拉迪诺语等。随着以色列国的建立，希伯来语作为日常口语得以复兴。

[Script.Hent]
Name=变体假名（Hentaigana）
Lang=日语（Japanese）
Text=变体假名是对那些书写极其潦草的过时 [[ps:Hira|平假名]] 文字的统称。\n\n源自 [[ps:Hani|汉字]] 的万叶假名辅助音节文字——看重的是汉字的读音而非图像意义。到了 10 世纪，万叶假名已被平假名和 [[ps:Kana|片假名]] 取代。当时尚无统一体系，因此单个音节存在多种不同的书写符号。\n\n平假名在 1900 年实现了标准化，每个音节只保留了一个字符。于是变体假名变得就像西方的哥特体或西里尔安色尔体——它被用于明信片、宗教文件、武术学校的证书，以及……餐馆的招牌。\n\n“日本色情动画”（Japornimation）中的“Hentai”是一个同音异义词：它源自 {{sm|変態}}“Hentai”（变态/反常），而变体假名（Hentaigana）则源自 {{sm|変体}}“Hentai”（奇异/变体）。\n

[Script.Hira]
Name=平假名（Hiragana）
Lang=日语（Japanese）
Text=约公元 3 世纪，日本人开始使用 [[ps:Hani|汉字]] 进行书写。源自汉字的万叶假名辅助音节文字随之出现——此时看重的是读音而非字义。平假名其实就是万叶假名的极度草书化写法。\n\n由于女性无法接受（汉字）教育，她们便使用音节文字书写，并且偏爱流畅的平假名，而非潦草的 [[ps:Kana|片假名]]。如今，平假名被用于书写没有对应汉字的词汇、作者或读者不认识的汉字（外来语除外，它们用片假名书写）、词尾变化，同时也用于儿童教学和汉字注音。

[Script.Hluw]
Name=安纳托利亚（卢维）象形文字（Anatolian (Luwian) Hieroglyphs）
Lang=卢维语（Luwian）
Text=这种象形文字是根据发现地点（安纳托利亚 = 小亚细亚）或其记录的语言（卢维语）来命名的。“赫梯”这一名称是不正确的，赫梯语从未用这些圣书体文字书写，尽管最早的圣书体是在赫梯-卢维双语环境下发明的。公元前 12 世纪和 11 世纪发生了青铜时代大崩溃，导致材料匮乏（铭文减少），直到公元前 10 世纪它们才再次出现。约公元前 7 世纪，这些圣书体文字被 [[pt:alphabet|字母]] 文字取代并逐渐被遗忘。\n\n目前已知的圣书体符号约有 500 个。部分符号不仅代表概念，还可以代表音节，但这类符号数量不多。\n\n约在 1800 年，这些象形文字引起了学者的注意，当时人们假设它们是赫梯文字。1915 年，卢维语通过 [[ps:Xsux|楔形文字]] 文献最终被破译；到了 20 世纪 30 年代，针对这些圣书体文字的首批破译成果开始出现。最终，该文字在 1973 年被彻底破译。

[Script.Hmng]
Name=帕哈苗文（Pahawh Hmong）
Lang=白苗和青苗的语言（languages of White and Green Hmongs）
Note=第一阶段
Text=该文字的发明者舒·李（Shong Lue Yang）称，这套文字是神赐予他的。“Pahawh”这个名字意为“联合”。其开发工作从 1959 年持续到 1971 年。当时越南战争正在进行，舒·李的团体受到共产主义势力和亲美势力的双重怀疑，而在文字创造后不久，舒·李就被亲美势力暗杀了。\n\n大多数元音附标文字（Abugidas）都是“辅音核心”的。而帕哈苗文的核心成分是元音，声母辅音位于元音的右侧。例如，“Hmong”这个词 {{sm|𖬌𖬣𖬵}} 就由元音“oob”、辅音“qh”和一个声调符号组成。\n\n该文字共有四个发展阶段；最后一个阶段是在舒·李遇刺前一个月才提出的。目前，不同的苗族群体正在使用第二阶段和第三阶段的文字，而这个（Unicode）字符区块编码了除最初阶段外的所有字符。\n\n同宗族的苗族人被视为兄弟姐妹，因此不应做出任何看似浪漫的行为，甚至不应单独相处。随着苗族人失去了家园，宗族符号可能会被当作徽章佩戴或画在门上。这些字符从未被广泛使用过。

[Script.Hmnp]
Name=创世纪苗文（Nyiakeng Puachue Hmong，谢旺字母（Chervang alphabet））
Lang=白苗和青苗的语言（languages of White and Green Hmongs）
Text=20 世纪 70 年代，越南和老挝的苗族人被迫流亡各国，其中一些人在美国定居。有一部优秀的电影《老爷车》（Gran Torino，2008 年），讲述的就是一位美籍苗族人的命运。\n\n这套文字是由美国福音派教会的一位牧师谢旺·孔（Chervang Kong）在 20 世纪 80 年代创造的。该教会进行了积极的传教工作，这套文字也因此传遍了美国。在亚洲和澳大利亚也有小范围的使用。它使用特殊的符号来表示专有名词，而不是使用大写字母。

[Script.Hung]
Name=古匈牙利（塞凯伊）卢恩文字（Old Hungarian (Székely) runes）
Lang=匈牙利语（Hungarian）
Text=目前尚不清楚古匈牙利卢恩文字与 [[ps:Orkh|突厥]] 文字之间究竟有何关联：是源于突厥文字，还是互为“姐妹”文字？\n\n约公元 1000 年，匈牙利首位国王伊什特万一世（István I）统一了匈牙利部落，皈依基督教，并改用 [[ps:Latn|拉丁]] 文字。但卢恩文字的使用仍在继续，只是逐渐衰落。最后的铭文可追溯至约 1800 年。\n\n对这种文字的研究始于 18 世纪，主要工作在 1900 年左右展开，当时甚至为匈牙利语中剩余的音位创造了新的卢恩符号。匈牙利人以这些卢恩文字为荣，有时会重复使用某些符号，但几乎没人能读懂它们：2017 年，一些恶作剧者将埃尔德（Érd）镇的路牌换成了“Szia”（意为“你好”，这两个词都由 3 个卢恩符号组成），而这一情况竟然一个月都没人发现。

[Script.Ital]
Name=古意大利文字（Old Italic）
Lang=伊特鲁里亚语及意大利其他语言
Text=古意大利字母表源自 [[ps:Phnx|腓尼基]] 文字和早期 [[ps:Grek|希腊]] 文字。后来演变成了 [[ps:Latn|拉丁]] 文字。\n\nUnicode 并不区分意大利的各种语言，而是通过 [[pt:unification|统一]] 将它们合并为一个区块——既包含从左到右书写的，也包含从右到左书写的。

[Script.Java]
Name=爪哇文字（Javanese）
Lang=爪哇语（Javanese），以及爪哇岛上的其他小语种
Text=它源自 [[ps:Kawi|卡维]] 文字。固有元音是 {{t|a}}。[[pt:virama|止音符]] 符号被称为“pangkon”，它是一个长长的钩子，而不是倾斜的短划线。爪哇文字与 [[ps:Bali|巴厘]] 文字非常接近。到了 20 世纪中叶，这套文字已完全被 [[ps:Latn|拉丁]] 文字取代。如今，它仅作为礼仪性文字使用，因为它确实非常美丽。

[Script.Jurc]
Name=女真文字（Jurchen）
Lang=女真语（Jurchen）
Text=女真人（满族的祖先）于 1115 年反抗 [[ps:Kits|契丹人]]，并很快创制了他们自己的文字。\n\n1234 年，女真人被蒙古人征服。1368 年，中国（明朝）推翻了蒙古（元朝），并与仍被（明朝）征服的北方邻居用女真文进行交流。1599 年，满族人改用 [[ps:Mong|蒙古]] 文字。\n\n几乎所有现存的资料都是碑刻和家用器物。只有少数纸质文献幸存下来。

[Script.Kali]
Name=克耶里文字（Kayah Li）
Lang=克耶语（Kayah）（=红克伦，缅甸）
Text=克耶里文字源自 [[ps:Brah|婆罗米]] 文字，由 Htae Bu Phae 于 1962 年创制，旨在应对 [[ps:Latn|拉丁]] 字母的传播——但它的字母没有固有元音，因此它并不是一个 [[pt:abugida|元音附标文字]]。四个元音写作独立的字母，其余的则作为写在 {{sm|ꤢ}} 上方的变音符号。少数来自借词的元音则写作 {{sm|ꤣ}} 上方的变音符号。\n\n在很多方面，克耶里文字都是一种“难民的字母表”：在泰国的难民营里，{{%|90}} 的居民都是为了躲避缅甸军队暴行而逃离的克伦人，在近乎监狱般的恶劣环境中，任何能团结大家的事物都至关重要。克伦人是一个由多个民族组成的群体，包括红克伦、黑克伦、白克伦等，以其民族服装的颜色区分。除了克耶里文，他们的语言还使用 [[ps:Thai|泰文]]、拉丁文和 [[ps:Mymr|缅甸文]] 书写。

[Script.Kana]
Name=片假名（Katakana）
Lang=日语（Japanese） {{nspk|平假名}}
Text=大约公元 3 世纪，日本人开始使用 [[ps:Hani|汉字]] 进行书写。后来出现了一种辅助性的音节文字——万叶假名（Man'yōgana），它源于汉字，但看重的是读音而非字义。万叶假名后来简化成了片假名。\n\n片假名主要用于外来语以及外国人的入门教学。在 1946 年之前，它曾被用来书写词尾（送假名），而如今这一功能已改由 [[ps:Hira|平假名]] 承担。

[Script.Kawi]
Name=卡维文字（Kawi，古爪哇文字）
Lang=梵语（Sanskrit），以及爪哇岛的古老语言：巴厘语、爪哇语、巽他语、马来语
Text=源自 [[ps:Brah|婆罗米]] 系的古老文字，是 [[ps:Java|爪哇文字]] 的祖先。它源自帕拉瓦文（早期的 [[ps:Gran|古兰塔文字]]）。到了 16 世纪，它已被其他文字取代。\n\n卡维文有几种不同的风格，适用于不同的书写形式：刻在铜板上、用墨水写在贝叶上，以及刻在石头上。卡维文字的“标准”风格取自早期的铜板铭文，后来的字符也适应了这种风格。\n\n词与词之间没有空格，以辅音结尾的单词会用 [[pt:virama|止音符]]（killer，即一个大大的钩子）来结束。此外，还有一种用于辅音连写的“虚拟止音符”——字母会堆叠在一起。\n\n印度尼西亚使用的是 [[ps:Latn|拉丁]] 文字，不过确实有一个活跃的群体在现代通信中使用卡维文。目前，人们借用了 [[ps:Bali|巴厘文字]] 和 [[ps:Java|爪哇文字]] 的字符区块。并没有专门为现代卡维文字创制新的编码字符，只是预留了一些空间。

[Script.Khar]
Name=佉卢文字（Kharoshthi）
Lang=犍陀罗语（Gandhari），巴利语（Pali），塞语，梵语
Text=佉卢文字（印度-巴克特里亚文字，喀布尔文字）在中亚和阿富汗地区使用至公元 3 世纪。它起源于 [[ps:Armi|阿拉米文字]]，被认为是 [[ps:Brah|婆罗米文字]] 的“姐妹文字”，且没有后代文字。它具有 [[pt:brahmic|婆罗米系]] 元音附标文字的一个特征——固有元音“a”可以通过元音符号进行改变。[[pt:virama|止音符（Virama）]]纯粹是虚拟的，词尾辅音写作下标形式。此外，已知还有约30种双辅音 [[pt:ligature|连字]]：\n: ka {{sm|𐨐}} + i {{sm|◌𐨁}} = ki {{sm|𐨐𐨁}}\n: dha {{sm|𐨢}} + i {{sm|◌𐨁}} + ka {{sm|𐨐}} + virama {{sm|◌𐨿}} = dhik {{sm|&rlm;&#68130;&#68097;&#68112;&#68159;}}\n: ka {{sm|𐨐}} + virama {{sm|◌𐨿}} + ta {{sm|𐨟}} = kta {{sm|&rlm;&#68112;&#68159;&#68127;}}\n\n存在类似于罗马数字的非定位数字系统。佉卢文于19世纪被发现并迅速被破译。

[Script.Khmr]
Name=高棉文字（Khmer）
Lang=高棉语（Khmer，柬埔寨，截至 2007 年约 1600 万使用者）
Text=和其他东南亚文字一样，它源自帕拉瓦文（早期的 [[ps:Gran|古兰塔文字]]）。它是 [[ps:Thai|泰文字]] 和 [[ps:Laoo|老挝文字]] 的基础。\n\n词与词之间没有空格。辅音有两套：一套固有元音为 {{t|a}}，另一套为 {{t|o}}。这些辅音上的元音符号发音也因此不同。以 {{t|o}} 结尾的辅音也用作韵尾。存在两种 [[pt:virama|止音符]]：一种是可见但已过时的，另一种是用于组合辅音连写的虚拟止音符：第二个辅音会缩小写在第一个辅音下面。例如，自称 {{sm|ខ្មែរ}} 是由以下部分组成的：\n: {{sm|ខ}} {{sm|◌្}} {{sm|ម}} {{sm|◌ែ}} {{sm|រ}}

[Script.Khoj]
Name=可吉文字（Khojki）
Lang=库奇语（Kutchi），信德语（Sindhi，印度）
Text=据传统说法，可吉文是由 14 世纪被派往印度传播伊斯兰教的皮尔·萨达尔丁（Pir Sadardin）发明的。而在更接地气的版本中，它出现于 16 世纪，是兰达文（Landa，一种非常草书的 [[ps:Shrd|夏拉达文字]]）的一个变体。如今，印度的什叶派穆斯林仍在使用和研究它。\n\n它是一种婆罗米系元音附标文字，具有固有元音 {{t|a}}、[[pt:virama|止音符（virama）]]以及四种辅音连字，其中一种是为了解决缺乏“ša”字母的问题，通过点符（nukta）来书写：\n: ka {{sm|𑈈}} + i {{sm|◌𑈭}} = ki {{sm|𑈈𑈭}}\n: ka {{sm|𑈈}} + virama {{sm|◌𑈵}} = k {{sm|𑈈𑈵}}\n: ta {{sm|𑈙}} + virama {{sm|◌𑈵}} + ra {{sm|𑈦}} = tra {{sm|𑈙𑈵𑈦}}&nbsp;&nbsp;（也包括“jnya”和“dra”）\n: ka {{sm|𑈈}} + virama {{sm|◌𑈵}} + sa {{sm|𑈩}} + nukta {{sm|◌𑈶}} = kša {{sm|𑈈𑈵𑈩𑈶}}\n止音符看起来可能像斜杠 {{sm|𑈈/}}。数字看起来像 [[ps:Gujr|古吉拉特]] 数字，并且与之 [[pt:unification|统一编码]]。

[Script.Kits]
Name=契丹小字（Khitan Small Script）
Lang=契丹语（Khitan，中国东北）
Text=这种文字曾在辽国（中国东北）使用。大约于公元 925 年由一位名叫耶律迭剌的学者发明，其基础是 [[ps:Ougr|回鹘文字]]。单词由多达 7 个字符组成的方块书写。截至 1987 年，在已知的 378 个字符中，有 125 个是表意符号，115 个是表音符号，其余的尚未破译。\n\n大字和小字是并行使用的，小字更简单（大字是纯粹的表意文字）。契丹书籍未能流传下来，仅存一些实用器物以及贵族墓碑上的铭文，最晚的约为公元 1200 年。公元 1216 年，契丹人最终被蒙古人和汉人击败。\n\n许多字体会将契丹文字逆时针旋转 90°。而这个字体是像《Daniel Kane. The Kitan Language and Script》这本书中那样，正向显示字符的。由于版权问题，图标展示的是契丹铜镜上的一个字符（由景永时教授描摹），而字体则是由谷歌组装的现代斜体。\n\n最后一个看起来像 [[pt:tofu|豆腐块]] 的方块是无法辨认的字符。它像其他契丹字符一样组成方块。

[Script.Knda]
Name=卡纳达文字（Kannada）
Lang=卡纳达语（Kannada）
Note=与姐妹文字 [[ps:Telu|泰卢固文字]] 分离。
Text=和大多数东南亚文字一样，它源自 [[ps:Brah|婆罗米文字]]。固有元音是 {{t|a}}，可以通过元音符号进行改变：\n: ka {{sm|ಕ}} + i {{sm|◌ಿ}} = ki {{sm|ಕಿ}}\n[[pt:virama|止音符]]（“去除元音”的符号）仅在书写梵语时出现。在计算机输入中，止音符被用来输入辅音连字 [[pt:ligature|连字]]：\n: ka {{sm|ಕ}} + virama {{sm|◌್}} + ta {{sm|ತ}} = kta {{sm|ಕ್ತ}}\n常用于表情符号（颜文字）：<font face='{{fontface}},Cambria' size='+3'>ಠ͜ಠ</font>。

[Script.Krai]
Name=基拉特拉伊文字（Kirat Rai）
Lang=班塔瓦语（Bantawa）
Text=由马哈古鲁·蒂卡·拉姆·拉伊（Mahaguru Tika Ram Rai）发明，其灵感来源于接近 [[ps:Deva|天城文]] 的当地手稿。1995 年，印度锡金邦承认了班塔瓦语（尽管使用了“拉伊”这个更广泛的族群名称，而“基拉特”的范围甚至更广），并指定基拉特文为其官方文字。\n\n虽然它是一种婆罗米系元音附标文字，但它没有 [[pt:ligature|连字]]、叠加符号或其他复杂的渲染规则，所有字符都是普通的 [[pt:spacing|间距字符]]。标点符号“丹达”（danda）是倾斜的，以区别于 {{t|ā}}，因此该文字使用自己独特的丹达，而不是天城文中通用的印度标点。

[Script.Kthi]
Name=凯提文字（Kaithi）
Lang=印地语（Hindi），印度的小语种
Text=这个名字源于书记员种姓（Kayastha）。事实上，它是一种非常 [[pt:cursive|草书]] 风格的 [[ps:Deva|天城文字]] 变体。凯提文在莫卧儿时期的印度东北部被使用，曾被法庭认可，并在 1950–1954 年间作为官方法律文字。人们曾预期它会有更广泛的用途，但该文字遭到了婆罗门的反对，现代印度教徒几乎看不懂凯提文字。\n\n数字看起来像天城文数字，除了 5 和 9，并且与之 [[pt:unification|统一编码]]。

[Script.Lana]
Name=西双版纳老傣文字（Tai Tham，兰纳（Lanna））
Lang=沅语（Yuan）（=北部泰语，=兰纳语），傣泐语，坤语，整个泰国
Text=它源自北泰的兰纳王国（Lanna 或 Lannathai，1296–1558）。后来它被缅甸征服，1774 年又被暹罗（泰国）接管。暹罗是一个多元文化的国家，但在 1912 年未遂政变后，国王开始推行民族主义。1933 年，民族主义者掌权，并销毁了许多傣昙文文献。\n\n像其他类似的文字一样，圆形的字母源于在棕榈叶上书写（直线会顺着叶脉割破叶片）。固有元音是 {{t|a}}。词与词之间没有空格。有两种类型的元音：独立元音和元音符号。没有 [[pt:virama|止音符]]，而是有一个类似的字符用来组合音节：\n: high ha {{sm|ᩉ}} + i {{sm|◌ᩥ}} + sakot {{sm|◌᩠}} + na {{sm|ᨶ}} = hin {{sm|ᩉᩥ᩠ᨶ}}\n它有两套数字：Hora（日常用）和 Tham（神圣用）。

[Script.Laoo]
Name=老挝文字（Lao）
Lang=老挝语（在老挝有 300 万母语者和 400 万第二语言使用者，另有超过 2000 万人在泰国使用 [[ps:Thai|泰文字]] 书写老挝语）
Text=老挝文字在 14 世纪定型。像 [[ps:Thai|泰文字]] 一样，它起源于 [[ps:Khmr|高棉文字]]。在 1960 年共产党进行的改革之后，固有元音和 [[pt:virama|止音符]] 消失了，老挝文字保留了元音附标文字最后的标志——复杂的元音书写规则：{{sm|ເກົ້າ}} ''kao'' “九”。老挝语是有声调语言，我们可以看到这里既有由三个（!）字符组成的元音符号，也有位于辅音 {{sm|ກ}} 上方的声调符号。由于历史原因，许多元音符号实际上是普通的 [[pt:spacing|间距字符]]。\n\n词与词之间没有空格。像泰文一样，字母是 [[pt:acrophonic|首字拼音]] 的，即用合适的单词来命名：{{sm|ບ}} 是“bo-be”或简称“be”（山羊）。字母 {{sm|ຣ}} (r) 变成了静音或转读为“L”，并从正字法中消失，仅用于外来词。\n\n佛教使用巴利语作为宗教语言，书写该语言时会使用几个额外的字母和止音符。

[Script.Latn]
Name=拉丁文字（Latin）
Lang=西班牙语 {{nspk|es}}，英语 {{nspk}}；西欧和突厥世界（包括东欧、波罗的海国家、摩尔多瓦）的大多数语言，撒哈拉以南非洲，大洋洲；越南语，卡累利阿语，库尔德语，世界语。
Text=拉丁字母是 [[ps:Grek|古希腊]] 文字的改编版，大约在公元前 700 年左右被用于书写 [[ps:Ital|伊特鲁里亚]] 语言，后来演变为拉丁文字。\n\n在中世纪，字母 J、V 和 W 被加入拉丁字母表。为了节省昂贵的羊皮纸而发明的 [[pt:minuscule|小写]] 书写体，最终演变成了我们今天的小写字母。\n\n拉丁语作为一种语言早已消亡，但罗马帝国广阔的疆域、梵蒂冈的传教活动以及主要由西方世界主导的“大航海时代”，将拉丁字母推上了世界第一文字系统的宝座。拉丁文字被广泛应用于数学、医学、语音学和编程领域。\n\n随着苏联的解体，阿塞拜疆、摩尔多瓦、土库曼斯坦和乌兹别克斯坦采用了拉丁文字。

[Script.Lepc]
Name=雷布查文字（Lepcha，绒巴文字（Róng））
Lang=雷布查语（Lepcha）
Text=它源自 [[ps:Tibt|藏文]]，最初是竖排书写的（从上到下）。后来采用了横排书写，因此字母看起来像是逆时针旋转了 90° 的藏文。根据传统，这种文字大约由佛教传教士在 1700 年左右发明，并被锡金王子查克多尔·南嘉（Chakdor Namgyal，1700–1717 年在位）采纳。第一部印刷文本是 1845 年的《马太福音》。\n\n固有元音是 {{t|a}}。起首元音没有特殊的独立形状，而是附加在一个看起来像“&”符号的零声母字母上。没有 [[pt:virama|止音符]]。相反，要构成一个包含三个音素的音节，先加上元音符号，再加尾辅音。

[Script.Limb]
Name=林布文字（Limbu）
Lang=林布语（Limbu） {{nspk}}，梵语（Sanskrit），巴利语（Pali）
Text=根据传统说法，这种文字是由西里琼加国王（King Sirijunga）在 9 世纪发明的，并在八个世纪后由一位同名的学者复兴，这位学者被认为是国王的转世。而更接地气的版本则认为，它源自 [[ps:Lepc|雷布查文]]，因此不可能有那么古老的历史。\n\n固有元音是 {{t|ɔ}}。\n\n起首元音没有特殊的独立形状，而是写在一个看起来像尼泊尔国旗的“零”辅音 {{sm|ᤀ}} 上。要构成一个包含三个音素的音节，先加上元音符号，再加尾辅音：{{sm|ᤐᤳᤗᤥ}} {{t|pɔtlo}}。类似下划线的 [[pt:virama|止音符]] 用于那些没有尾字形式的外来字母，有时也用于长元音音节 {{sm|ᤁᤁ᤻}} {{t|kɔ:k}}。

[Script.Lina]
Name=线形文字 A（Linear A）
Lang=米诺斯语（presumably Minoan）
Text=这种文字曾用于塞浦路斯岛和基克拉泽斯群岛。大多数铭文都是与商业有关的，写在粘土（泥板）上。但也存在用墨水写在器皿和其他物体上的文字。不过，符号的形状表明，这种文字最初是用墨水写在皮革或其他柔软材料上的。大约在公元前 1450 年，随着希腊人的入侵，它被 [[ps:Linb|线形文字 B]] 所取代。\n\n亚瑟·伊文思（Arthur Evans）在 19 世纪末发现了这种文字，但部分文物已经损毁——有些被未受过训练的工人扔掉了，有些则在仓库里被雨水毁坏。他之所以称这种文字为“线形”（linear），是因为它是由线条构成的，这与早期的克里特象形文字（未收录于 Unicode）不同。他推迟了发现的发表，希望能自己破译它，直到 1941 年去世。目前还没有全面的破译成果——这与后来的线形文字 B 不同。

[Script.Linb]
Name=线形文字 B（Linear B）
Lang=迈锡尼语（Mycenaean，原始希腊语）
Text=希腊人征服克里特岛的时刻相当确切，即公元前 1450 年。[[ps:Lina|线形文字 A]] 开始逐渐停止使用。\n\n字符卷曲的形状表明它们原本是在皮革或纸草上书写的，此外，线形文字 A 实际上是用墨水写的。但所有幸存下来的样本都是写在粘土泥板上的，这些泥板在火灾中被烧制，从而保存了数千年。这种文字由一小部分书吏阶层使用，他们坚持遵循米诺斯语的语法，而不是希腊语。所有已知的铭文都是商业文件：租赁合同、工匠名单、财产清单……\n\n它由亚瑟·伊文思（Arthur Evans）在 20 世纪初发现。并在 20 世纪 50 年代被破译。

[Script.Lisu]
Name=老傈僳文字（Lisu，富能仁字母（Fraser alphabet））
Lang=傈僳语（Lisu）
Text=这种字母表是由缅甸传教士巴拖（Sara Ba Thaw）和英国传教士詹姆斯·富能仁（James Fraser）发明的。它由直立的和倒转的大写 [[ps:Latn|拉丁]] 字母组成，没有小写字母。由于传教士们的努力，约 {{%|40}} 的傈僳族人是新教徒。中国于 1992 年承认了这种文字。\n\n历史上曾有过其他教傈僳族写字的尝试：一种类似于 [[ps:Hani|汉字]] 的音节文字（约 1925 年），基于拼音（汉语拉丁化转写）的拉丁字母（1957 年），[[ps:Plrd|柏格理字母]]（苗文）以及基于 [[ps:Mymr|缅甸文字]] 的文字。

[Script.Lyci]
Name=吕基亚文字（Lycian）
Lang=吕基亚语（Lycian，安纳托利亚（Anatolia））
Text=这种字母表是在 [[ps:Phnx|腓尼基文字]] 和 [[ps:Grek|希腊文字]] 的影响下发明的。因此，它与希腊文字的相似具有欺骗性：其中一些字母其实源自腓尼基文字。大约在公元前 3 世纪，随着吕基亚被亚历山大大帝征服，它被希腊文字所取代。\n\n“吕基亚”（Lycia）是一个希腊人的称呼，而非其自称。该语言的自称是 ''trm̃mili''。\n它在 20 世纪初被破译。

[Script.Lydi]
Name=吕底亚文字（Lydian，萨迪斯文字（Sardian））
Lang=吕底亚语（Lydian，=萨迪斯方言，安纳托利亚）
Text=这种字母表与 [[ps:Lyci|吕基亚文字]] 非常接近，源自 [[ps:Phnx|腓尼基文字]]。大约在公元前 3 世纪，随着吕底亚被亚历山大大帝征服，它被 [[ps:Grek|希腊文字]] 所取代。\n\n早期的铭文是双向书写的（即牛耕式转行书写法），而晚期的铭文仅从右向左书写。它的一个独特特征是（使用）一个三角形的引号。\n\n“吕底亚”（Lydia）并非其自称，吕底亚人以其首都萨迪斯（Sardis）来命名该地区。\n它在 1916 年被破译，尽管铭文数量很少（截至 1986 年仅有 109 条），但已得到了充分的研究。

[Script.Mahj]
Name=马哈佳尼文字（Mahajani）
Lang=印地语（Hindi），旁遮普语（Punjabi），马尔瓦尔语（Marwari，北印度）
Text=这是印度种姓制度的又一遗存，就像 [[ps:Kthi|凯提文字]] 一样：这种文字曾被银行家和会计师使用直到 20 世纪，目前仅有极少量的使用。\n\n这种文字退化到了几乎成为 [[pt:abjad|辅音音素文字]] 的地步：同一个字母既表示 {{t|ka}}，也表示 {{t|ki}}，还表示 {{t|k}}。只有当元音很重要时，才会有特殊的符号标记。没有 [[pt:virama|止音符]] 和 [[pt:ligature|连字]]。另一方面，对于账簿来说，有许多缩写和分数符号很重要。其中许多尚未被充分研究，也尚未被编码。\n\n顶线仅出现在标题中。已发现看起来像 [[ps:Deva|天城文字]] 和 [[ps:Gujr|古吉拉特文字]] 的数字；在 Unicode 中，它们与前者进行了 [[pt:unification|统一]]。

[Script.Maka]
Name=望加锡文字（Makasar，鸟书）
Lang=望加锡语（Makasar，南苏拉威西）
Text=这种文字源自 [[ps:Kawi|卡维文字]]（古爪哇语）。因其字母的形状而被称为“鸟书”。关于这种文字何时出现尚有争议，但它并不古老：其已知的形式更适合羽毛笔和纸张，而不是棕榈叶。已知最早的样本是（1667年）与荷兰东印度公司签订条约上的签名。\n\n它是一种婆罗米系元音附标文字，包含 17 个辅音，没有 [[pt:virama|止音符]]。首字母是 {{sm|𑻱}}（可能带有元音符号）。尾辅音，如 {{t|m}}、{{t|nn}} 和声门塞音，都被省略了。没有空格，单词和短语用垂直省略号分隔。由于这种功能性（缺陷），该文字显然是不完整的——到了 19 世纪，它已被完全取代，取而代之的是被认为是其姊妹文字的 [[ps:Bugi|隆塔拉文字]]。\n\n（文献中）既有欧洲数字也有阿拉伯-印度数字。在其中一份手稿中，有一个类似于棕榈树的标点符号，已被 [[pt:unification|统一]] 为 {{em|🌴}} [[pt:emoji|表情符号]]。\n\n''Angka'' 符号意为“相同的辅音”：{{sm|𑻧𑻴𑻲}} duda，{{sm|𑻧𑻲𑻴}} dadu。<br>\n两个相同的音节更简单：{{sm|𑻧𑻴𑻴}} dudu。

[Script.Mand]
Name=曼达文字（Mandaic）
Lang=曼达语（Mandaic，伊朗和伊拉克）
Text=这种文字源自 [[ps:Armi|阿拉米文字]] 或 [[ps:Prti|帕提亚文字]]。它被所谓的“沼泽阿拉伯人”（Marsh Arabs）使用，这些人生活在底格里斯河与幼发拉底河的交汇处，信奉曼达教（Mandaeism），这是一种独特的诺斯底宗教。他们在伊拉克的人数正急剧减少，从 {{n|45000}} 人（1996年）降至 {{n|5000}} 人（2007年），另有 {{n|60000}} 人散居在世界各地，作为难民，他们可能会迅速消失。

[Script.Mani]
Name=摩尼文字（Manichaean）
Lang=粟特语（Sogdian），帕提亚语（Parthian），中古波斯语
Text=这种文字源自 [[ps:Syrc|叙利亚文字]]，并与摩尼教（Manichaeism）这一宗教紧密相关。大约在公元 300 年，当萨珊波斯驱逐摩尼教徒时，这种文字的样本开始出现在北方的中亚地区。最后的铭文可追溯至 10 世纪，发现于现代的新疆地区。\n\n字母是连写的，就像叙利亚文字一样。\n\n这个术语是由弗里德里希·穆勒（Friedrich Müller）在 1903 年解读该文字时引入的。

[Script.Marc]
Name=玛钦文字（Marchen）
Lang=象雄语（西藏），藏语（苯教中）
Text=象雄语是一种汉藏语系的语言，于 10 世纪消亡，它至少曾使用五种文字书写。Unicode 目前只收录了玛钦文字（Marchen），其余的文字甚至尚未进行 [[pt:unification|统一]]。很可能所有这些文字仅用于宗教场合。至于他们在日常生活中如何书写，目前尚不清楚。\n\n在音节中，几个字母会堆叠在一起，元音符号与最下方的字母相关联，即使它附着在顶部：例如 spyir {{sm|𑲍𑲞𑲩𑲱𑲊}}——藏语意为“总的、普遍的”。没有 [[pt:virama|止音符]]。\n\n如今，它被用于苯教（Bön），这是一个源自早期佛教的藏地类佛教宗教（请不要与真正的藏传佛教混淆）。左旋的“卍”字已成为苯教的象征。

[Script.Medf]
Name=梅德法伊德林文字（Medefaidrin，Obɛri Ɔkaimɛ）
Lang=奥贝里·奥凯梅语（Obɛri Ɔkaimɛ） / 梅德法伊德林语（Medefaidrin，尼日利亚）
Text=这种人造语言及其文字是由迈克尔·乌孔（Michael Ukpong）和阿潘·阿克潘·乌多菲亚（Akpan Akpan Udofia）于 1931 年左右在尼日利亚的类基督教教会“奥贝里·奥凯梅”（Obɛri Ɔkaimɛ）中创造的。词汇是人造的，语法则是英语和当地伊比比奥语（Ibibio）的混合体。数字系统采用二十进制的位值制，反映了伊比比奥人的计数习惯。标点符号也是原创的。\n\n这种新语言曾被用于礼拜仪式，并在学校中教授。但这违反了当地的教育法，学校遭到镇压并被罚款，教学活动被迫停止。目前仅存几份手稿，且状况都很糟糕。学者们于 1947 年发现了梅德法伊德林文。如今大约有 4000 名奥贝里信徒，但很少有人还掌握这门语言。尼日利亚当局正在大力研究这门语言，并扫描现存的文献。

[Script.Mend]
Name=门德基卡库文字（Mende Kikakui）
Lang=门德语（Mende）
Text=这种文字是由伊斯兰传教士穆罕默德·图雷（Mohamed Turay）发明的。最初包含 42 个字符的脚本是一种 [[pt:abugida|元音附标文字]]，但随着他的学生不断添加新字符，它逐渐失去了系统性的一致性。其名称来源于前三个音节。此外，一种非位值制的数字系统也被纳入了该文字中。\n\n它在 20 世纪早期曾被广泛使用，但后来门德人转而采用了 [[ps:Latn|拉丁文字]]。目前（2010 年代）仍有数百人通晓基卡库文字。

[Script.Merc]
Name=麦罗埃草书文字（Meroitic Cursive）
Lang=麦罗埃语（Meroitic），或许是古努比亚语
Text=麦罗埃文字曾在努比亚和苏丹地区用于书写当地语言，一直使用到公元 7 世纪。它有两种形式：圣书体（Hieroglyphic）和草书体（Cursive）。圣书体源自 [[ps:Egyp|埃及象形文字]]，刻在纪念碑上，按列从右向左书写；目前已知的仅有铭文形式。草书体则衍生自世俗体（Demotic script），同样从右向左书写，占据了所有铭文的 {{%|90}}。\n\n现存铭文超过 2000 条。其字母表是在 20 世纪初通过麦罗埃语中埃及名字的发音被破译的。但这门语言本身的含义至今仍不明晰。

[Script.Mero]
Name=麦罗埃象形文字（Meroitic Hieroglyphs）
Lang=麦罗埃语（Meroitic），或许是古努比亚语

[Script.Mlym]
Name=马拉雅拉姆文字（Malayalam）
Lang=马拉雅拉姆语（Malayalam）{{nspk}}，[[ps:Tutg|图卢语]] {{nspk|Tutg}}，梵语（Sanskrit）
Text=它源自 [[ps:Gran|古兰塔文字]]（Grantha）。固有元音是 {{t|a}}。卷曲的字母形状是为了防止棕榈叶沿着叶脉开裂。\n\n第一本印刷书籍（罗马，1772 年）包含约 1000 个不同的字形。1971 年进行了一次拼写改革，将印刷体字形减少到 250 个，打字机字形减少到 90 个——元音符号和 {{t|r}} 从字母上分离出来，常见的辅音连字变成了从左到右排列而非从上到下，罕见的连字则直接使用 [[pt:virama|止音符（virama）]]。\n: ka {{sm|ക}} + i {{sm|◌ി}} = ki {{sm|കി}}\n: ka {{sm|ക}} + virama {{sm|◌്}} = k {{sm|ക്}}\n: ta {{sm|ത}} + virama {{sm|◌്}} + ka {{sm|ക}} = tka {{sm|ത്ക}}\n: ka {{sm|ക}} + virama {{sm|◌്}} + ka {{sm|ക}} = kka {{sm|ക്ക}}\n: kа {{sm|ക}} + virama {{sm|◌്}} + rа {{sm|ര}} = kra {{sm|ക്ര}}\n\n奇鲁（Chillu）字母自带止音符，其中一些源自不同的字母：例如，L 字母源自“ta”字母。目前有五个（NN, N, R, LL, LL）在现代使用，另外四个（K, M, Y, LLL）已被 [[pt:obsolete|废弃]]。\n\n拼写改革很少被完全接受；日常书写和电影海报继续使用旧的拼写法。Pre-Unicode 字体进一步推广了新拼写法。微软、苹果和谷歌制作了采用新拼写法的 Unicode 字体，但当地供应商也制作旧拼写法的字体。自 2010 年代后期以来，印刷媒体开始回归旧拼写法。2022 年，该改革被部分撤销，增加了更多的下标字。「Unicodia」使用的是谷歌的字体。

[Script.Modi]
Name=莫迪文字（Modi）
Lang=马拉地语（Marathi）
Text=这种文字与 [[ps:Deva|天城文字]] 有亲缘关系，但具有显著的 [[pt:cursive|草书]] 特征。关于其起源主要有两种理论：一是赫马德里·潘迪特（Hemādri Paṇḍit），一位外交官兼大臣（约 1260 年）；二是坎德拉奥·巴拉尔（Khanderao Ballal），一位外交官（约 1700 年）。它曾与天城体并用，直到 1950 年代，随后“巴尔博德”（Balbodh，字面意思为“儿童易懂”）——一种至少自 1800 年起就存在的天城体草书风格——被宣布为马拉地语的标准文字。莫迪文的复兴始于 21 世纪。\n\n书写时通常会先画好顶线，字与字之间几乎看不到空格。在辅音连字中，其中一个辅音（通常是第一个）会被简化。只有两个辅音连字 [[pt:ligature|连字]]，即 {{t|ksə}} 和 {{t|trə}}。\n: kə {{sm|𑘎}} + virama {{sm|◌𑘿}} + tə {{sm|𑘝}} = ktə {{sm|𑘎𑘿𑘝}}\n: kə {{sm|𑘎}} + virama {{sm|◌𑘿}} + rə {{sm|𑘨}} = krə {{sm|𑘎𑘿𑘨}}\n但元音符号的附着方式相当奇特，它们自身也会形成连字：\n: gə {{sm|𑘐}} + ū {{sm|◌𑘴}} = gū {{sm|𑘐𑘴}}\n[[pt:virama|止音符]] 在马拉地语中从不使用。看起来像止音符的下标符号实际上是带有 {{t|r}} 的连字：\n: kə {{sm|𑘎}} + rə {{sm|𑘨}} = kərə {{sm|𑘎𑘨}}

[Script.Mong]
Name=蒙古文字（Mongolian，旧体）
Lang=蒙古语（Mongolian）
Note=1204年（旧体），1648年（托忒文）
Text=1204 年，蒙古人征服了回鹘人，并采用了源自 [[ps:Syrc|叙利亚文字]] 的 [[ps:Ougr|回鹘文字]]。这是唯一一种实际书写方向为“从左到右分列”（竖排）的文字，因此计算机对其支持并不情愿，通常将列逆时针旋转 90° 来显示。\n\n1587 年，学者阿尤希·古什（Ayuush Güüsh）对文字进行了改革，并添加了几个字符，以简化对佛教中至关重要的梵语、藏语和汉语的音译。这些新字符被称为“阿里嘎里”（Ali-gali）或“噶里克”（Galik）。\n\n在俄罗斯，布里亚特人（Buryats）曾使用该文字。二战后，蒙古人采用了 [[ps:Cyrl|西里尔文字]]，但随着苏联的解体，目前已有计划扩展旧文字的使用。\n\n该文字包含同形异义词（例如，{{sm|ᠣ}}={{t|o/u}}），但元音和谐律——即一个词只能包含阳性或阴性元音——通常能消除这些同形异义词的歧义。Unicode 为这些同形异义词分配了独立的码位：{{sm|ᠡᠨᠳᠡ}} ={{}}ENDE {{t|ent}} 这里，{{sm|ᠠᠳᠠ}} ={{}}ADA {{t|ada}} 恶魔。字母 Q 和 G 在阳性词和阴性词中有不同的形式，不仅是在元音前，在词尾也是如此，因此字体对此有多重规则：{{sm|ᠵᠠᠷᠯᠢᠭ}} {{t|ǰarlig}} ={{}}JARLIG 命令，{{sm|ᠴᠡᠷᠢᠭ}} ={{}}ČERIG {{t|'ʦʰerek}} 士兵。\n\n该编码区块还包含了托忒文字（Todo Bichig，意为“清晰文字”），它发明于 1648 年，被包括卡尔梅克人（Kalmyks）在内的西部民族使用，直到 1924 年他们转用西里尔文字。托忒文字目前仍在中国新疆地区使用。

[Script.Mroo]
Name=默禄文字（Mro）
Lang=默禄语 {{nspk||=Mru}}
Text=大多数默禄人是佛教徒，而孟加拉国作为一个伊斯兰国家，其当局并不愿意支持他们。\n\n默禄文是由“克拉马教”（Krama religion）的创始人门莱·穆朗（Menlay Murang）于 1980 年代发明的。到了 2000 年代，穆朗字母变得非常流行，甚至超越了此前使用的 [[ps:Latn|拉丁字母]]：超过 {{%|80}} 的默禄人能够读写这种文字。此外，现有的拉丁文字方案无法很好地表达默禄语的语音。\n\n该文字不存在技术难题：从左向右书写，没有 [[pt:format|格式]] 字符和 [[pt:combining|组合标记]]，[[pt:abc|字母顺序]] 与编码顺序一致，换行规则也是标准的。标点符号采用欧洲风格，并额外增加了一个本地版本的“丹达”（danda）竖线。

[Script.Mtei]
Name=曼尼普尔文字（Meetei Mayek，曼尼普尔文字（Manipuri））
Lang=曼尼普尔语（Manipuri）
Text=根据普遍观点，这种文字起源于 11 世纪。18 世纪，[[ps:Beng|孟加拉文字]] 被采用。1930 年代，该文字得以复兴，并于 1976 年根据现代语音进行了调整。\n\n字母以身体部位命名：第一个字母是“kok”（头）。固有元音是 {{t|ə}}。[[pt:virama|止音符]] 纯粹是虚拟的，仅用于组合旧的 [[pt:ligature|连字]]：单个辅音则用缩小的字母表示。\n: kə {{sm|ꯀ}} + i {{sm|◌ꯤ}} = ki {{sm|ꯀꯤ}}\n: k {{sm|ꯛ}}

[Script.Mult]
Name=穆尔塔尼文字（Multani）
Lang=萨拉伊基语（Siraiki），信德语（Sindhi），旁遮普语（巴基斯坦，印度）
Text=萨拉伊基人几乎都是穆斯林。截至 2010 年代，仅在巴基斯坦境内，他们的人数就在 1400 万到 1900 万之间（根据不同来源）。\n\n这种文字出现于 18 世纪。最早的印刷资料是 1819 年的《新约》。19 世纪末，英国殖民当局发明了 [[ps:Arab|阿拉伯]] 文字（方案），到了 20 世纪，萨拉伊基语采用了它。\n\n所有资料都将穆尔塔尼文视为婆罗米系的元音附标文字，但实际上它已退化为 [[pt:abjad|辅音音素文字]]：没有元音符号，元音的书写极其具有选择性。数字与 [[ps:Guru|古木基文字]] [[pt:unification|统一]]：6 和 7 只有细微差别。

[Script.Mymr]
Name=缅甸文字（Myanmar）
Lang=缅甸语（Myanmar），孟语，巴利语（死语，佛教礼仪用语）…
Text=像大多数东南亚文字一样，它源自 [[ps:Brah|婆罗米文字]]。在开音节中，固有元音是 {{t|a}}，常弱化为 {{t|ə}}。在闭音节中，它取决于尾辅音：{{sm|နှစ်}} {{t|n̥iʔ}} “年”。若要设定其他元音，则使用元音符号；若要去除元音——则使用 [[pt:virama|止音符]]，在缅甸语中称为“a-sat”。另一种虚拟的止音符仅用于组合 [[pt:ligature|连字]]——即两个字母上下堆叠。\n\n早期的缅甸文是方形的。到了 17 世纪，随着在棕榈叶上书写的普及，它变得圆润起来：直线可能会顺着叶脉割裂叶片。

[Script.Nagm]
Name=纳格文字（Nag Alphabet，蒙达里语（Mundari））
Lang=蒙达里语（Mundari）
Text=一种没有文字传统的南亚语系（非印欧语系）语言。根据 2011 年人口普查，印度有 110 万人讲蒙达里语，另有 50 万人讲某种“蒙达语”——尚不清楚这是否为同一种语言。\n\n其书写系统曾包括 [[ps:Orya|奥里亚文字]]、[[ps:Deva|天城文字]]、[[ps:Beng|孟加拉文字]] 和 [[ps:Latn|拉丁文字]]——但拉丁字母难以表达其独特的音位，而元音附标文字又不太适合南亚语系语言。难怪罗希达斯·辛格·纳格（Rohidas Singh Nag）在 1949 年发明了一种新字母，并且它甚至扎下了根。大约在 1982 年，他将字母表精简为 27 个字符并展示给地方当局，随后在 2008 年又进行了改革。\n\n它拥有自己的数字系统。标点符号采用欧洲风格。

[Script.Nand]
Name=南迪城文字（Nandinagari）
Lang=梵语（Sanskrit），卡纳达语（Kannada，印度南部）
Text=它源自那加里文字（Nagari），这是印度文字的一种中间形态。作为 [[ps:Deva|天城文字]] 的“姐妹”，“南迪城文字”意为“来自圣城”。如果它们没有那些差异——断裂的顶线、不同的 [[pt:ligature|连字]] 和数字——南迪文本可以成为天城文的一种变体。这种文字一直使用到 19 世纪。\n\n固有元音是 {{t|a}}，可通过元音 [[pt:combining|附加符号]] 替换。所有符号，包括 [[pt:virama|止音符]]，都附着在字母上。止音符仅用于梵语：卡纳达语偏好开音节，罕见的辅音丛通过连体字表达。\n: ka {{sm|𑦮}} + u {{sm|◌𑧔}} = ku {{sm|𑦮𑧔}}\n: ṭa {{sm|𑦸}} + u {{sm|◌𑧔}} = ṭu {{sm|𑦸𑧔}}\n: ka {{sm|𑦮}} + virama {{sm|◌𑧠}} + ta {{sm|𑦽}} = kta {{sm|𑦮𑧠𑦽}}\n数字与 [[ps:Knda|卡纳达文]] 相似（2 和 6 有差异）并与之 [[pt:unification|统一]]。

[Script.Narb]
Name=古北阿拉伯文字（Old North Arabian）
Lang=绿洲古阿拉伯语，萨法伊提克语，希斯迈提克语等
Text=“古北阿拉伯文字”这一术语指代除 [[ps:Sarb|南阿拉伯文字]] 之外的所有南闪米特文字。它源自原始西奈文字（Proto-Sinaitic script）。目前已知的铭文多为公元前 3 世纪至公元 4 世纪的短篇，但这种文字的历史要古老得多；可能追溯至公元前 8 世纪。

[Script.Nbat]
Name=纳巴泰文字（Nabataean）
Lang=纳巴泰语（Nabataean）
Text=它源自 [[ps:Armi|亚拉姆文字]]。自公元前 2 世纪起，这种语言就在纳巴泰（首都是现代约旦境内的佩特拉）使用。公元 106 年，图拉真将纳巴泰并入罗马帝国，而这种文字一直使用到公元 6 世纪，并可能通过鲜为人知的新西奈文字（New Sinai script）演变成了 [[ps:Arab|阿拉伯文字]]。词与词之间没有空格。数字采用类似罗马数字的非位值制系统，从右向左书写。

[Script.Newa]
Name=尼瓦尔文字（Newa，普拉查利特体（Prachalit））
Lang=尼瓦尔语（Nepal Bhasa）、梵语（Sanskrit）、巴利语
Note=最早证据
Text=起源不详，自 10 世纪起就存在不同的书写风格。最早的证据：尼泊尔国王普拉塔普·马拉（Pratap Malla）于 1654 年写下了“尼瓦尔文字”（Newara script）。实际上现存的样本来自 18 世纪。1905 年，尼泊尔拉纳王朝（Rana dynasty）的独裁者禁止了该语言和文字。1951 年，印度入侵，驱逐了篡权者，恢复了旧的沙阿王朝（Shah dynasty）并再次允许使用。自 1960 年起，国王解散议会并重启民族主义政策，禁止除印度教和用 [[ps:Deva|天城文字]] 书写的尼泊尔语以外的一切，但由于经济困难，大约在 1989 年又恢复了民主。\n\n经典的婆罗米系元音附标文字。尽管有许多由小型辅音构成的 [[pt:ligature|连字]]，但有时也会出现 [[pt:virama|止音符]]。\n{{smtable|ka|*𑐎|+ i|**◌𑐶|= ki|*𑐎𑐶}}\n{{smtable|ka|*𑐎|+ virama|**◌𑑂|= k|*𑐎𑑂}}\n{{smtable|ka|*𑐎|+ virama|**◌𑑂|+ ta|*𑐟|= kta|*𑐎𑑂𑐟}}

[Script.Nkoo]
Name=西非书面文字（N’Ko）
Lang=西非曼德（Manding）语
Text=该字母表由几内亚作家索洛马纳·坎特（Solomana Kante）于1949年发明。20世纪50年代，来自苏联阵营的某人为索洛马纳制作了两台西非书面文字打字机。主要用于几内亚、科特迪瓦和马里。“N'Ko”意为“我说”。字母是连写的。\n\n曼德语族的不同语言使用 [[ps:Latn|拉丁文字]] 和 [[ps:Arab|阿拉伯文字]]，但西非书面文字更为普及。曼德语族的文学形式也被称为西非书面文字。

[Script.Nshu]
Name=女书（Nüshu）
Lang=湘语（Xiang Dialects）方言之一（中国湖南）
Note=900（推测），1300（确证）
Text=女书存在了数个世纪，作为一种女性专用文字被使用：男性接受 [[ps:Hani|汉字]] 读写训练，而女性则使用这种更简单的音节文字。与笔画繁复的表意文字不同，女书是用细细的竹片书写的。许多女书实物都是“三朝书”：女孩远嫁他乡，她的姐妹和女性朋友们将祝福（通常是诗歌形式）绣给她。\n\n尽管存在普遍的误解，但女书并非一种密码；男性只是将其视为“低等”文字。已知最早的实物制作于20世纪初，但字符的形态表明女书在 1300 年就已存在。\n\n与用途相似的日本 [[ps:Hira|平假名]] 不同，女书始终是非官方文字。20 世纪的反文盲运动和缝纫机的普及导致女书走向衰落。日本侵略者因将其视为密码而予以禁止，而“文化大革命”期间的红卫兵则销毁了包括刺绣在内的古董。\n\n女书在 20 世纪 80 年代被重新发现。最后一位精通女书的女性阳焕宜于 2004 年去世，享年 98 岁——此后，女书仅作为学者的研究对象而存在。绣有女书的绣品已成为流行的旅游纪念品；人们担心旅游业会扭曲这种古老的文字。\n\n已知字符约有 1800 个，但大多数代表同一个音节。\n\nUnicode 使用 Noto Sans Nushu 字体。主要的字体设计师是一位女性——黄丽莎（Lisa Huang），一位华裔法国人。

[Script.Ogam]
Name=欧甘文字（Ogham）
Lang=古爱尔兰语、皮克特语
Text=欧甘字母表在公元 4 至 10 世纪被爱尔兰和不列颠的古代凯尔特人和皮克特人使用。与此同时，[[ps:Latn|拉丁文字]] 也在被使用，因此有一种观点认为它是一种隐写术（隐蔽书写）。这种文字是专为在木板和木棍上刻出刻痕而设计的。铭文以 {{sm|᚛}} 开头，以 {{sm|᚜}} 结尾。\n\n欧甘空格是 Unicode 中唯一能画出东西的空格。除此之外，它是一个普通的空格，你可以沿着它进行换行。

[Script.Olck]
Name=桑塔利文字（Ol Chiki）
Lang=桑塔利语（Santali）
Text=该字母表由拉古纳特·穆尔穆（Raghunath Murmu）于1925年发明。在此之前，人们使用 [[ps:Beng|孟加拉文字]]、[[ps:Orya|奥迪亚文字]] 和 [[ps:Latn|拉丁文字]]，尽管当时大多数人口是文盲。桑塔利语不属于印欧语系，而是南亚语系，因此基于婆罗米系的字母并不适用。例如，在词形变化过程中，浊辅音和清辅音会相互替换，因此区分它们是没有意义的。\n\n桑塔利文字由30个字母组成，字母的名称与其外观相对应。前三个是：{{sm|ᱚ}}——火，{{sm|ᱛ}}——大地，{{sm|ᱜ}}——呕吐。

[Script.Onao]
Name=奥纳尔文字（Ol Onal）
Lang=布米吉语（Bhumij）
Text=一种属于蒙达语族的小型南亚语系语言，是 [[ps:Nagm|蒙达里语]] 和 [[ps:Olck|桑塔利语]] 的亲属。\n\n该文字由马亨德拉·纳斯·萨达尔（Mahendra Nath Sardar）发明。1992年，布米吉社区举办了一场新文字征集比赛，该文字当时已经完成，并在三个参赛作品中胜出。大写字母被称为“Ol onal”，小写字母被称为“Galang onal”，但小写字母很快被弃用。\n\n标点符号使用 [[pt:ascii|ASCII]] 符号，外加来自 [[ps:Deva|天城文字]] 的“丹达”竖线。未见使用双丹达。

[Script.Orkh]
Name=古突厥文字（Old Turkic，鄂尔浑-叶尼塞（Orkhon-Yenisei）符文）
Lang=鄂尔浑突厥语、叶尼塞吉尔吉斯语以及其他语言（现代蒙古国、贝加尔湖沿岸、新疆维吾尔自治区）
Text=俄罗斯探险家早在彼得大帝时期（18 世纪初）就开始收集相关信息，这些铭文曾被拿来与 [[ps:Runr|日耳曼符文]] 进行比较。此外，在波尔塔瓦战役后被俘的瑞典人实际上曾协助过丹尼尔·梅瑟施密特。芬兰人曾急于将这些符文归功于他们的祖先。\n\n丹麦科学家威廉·汤姆森于 1893 年破译了该文字，并让芬兰人感到困惑：那是突厥语文本。\n目前已知的7至10世纪的铭文约有 200 处，以及几份 9 至 10 世纪的手稿。第二突厥汗国存在于 682–744 年，回鹘汗国存在于 744–840 年。在被叶尼塞吉尔吉斯人击败后，回鹘人向南迁徙，并于 1030 年被 [[ps:Tang|唐古特人]] 征服。吉尔吉斯人的历史较为模糊；众所周知，他们在13世纪臣服于成吉思汗。\n\n字形 {{sm|𐱇}} 于 2021 年秋季进行了更改。

[Script.Orya]
Name=奥里亚文字（Oriya，奥迪亚文字（Odia））
Lang=奥迪亚语 {{nspk||=奥里亚语}}
Text=奥迪亚语（Odia），或称奥里亚语（Oriya）（传统上被不准确地视为与“雅利安人”有亲缘关系），是从 [[ps:Sidd|悉昙体]] 演变而来的，这是一种拥有“断头”笔画的文字，经由高迪体（Gaudi，也被称为“原始 [[ps:Beng|孟加拉文字]]”、“原始奥迪亚文字”）发展而来。\n\n普遍观点认为，字母之所以变成圆形，是因为要在棕榈叶上书写——为了防止叶片沿着叶脉被划破，顶部的横线变成了弧线。这条弧线比字母的主体部分要大，这就是为什么字母很难区分。已知最早的棕榈叶手稿来自 15 世纪。\n\n固有元音是 {{t|ɔ}}，用 [[pt:virama|virama]] 符号去除：{{sm|କ}}=kɔ，{{sm|କି}}=ki，{{sm|କ୍}}=k。与其他印度语言不同，在奥迪亚语中，这个元音绝不会自动消失，必须使用 virama。但由于存在多种辅音连字，virama 并不常用：{{sm|ମ+◌୍+ଭ=ମ୍ଭ}}——mbhɔ。\n\n标点符号使用来自 [[ps:Deva|天城文字]] 区段的“丹达”（danda）竖线，用作句号且前后加空格，以及普通的欧洲标点符号。

[Script.Osge]
Name=欧塞奇文字（Osage）
Lang=欧塞奇语（Osage，苏语系的美洲原住民语言）
Text=该文字由赫尔曼·蒙格莱恩·卢考特（Herman Mongrain Lookout）于2006年为欧塞奇语发明（该语言正处于复兴中，最后一位母语者于2005年去世，目前仅剩几十位第二语言使用者）。他发现学生们将英语的正字法（拼写习惯）套用到了美洲原住民语言上。[[ps:Latn|拉丁文字]] 被作为基础，但经过了大幅修改。使用的是欧洲数字和标点符号。\n\n自2012年启动将其纳入 Unicode 的工作以来，该文字经历了改革。

[Script.Osma]
Name=奥斯曼亚文字（Osmanya，索马里文字（Somalian））
Lang=索马里语（Somalian）
Text=约 1920 年由奥斯曼·尤瑟夫·肯纳迪（Osman Yusuf Kenadid）发明，他是苏丹阿里·尤瑟夫·肯纳迪（Ali Yusuf Kenadid）的兄弟。该文字在索马里获得了一定程度的接受，尽管面临着新引入的 [[ps:Latn|拉丁文字]] 和传统的 [[ps:Arab|阿拉伯文字]] 的激烈竞争。\n\n1961 年，奥斯曼亚文字与拉丁字母一同成为官方文字。1972 年，独裁者穆罕默德·巴雷（Mohammed Barre）禁止了奥斯曼亚文字，首先是因为打字机的普及。\n\n由于索马里局势不稳定，目前没有现代数据。

[Script.Ougr]
Name=回鹘文字（Old Uyghur）
Lang=古回鹘语，东部回鹘语
Text=回鹘文字是 [[ps:Sogd|粟特文字]] 与 [[ps:Mong|蒙古文字]] 之间的一个中间阶段。粟特人从右向左书写，通过将文本大幅向左旋转，从而形成了从左向右的竖排书写方式。它在类型上也成为了一个中间阶段，部分元音拥有了自己的字母。该文字在新疆一直使用到 18 世纪。\n\n现代学者也将回鹘文从右向左书写，这就是其编码模型（的由来）。

[Script.Palm]
Name=帕尔迈拉文字（Palmyrene）
Lang=帕尔迈拉阿拉米语（Palmyrene Aramaic）
Text=该文字自公元前 100 年至公元 300 年间在帕尔米拉（现代叙利亚）周边地区使用。它源自 [[ps:Armi|阿拉米文字]]。该字母表包含 22 个辅音，其中一个有两个变体。没有空格和标点符号。数字是用类似于罗马数字的非位置制系统书写的，从右向左。\n\n1754 年利用 [[ps:Grek|希腊文字]] 双语铭文破译，让-雅克·巴泰勒米（Jean-Jacques Barthélemy）是第一位破译已消亡字母表的人。1758 年，他破译了 [[ps:Phnx|腓尼基文字]]。

[Script.Pauc]
Name=包钦豪文字（Pau Cin Hau）
Lang=特丁语（Tedim，=佐米语）及其他北部库基-钦语支语言（缅甸）
Note=1902（最初为表意文字），1931（改为拼音文字）。
Text=该文字由特丁人包钦豪（Pau Cin Hau，1859–1948）发明，他是一位新宗教的创始人。该宗教被称为 ''Laipian''，意为“经文宗教”。起初该文字是表意文字，后来改为拼音文字。该文字包含了特丁语中缺失的辅音 R、F、Ch 以及一些声调，因此包钦豪旨在创造一套适用于所有库基-钦语支的语言文字。\n\n后来，这套文字被基督徒重新采用，目前仍与 [[ps:Latn|拉丁文字]] 一起在特丁语 {{nspk}} 中有限使用。其亲属语言则完全使用拉丁文字书写。

[Script.Pcun]
Name=原始楔形文字（Proto-cuneiform）
Text=原始楔形文字指的是用各种棍棒（圆的、扁的、棱柱形的）在黏土上压印出的计数标记和象形符号。\n\n英国的马特·帕克（Matt Parker）制作了一期 YouTube [[https://www.youtube.com/watch?v=MZVs6wF7nC4|视频]]，名为“第一个（已知的）数学错误是什么？”。一位名叫库希姆（Kushim）的人在公元前 3400 年至 3000 年之间在啤酒仓库工作，并使用了这些字符。尽管“库希姆”这个名字是一种推测，它是公元前 2900 年的后世读音。

[Script.Perm]
Name=古彼尔姆文字（Old Permic，科米-基连文字，安布尔文字）
Lang=科米-基连语（Komi Zyryan），科米-彼尔米亚克语（Komi Permyak）
Text=古彼尔姆文字由传教士彼尔姆的斯蒂芬（Stephen of Perm）于 1372 年提出，是 [[ps:Cyrl|西里尔文字]] 的一种变体，并插入了 [[ps:Grek|希腊文字]] 和本地如尼文字。其名称来源于前两个字母 An 和 Bur。有时它被用作俄语的密码。在 17 世纪，它最终被西里尔文字取代。\n\n安布尔（Anbur）是芬兰-乌戈尔语族的重要资料。只有 [[ps:Hung|匈牙利如尼文字]] 比它更古老。

[Script.Phag]
Name=八思巴文字（Phags Pa，蒙古方体字（Mongolian square））
Lang=汉语，蒙古语，藏语，梵语，维吾尔语
Text=[[ps:Mong|蒙古人]] 曾使用带有细微改动的 [[ps:Ougr|回鹘]] 文字。当蒙古人征服中国后，忽必烈汗面临着朝廷与多民族民众之间的沟通难题，这一任务由忽必烈的上师八思巴（1235–1280）解决。这套文字被大力推行，回鹘文字甚至至少被禁止过两次。1368 年，汉人推翻了蒙古人的统治，这套文字很快被遗忘。如今，它偶尔出现在西藏和不丹寺庙的印章上。\n\n在字体设计中，它通常向左旋转 90° 以便横排书写。字母一个接一个地书写，就像普通的拼音文字一样。音节内的字母是连写的，音节之间留有窄空格。元音 {{t|a}} 是固有元音，仅在作为首字母时写出。\n: {{sm|ꡏꡡꡃ ꡣꡡꡙ}} = mongxol（蒙古）\n\n曾存在三种风格：楷书（主要风格）、篆书（模仿用于印章的古老中国书法）和藏式（类似于 [[ps:Marc|玛尔钦]]）。\n\n数字在所有样本中都是拼写出来的。大多数样本没有标点符号；有些使用蒙古语标记或与 [[pu:3002]] 统一的中间圆圈句号。

[Script.Phli]
Name=碑铭体巴列维文字（Inscriptional Pahlavi）
Lang=中古伊朗语
Text=用于陶土铭文的伊朗语言，是巴列维文字的最早变体。一直使用到公元 5 世纪，即萨珊帝国的鼎盛时期。

[Script.Phlp]
Name=诗篇体巴列维文字（Psalter Pahlavi）
Lang=中古波斯语（Middle Persian）
Text=一种非常潦草的文字，被认为是巴列维文的中间形态。目前仅存两件标本：一件是在新疆地区发现的 6 世纪 12 页诗篇残卷，另一件是来自阿富汗的十字架。段落标记采用一半黑色、一半红色的写法。\n\n书籍体巴列维文字（Book Pahlavi），即该文字的最终形态，至今仍未被纳入 Unicode 标准，留下了一个空白。

[Script.Phnx]
Name=腓尼基文字（Phoenician）
Lang=腓尼基语（Phoenician）及其他闪米特语（摩押语、非利士语…），布匿语
Text=它源自鲜为人知的原始西奈文字。字母名称遵循[[pt:acrophonic|首音原则]]：Alef=牛，Bet=房子，Gaml=骆驼……\n\n尽管[[ps:Ugar|乌加里特文字]]（Ugaritic）而非腓尼基文字才是目前已知最古老的辅音文字，也是第一个拥有明确字母顺序的文字，但腓尼基文字的重要性怎么强调都不为过：腓尼基人是优秀的水手，他们将这套文字传播到了整个古代世界。\n\n衍生自腓尼基文字的系统：\n* 安纳托利亚字母表（例如[[ps:Lyci|吕基亚文字]]（Lycian）——已消亡）；\n* 古利比亚文（[[ps:Tfng|提非纳文字]]（Tifinagh）的祖先）；\n* 古西班牙文字或伊比利亚文字（已消亡）；\n* [[ps:Armi|阿拉米文字]]（Aramaic）（[[ps:Syrc|叙利亚文字]]（Syriac）、[[ps:Arab|阿拉伯文字]]（Arabic）以及（根据广泛假说）[[ps:Brah|婆罗米文字]]（Brahmi）的祖先）；\n* [[ps:Grek|希腊文字]]（Greek）、（[[ps:Latn|拉丁文字]]（Latin）和 [[ps:Cyrl|西里尔文字]]（Cyrillic）的祖先）。\n\n因此，世界上很大一部分识字人口都得感谢腓尼基人。\n\n它大约在公元前 150 年随着迦太基的毁灭而消失；而腓尼基本土早已长期使用其衍生文字。\n让-雅克·巴泰勒米（Jean-Jacques Barthélemy）于1754年破译了[[ps:Palm|帕尔米拉文字]]（Palmyrene），并于 1758 年破译了腓尼基文字，同样借助了与希腊文字的双语对照文本。

[Script.Plrd]
Name=柏格理苗文（Miao，Pollard script）
Lang=大花苗与四川苗语（即苗语）、傈僳语、彝语
Text=由卫理公会传教士塞缪尔·柏格理（Samuel Pollard）于 1936 年创制。基于 [[ps:Cans|加拿大原住民音节文字]]（Canadian syllabary）。首次尝试编码是在 1997 年。由于苗语复杂的声调结构，直到2010年编码方案才准备就绪。\n\n编码方案是：\n: {{sm|𖼀}} + {{sm|◌𖽝}} +{{sm|&nbsp;𖾑}} = {{sm|𖼀𖽝𖾑}}

[Script.Prti]
Name=碑铭体帕提亚文字（Inscriptional Parthian）
Lang=帕提亚语（Parthian）
Text=在萨珊帝国（公元 3 世纪）黎明之前，用于铭文和钱币。后来被使用 [[ps:Phli|巴列维]] 文字的波斯语所取代，但仍偶有使用。包含七个 [[pt:ligature|连字]] 和两个带有花饰尾部的字母：\n: gimel {{sm|&#68418;}} + waw {{sm|&#68421;}} = gw（从右向左！）{{sm|&rlm;&#68418;&#68421;}}\n: nun {{sm|&#68429;}} + nun {{sm|&#68429;}} = nn&nbsp;&nbsp;&nbsp;{{sm|&rlm;&#68429;&#68429;}}

[Script.Rjng]
Name=勒姜文字（Rejang）
Lang=勒姜语（Rejang）
Text=大多数使用者是文盲。该文字已被 [[ps:Latn|拉丁文字]] 完全取代。\n\n属于婆罗米系元音附标文字（Abugida），带有固有元音 {{t|a}} 和止音符（virama）：{{sm|ꤰ}}=ka, {{sm|ꤰꥉ}}=ke, {{sm|ꤰ꥓}}=k。这种文字因与 [[ps:Runr|如尼文字]]（runes）相同的原因而退化：在木头上雕刻更容易。但总体而言，勒姜文比类似的 [[ps:Bugi|隆塔拉文字]]（Lontara）或[[ps:Batk|巴塔克文字]]（Batak）更发达：它拥有表示语言中存在的少数尾辅音的符号。

[Script.Rohg]
Name=哈乃斐罗兴亚文字（Hanifi Rohingya）
Lang=罗兴亚语（Rohingya）
Text=罗兴亚语（Rohingya），或者说 Ruáingga，是一个规模不大、以穆斯林为主的族群，主要分布在孟加拉国、缅甸及其周边国家。使用 [[ps:Arab|阿拉伯字母]] 书写的历史最早可以追溯到 19 世纪。\n\n自 1980 年起，伊斯兰传教士穆罕默德·哈尼夫（Mohammad Hanif）发明了一套更适合罗兴亚语的文字。这套文字拥有一套专属的十进制数字。字母像阿拉伯文一样连写，试着破译一下它的自称吧：{{sm|&rlm;𐴌𐴟𐴇𐴥𐴝𐴚𐴒𐴙𐴝}}\n\n这门语言有三个声调，用变音符号来标记。标点符号大多是通用的阿拉伯符号：感叹号 '''!'''、分号 ''':''' 和有时使用的句号 '''.''' 都是 [[pt:ascii|ASCII]] 字符，其余的则是从阿拉伯区块镜像反转而来的。

[Script.Runr]
Name=如尼文字（Runes）
Lang=古代日耳曼语和斯堪的纳维亚语言
Text=如尼文字具有独特的棱角形状，非常适合雕刻：木材在顺纹和逆纹方向上的阻力不同，因此很难刻出曲线。后来的如尼文字变体为了适应羽毛笔的草书书写而发生了改变。现存约有 {{n|5000}} 篇如尼铭文字，最早的可追溯至公元 2 世纪。\n\n该 Unicode 区块是几种如尼字母表的合集：\n* 古弗萨克文字（Elder Futhark）：得名于前六个字母——公元 1 至 8 世纪的斯堪的纳维亚如尼文，共 24 个字母。\n* 年轻弗萨克文字（Younger Futhark）：公元 9 世纪以后的斯堪的纳维亚如尼文，共 16 个字母。\n* 弗萨克文字（Futhorc）：盎格鲁 - 撒克逊如尼文字（公元 5-11 世纪），源自古弗萨克文字并逐渐扩展至 34 个字母。\n* 19 个日历如尼文字（年轻弗萨克文字 + 另外 3 个）。\n* 3 个归因于 J. 托尔金（J. Tolkien）的现代英语如尼文字。\n* 来自 8 世纪文物弗兰克斯宝箱（Franks Casket）的 5 个独特如尼文字。\n\n随着基督教化进程，如尼文字逐渐被 [[ps:Latn|拉丁字母]] 取代：西欧大约在 11 世纪完成更替，斯堪的纳维亚在 15 世纪，而在一些村庄甚至一直延续到 20 世纪。\n\n纳粹德国热衷于神秘学，如尼文字也因此受到青睐。如今，如尼文字在“新时代运动”（New Age）和新异教主义（Neo-Paganism）中非常流行。\n\n在大众文化中，任意设计的脚本常被称为“如尼文”，即使它们并不适合雕刻。古代 [[ps:Orkh|突厥人]]、保加尔人和 [[ps:Hung|匈牙利人]] 那些具有类似棱角形状的字母表也被称为如尼文字。

[Script.Samr]
Name=撒马利亚文字（Samaritan）
Lang=希伯来语（Hebrew），撒马利亚阿拉姆语
Text=它源自古希伯来文字（[[ps:Phnx|腓尼基文字]]）。根据《圣经》记载，撒马利亚人从美索不达米亚来到巴勒斯坦，并接受了犹太教信仰与文化。截至 2021 年，撒马利亚人总数不超过 700 人。

[Script.Sarb]
Name=古南阿拉伯文字（Old South Arabian）
Lang=南阿拉伯语（萨巴语、卡塔班语等），吉兹语
Text=古南阿拉伯文字是 [[ps:Ethi|埃塞俄比亚文字]]（即吉兹文字）的祖先，其自身源自探索尚不充分的原始西奈文字（Proto-Sinaic script）。公元 7 世纪，随着阿拉伯人的扩张，它被 [[ps:Arab|阿拉伯文字]] 所取代。

[Script.Saur]
Name=索拉什特拉文字（Saurashtra）
Lang=索拉什特拉语（Saurashtra），该文字仅在泰米尔纳德邦使用
Text=其起源尚不明确，所有 [[ps:Taml|泰米尔语]] 区的索拉什特拉人都是双语使用者，而其他邦的索拉什特拉人则使用 [[ps:Deva|天城文字]]、[[ps:Gujr|古吉拉特文字]] 或 [[ps:Telu|泰卢固文字]] 书写。\n\n它是一种婆罗米系元音附标文字，带有固有元音 {{t|ə}} 和止音符（virama）：{{sm|ꢒ}} 读作 kə，{{sm|ꢒꢶ}} 读作 ki，{{sm|ꢒ꣄}} 读作 k。[[pt:virama|止音符]] 被频繁使用。词首元音则是独立的字符：{{sm|ꢄ}} 代表 i。

[Script.Sgnw]
Name=萨顿手语记号（Sutton SignWriting）
Lang=手语，特别是美国手语（ASL），即美国聋人使用的语言
Text=该系统由舞蹈家瓦莱丽·萨顿（Valerie Sutton）于 1974 年创立。它是基于她两年前发明的舞蹈记号（DanceWriting）发展而来的。后来，她又开发了用于书写哑剧、其他运动（花样滑冰、空手道……）、体育锻炼、人类和动物肢体语言的系统，但这些系统并未取得同样的成功。\n\n目前尚未明确手势是从表演者还是观察者的视角书写的。大多数出版物采用表演者视角（即像照镜子一样）。这里有大量的字符，它们传达手指、手臂、肩膀、视线的动作，以及触碰和面部表情。对于手部，有拳头（方形）、虚拳（圆形）、手掌（五边形）、手刀（矩形）等形状。同一个手势可能有不同的写法。\n\n虽然该系统并不严格属于 [[pt:universality|文本]] 范畴——因为页面上的位置很重要——但它还是在 2015 年被加入了 Unicode。不过只添加了字符，没有包含任何格式信息。但现有的许多程序（例如矢量图形编辑器）都可以修复工作表上的 X/Y 坐标。\n\n涉及另一只手、另一侧或侧转的手势是通过组合字符（combining characters）实现的：具体做法是在基础符号上，加上任意的“填充 2…6”字符，以及任意的“旋转 2…16”字符。例如，要书写“剜眼睛”（gouge blinkers out）这一动作 {{sm|𝠎𝪟𝦆}}，应当输入代码点 1D80E + Fill6 + 1D986。

[Script.Seal]
Name=篆书（Seal Script）
Lang=古汉语
Text=从广义上讲，“篆书”一词指代所有刻在坚硬表面上的古老表意文字。约公元前 300 年，它们被近乎现代风格的笔墨书写体所取代。\n\n在秦始皇（公元前 221–210 年）统治时期，这些古老的表意文字作为正式书体得到了复兴与标准化，其地位类似于 [[ps:Latn|拉丁文字]] 中的哥特体（blackletter）和 [[ps:Cyrl|西里尔文字]] 中的安色尔体（uncial）。这便是狭义上的篆书。\n\n古老的表意文字至今仍用于私人、商业及政府印章中。

[Script.Shaw]
Name=萧伯纳文字（Shavian）
Lang=英语（English），世界语（Esperanto）
Text=爱尔兰作家乔治·萧伯纳（1856–1950）对速记痴迷不已，并曾在 BBC 口语咨询委员会任职，期间结识了几位拼音文字（phonetic writing）的倡导者。因此，他在遗嘱中要求为英语创造一套拼音字母，且必须远离 [[ps:Latn|拉丁文字]]，以防止看起来像洋泾浜英语（pidgin English）。这场设计竞赛最终由罗纳德·金斯利·里德（Ronald Kingsley Read）获胜。\n\n该字母表由三种类型的字母组成：短字母（short）、高字母（tall）和深字母（deep）。短字母包括元音、流音（{{t|r}}, {{t|ℓ}}）和鼻辅音；高字母代表清辅音。当高字母旋转 180° 时，它就变成了深字母，并开始表示相应的浊辅音（除了 {{t|ŋ}} 和 {{t|h}} 这一对）。\n\n用这种新字母出版的第一部作品是萧伯纳的戏剧《安德罗克勒斯与狮子》（Androcles and the Lion），采用与英语对照的双语形式（1962 年）。直到 2013 年，第一部非双语作品《爱丽丝梦游仙境》（Alice in Wonderland）才问世。无论如何，用这种新字母出版的刊物依然零零星星。

[Script.Shrd]
Name=夏拉达文字（Sharada）
Lang=梵语（Sanskrit），克什米尔语（Kashmiri）
Text=夏拉达文字源自笈多文（Gupta，[[ps:Brah|婆罗米文]] 的北部分支），在公元 8 至 12 世纪曾广泛流行于印度西北部和阿富汗地区。后来，夏拉达文对克什米尔语的适用性逐渐降低，并最终不再被日常使用。它是 [[ps:Guru|古木基文字]]（Gurmukhi）的祖先。\n\n目前，它主要由克什米尔潘迪特人（伊斯兰统治下的克什米尔地区的印度教少数族群）和使用梵语书写的印度佛教徒使用。\n\n它是一种婆罗米系元音附标文字，带有固有元音 {{t|a}}。止音符（Virama）的位置在字母右侧，这在印度文字中很不寻常，且被频繁使用。存在大量的“辅音-止音符-辅音”形式的 [[pt:ligature|连字]]（ligatures）。\n{{smtable|ka|*𑆑|+ i|**◌𑆴|= ki|*𑆑𑆴}}\n{{smtable|ka|*𑆑|+ virama|*◌𑇀|= k|*𑆑𑇀}}\n{{smtable|ka|*𑆑|+ virama|*◌𑇀|+ ta|*𑆠|= kta|*𑆑𑇀𑆠}}\n其顶部的横线（headstroke）可以是实心的、断开的，或者带有任意缺口。

[Script.Sidd]
Name=悉昙文字（Siddham，梵字（Bonji））
Lang=梵语（Sanskrit）
Text=这是一种源自 [[ps:Brah|婆罗米文字]] 的中世纪北印度文字，与佛教关系密切。它常像中国书法那样用毛笔书写，且词与词之间没有空格。\n\n它曾传播至整个佛教东方世界，包括日本。但在公元 9 世纪，中国对“外来宗教”进行了数次清洗（指唐武宗灭佛等），切断了日本从大陆获取资源的途径。到了 1200 年左右，悉昙文被其他文字取代，如今仅在日本佛教中得以保存，被称为“悉昙”（Sittan）或“梵字”（Bonji）。\n\n日本的“梵字”中没有数字，因此（Unicode 编码块中）为古老的印度数字留出了空间。许多宗教文本特有的标点符号和装饰符号也被编码收录。\n\n[[pt:virama|止音符（Virama）]]极为罕见，且仅出现在词尾，这是因为存在大量的 [[pt:ligature|连字]]——字母是自上而下书写的。\n{{smtable|ka|*𑖎|+ i|**◌𑖰|= ki|*𑖎𑖰}}\n{{smtable|ka|*𑖎|+ virama|*◌𑖿|= k|*𑖎𑖿}}\n{{smtable|ka|*𑖎|+ virama|*◌𑖿|+ ta|*𑖝|= kta|*𑖎𑖿𑖝}}

[Script.Sidt]
Name=斯达勒文字（Sidetic）
Lang=斯达勒语（Sidetic，安纳托利亚）
Text=一种在锡德（今土耳其境内）附近使用的语言和文字，最后一次被提及是在公元前 2 世纪。目前已知的 13 篇铭文均早于这一记载。该语言被认为已被破译，但字母的发音仍存争议：\n\nA E I O Ŭ? W Y P<br>\nð? M T D Th S S₂ N<br>\nL Ts? G χ R V/U K B/V<br>\nN₂ Z

[Script.Sind]
Name=库达瓦迪文字（Khudawadi，信德文字（Sindhi））
Lang=信德语（Sindhi）
Text=该文字得名于巴基斯坦的库达巴德（Khudabad）城。1868年，库达瓦迪文字被英国殖民政府宣布为信德语的主要文字。到了 20 世纪，信德人（主要是穆斯林）转向了 [[ps:Arab|阿拉伯文字]]，但这套文字依然具有生命力。[[ps:Deva|天城文字]] 和 [[ps:Guru|古木基文字]] 也被使用，历史上 [[ps:Khoj|可吉文字]]（Khojki）也曾流行。\n\n它是一种婆罗米系元音附标文字，带有固有元音 {{t|a}} 和频繁使用的 [[pt:virama|止音符（virama）]]：\n{{smtable|ka|*𑊺|+ i|**◌𑋡|= ki|*𑊺𑋡}}\n{{smtable|ka|*𑊺|+ virama|**◌𑋪|= k|*𑊺𑋪}}\n\n试着读出它的自称（autonym）：{{sm|𑋝𑋡𑋟𑋐𑋢}}（即 Khudawadi）

[Script.Sinh]
Name=僧伽罗文字（Sinhala）
Lang=僧伽罗语（Sinhala）
Text=与大多数东南亚文字一样，它源自 [[ps:Brah|婆罗米文字]]。书写系统在公元 3 世纪传入斯里兰卡，到了 13 世纪，这套文字基本定型。字母呈现出卷曲的形状：在古代，人们普遍在棕榈叶上书写，如果使用直线，会顺着叶脉割破叶片。\n\n其固有元音是 {{t|ʌ}}。辅音连字（“辅音-辅音” [[pt:ligature|连字]]）少于 30 个，它们都需要显式书写，即使用字符 U+200D [[pt:zwj|零宽连字]]（ZWJ）。[[pt:virama|止音符]]（“去除元音”的符号）被称为“al-lakuna”（带有阿拉伯语风格的名字），且使用非常频繁。\n: ka {{sm|&#xD9A;}} + i {{sm|&#x25CC;&#3538;}} = ki {{sm|&#xD9A;&#3538;}}\n: ka {{sm|&#xD9A;}} + virama {{sm|&#x25CC;&#xDCA;}} = k {{sm|&#xD9A;&#xDCA;}}\n: ka {{sm|&#xD9A;}} + virama {{sm|&#x25CC;&#xDCA;}} + ZWJ + va {{sm|&#xDC0;}} = kva {{sm|&#xD9A;&#xDCA;&zwj;&#xDC0;}}\n\n斯里兰卡人现在使用欧洲（阿拉伯）数字，但有两套本土数字已被编码收录：位值制数字曾用于棕榈叶书籍的页码编号，如今仍用于占星术；[[pk:111E0|另一套]] 非位值制数字则在 19 世纪初消失了。此外，至少还存在两种基于字母的记数系统。

[Script.Sogd]
Name=粟特文字（Sogdian）
Lang=粟特语（Sogdian，撒马尔罕——今乌兹别克斯坦境内）
Text=粟特文字大约在公元 100 年左右源自 [[ps:Syrc|叙利亚文字]]。[[ps:Ougr|古回鹘文字]] 衍生自粟特文，而 [[ps:Mong|蒙古文字]] 则源自回鹘文字。这套文字一直使用到 10 世纪，此后粟特地区最终伊斯兰化，并转而使用 [[ps:Arab|阿拉伯文字]]。最后的实物样本大约在 1200 年左右。字母之间是相连的。\n\nUnicode 编码收录了两种粟特文变体：古体（约公元 300 年）和新体（6 世纪以后的佛教手稿）。\n\n蒙古文之所以变成竖写，原因很明确：粟特人有时会将文本向左旋转 90° 书写，回鹘人借用了这种形式。

[Script.Sogo]
Name=古粟特文字（Old Sogdian）
Lang=粟特语（Sogdian，撒马尔罕——今乌兹别克斯坦境内）

[Script.Sora]
Name=索拉僧平文字（Sora Sompeng）
Lang=索拉语（Sora）
Text=索拉语（或称萨瓦拉语）是印度一种弱势的小型南亚语系（非印欧语系）语言。这套文字由曼盖·戈曼戈（Mangei Gomango）于 1936 年创制，在此之前使用的是 [[ps:Latn|拉丁文字]]。这套文字的功能相对“贫乏”——它无法拼写从邻近语言借来的语音。此外，索拉语也用 [[ps:Orya|奥里亚文字]] 和 [[ps:Telu|泰卢固文字]] 书写。\n\n大多数资料将索拉文归类为字母表，但它实际上拥有固有元音 {{t|a}}，就像 [[pt:brahmic|婆罗米系元音附标文字]] 一样。试着读出它的自称：{{sm|𑃐𑃦𑃝𑃗 𑃐𑃦𑃖𑃛𑃣𑃗}}（即 Sora Sompeng）。

[Script.Soyo]
Name=索永布文字（Soyombo）
Lang=蒙古语（Mongol），拉萨藏语，梵语（Sanskrit）
Text=这套文字由佛教僧侣、艺术家扎那巴扎尔（Zanabazar）创制，他也是 [[ps:Zanb|以其名字命名的方形文字]] 的作者。其名称源自梵语 svayambhu，意为“自我创造”。这套文字从一开始就仅用于宗教目的——刻在转经筒、印章和寺庙的牌匾上。字符 11A9E（即索永布符号）也被称为“索永布”，是蒙古国的国家象征。\n\n它是一种婆罗米系元音附标文字，固有元音为 {{t|a}}，设计独特：其框架由右侧的垂直竖干和上方的三角形组成。这个框架承载着主要辅音、元音符号、尾辅音、长音符号和双元音符号。\n{{smtable|ra|*𑩼|+ i|*◌𑩑|+ au|*◌𑩘|+ final ℓ|*◌𑪒|= riul|*𑩼𑩑𑩘𑪒}}\n\n[[pt:virama|止音符（Virama）]]纯粹是虚拟的，用于辅音连字：\n{{smtable|ka|*𑩜|+ subjoiner|*◌𑪙|+ va|*𑩾|= kva|*𑩜𑪙𑩾}}\n\n其他连字则使用首辅音进行编码：\n{{smtable|initial la|*𑪇|+ ka|*𑩜|= lka|*𑪇𑩜}}\n\n史料中未见数字系统的记载。

[Script.Sund]
Name=巽他文字（Sundanese）
Lang=巽他语（Sundanese，爪哇岛）
Text=巽他语 {{nspk}}，广泛分布于爪哇岛西部。其文字源于 [[ps:Kawi|卡维文字]]，固有元音为 {{t|a}}。其他元音通过添加元音符号来表示，而 [[pt:virama|止音符]]（称为 pamaaeh）则用于表示“裸露”的辅音：{{sm|ᮞ}}=sa, {{sm|ᮞᮥ}}=su, {{sm|ᮞ᮪}}=s。起始元音有独立的字母。\n\n这套文字一直使用到 18 世纪，此后被 [[ps:Java|爪哇文字]] 和佩贡文字（Pegon，[[ps:Arab|阿拉伯字母]] 的本地变体）所取代，20 世纪又引入了 [[ps:Latn|拉丁文字]]。1997 年，印度尼西亚当局决定赋予巽他语自己的文字，基于古巽他文进行了标准化。\n\n第二种虚拟止音符仅用于输入历史上的 [[pt:ligature|连字]]。虽然当前字体中缺失这些连字，但 「Unicodia」的作者在 [[pt:private|私用区]] 绘制了一个：\n: ka {{sm|ᮊ}} + virama {{sm|◌᮫}} + ta {{sm|ᮒ}} = kta {{sm|&#xE000;}}

[Script.Sunu]
Name=苏努瓦尔文字（Sunuwar）
Lang=苏努瓦尔语（Sunuwar）{{nspk||=科因奇语（Koinch）}}
Text=由克里希纳·巴哈杜尔·詹蒂奇（Krishna Bahadur Jentich，1926–1991）创制。最初是一套纯粹的字母表，但后来采纳了婆罗米系文字的特征，如固有元音 {{t|a}}、[[pt:virama|止音符]]、尾音 {{t|r}} 的标记，甚至用于辅音连字的 [[pt:ligature|连字]]。然而，官方正字法并不承认这些变化。\n\n直到最近，这套文字还不标记声调，而现在的声调符号仅仅是基本的 0300（重音符）、0301（尖音符）和 030D（反钩符）。\n\n目前主要的书写系统是 [[ps:Deva|天城文字]]，但它难以准确传达苏努瓦尔语的语音。此外，还有一种名为 Tikamuli 的文字，这是一种未被编码的婆罗米系元音附标文字，自 2005 年以来一直受到有影响力基金的推广。

[Script.Sylo]
Name=锡尔赫特城文字（Syloti Nagri）
Lang=锡尔赫特语（Syloti）
Text=根据一种理论，这套文字源自 [[ps:Kthi|凯提文字]]，并由穆斯林创制。19世纪的诗人因其简便而偏爱它，但直到20世纪中叶，它一直被 [[ps:Beng|孟加拉文字]] 所取代。2000年代，孟加拉国恢复了对锡尔赫特城文字的学习。\n\n它是一种婆罗米系元音附标文字，固有元音为 {{t|ɔ}}，并拥有 [[pt:virama|止音符]]（称为 hasanta）：{{sm|ꠇ}}=kɔ, {{sm|ꠇꠣ}}=ka, {{sm|ꠇ꠆}}=k。此外还存在另一种止音符变体，{{sm|ꠇ꠬}}=k，就像其他婆罗米系文字一样。起始元音是独立的字母。文字悬挂在顶线（Headstroke）之下，但与 [[ps:Deva|天城体]] 不同，它“紧紧抓住”这条线。\n\n在锡尔赫特文中，止音符很少使用，原因有二。首先，双辅音和一些连字会形成连体字：{{sm|ꠇ꠆ꠇ}}=kkɔ, {{sm|ꠇ꠆ꠔ}}=ktɔ。这种连体字按标准方式输入：第一个字母，止音符，第二个字母。其次，有时尾部的 {{t|ɔ}} 会变为静音。\n\n文字从左向右书写，但锡尔赫特书籍是从右向左装订的，以此向伊斯兰教致敬。数字与孟加拉文 [[pt:unification|统一]]。

[Script.Syrc]
Name=叙利亚文字（Syriac）
Lang=叙利亚语（Syriac，用作礼拜仪式）、新阿拉米语诸语言、马拉雅拉姆语（Malayalam）、粟特语（Sogdian）、阿拉伯语（Arabic）
Text=它是 [[ps:Armi|阿拉米]] 字母的子文字，后来发展为 [[ps:Arab|阿拉伯]] 文字。该文字被一些少数民族群体使用。阿拉伯语的一些特征在叙利亚语中已经可见：字母连写成一笔（元音符号除外），以及字母在词首、词中、词尾和独立位置的不同形态。\n\n早期基督教手稿（50–400 年）使用的文字被称为埃斯特兰格罗体（Estrangelo，源自希腊语 στρογγύλη，意为“圆形”）。西叙利亚（叙利亚、巴勒斯坦）受希腊人统治，而东叙利亚（波斯、美索不达米亚）受波斯人统治。这导致教会、语言和文字分裂为两种形式：东叙利亚文（聂斯托里体、迦勒底体）和西叙利亚文（雅各比体、马龙体）。它们使用不同的书写风格和元音标记。该文字大约使用到 14 世纪。\n\n你可能会在你的系统中找到埃斯特兰格罗体——西方历史学家将其视为叙利亚文的主要风格。而 「Unicodia」为了多样性收录了西方变体——它由外交官兼印刷商萨瓦里·德·布雷夫（Savary de Brèves，1560–1627）创制，并由 Beth Mardutho 研究所转化为电脑字体，用于出版《安提阿圣经》。

[Script.Tagb]
Name=塔格班瓦文字（Tagbanwa）
Lang=巴拉望岛诸语言（菲律宾）
Text=它源自 [[ps:Tglg|他加禄文字]]。使用塔格班瓦语的人口不足 {{n|25000}} 人，年轻一代更倾向于使用塔加洛语。但这套文字也被巴拉望岛的其他语言（截至2010年约为 {{n|97000}} 人）所使用，通常与 [[ps:Latn|拉丁文字]] 混用。\n\n其固有元音为 {{t|a}}。由于缺乏 [[pt:virama|止音符]] 和尾辅音符号，这些音素需要根据上下文来推测，就像在 [[ps:Buhd|布希德文字]] 中一样。

[Script.Takr]
Name=塔克里文字（Takri）
Lang=北印度与巴基斯坦的山区小语种
Text=它源自 [[ps:Shrd|夏拉达文字]]。塔克里文字曾被用于商业文书，但战后印度的独立迅速将其替换为 [[ps:Deva|天城文字]]。\n\n每个邦（或土邦）都有自己风格的塔克里文字。有时 [[ps:Dogr|多格拉文字]] 被认为是其中一种风格，但出于政治和技术原因，它已与塔克里文字 [[pt:unification|分离]]（未被统一编码）。在所有地方语言中都不存在 [[pt:virama|止音符]]，这一点从其自称 {{sm|𑚔𑚭𑚊𑚤𑚯}} {{t|ṭa:‑kᵊ‑ri:}} 中可以看出。但止音符被用于古代语言——巴利语和梵语。只有三个字母可以作为第二个符号形成辅音 [[pt:ligature|连字]]，即“ya”、“ra”和“ha”：{{sm|𑚞𑚶𑚤}} {{t|prᵊ}}。

[Script.Tale]
Name=德宏傣文字（Tai Le）
Lang=傣那语及傣泰语族其他语言（=傣语，=卢语；分布于中国、越南、缅甸、泰国）
Text=源自 [[ps:Mymr|缅甸]] 文字。最初不标记声调。经过 20 世纪的多次改革（最后一次在 1988 年），这套文字几乎变成了字母表，但它仍然保留着元音附标文字的特征，因为存在表示空辅音的 {{sm|ᥟ}}（用于词首元音），以及位于音节尾辅音之后的声调字母（如果有的话）。\n空格用于分隔句子，而不是单词。\n\n在第三次改革（1963–1988 年）的德宏傣文中，使用了常见的欧洲变音符号来表示声调：<big>à, á, ȧ, ä, ǎ</big>。\n\n中国约有 {{n|500000}} 名傣那人，但由于该语言正被汉语迅速取代，因此被归类为“脆弱”等级。其他国家还有不到 {{n|500000}} 人分散居住。

[Script.Talu]
Name=西双版纳新傣文字（New Tai Lue）
Lang=傣仂语及傣泰语族其他语言（=傣语，=卢语；中国；其他国家的傣泰社群使用 [[ps:Lana|兰纳文字]]）
Text=这套文字与 [[ps:Tale|德宏傣文字]] 无关，尽管这两种语言是近亲。它是在 20 世纪 50 年代由中国当局创制，用以取代 [[ps:Lana|兰纳文字]] 的。\n\n其固有元音为 {{t|a}}。止音符（Virama，即尾音符号）看起来像一个带圈的钩子，在 Unicode 中与辅音写在一起：{{sm|ᧇ}}。声调的书写方式很独特：辅音分为两组（高、低），音节后可能跟随两个符号 {{sm|ᧈᧉ}}，总共有 2×3=6 个声调。

[Script.Taml]
Name=泰米尔文字（Tamil）
Lang=泰米尔语（Tamil），[[ps:Saur|绍拉什特拉语（Saurashtra）]]
Text=这套文字源自 [[ps:Brah|婆罗米文字]]，经由帕拉瓦文字（古老的 [[ps:Gran|古兰塔文字]]）演变而来。固有元音为 {{t|a}}。[[pt:virama|止音符（Virama）]]非常常用，并演变成了一个点。将元音符号附加到辅音上的方法很奇特：ka={{sm|க}}, ki={{sm|கி}}, ṭa={{sm|ட}}, ṭi={{sm|டி}}。大多数辅音连字 [[pt:ligature|连字]] 由完整的初始字母和较小的下附字母组成。\n\n本地数字主要用在古兰塔文献中，泰米尔人更倾向于使用普通的 0…9。与其他印度计数系统不同，它有表示 10、100 和 1000 的特殊字符。在印度政府采用卢比符号 ₹ 之前，泰米尔人使用的是 {{sm|௹}}。\n\n南印度的达罗毗荼地区从未臣服于穆斯林统治，并创造了湿婆教，特别是印度教的正统派别。英语中有几个来自泰米尔语的借词：''catamaran''（双体船）、''cash''（现金）、''ginger''（生姜）、''coolie''（苦力）以及其他词汇。

[Script.Tang]
Name=西夏文字（Tangut）
Lang=党项语（Tangut，中国西北）
Text=这是一套存在于西夏王国（中国西北）的非常复杂的表意文字系统。最简单的表意字由 4 画组成，就连“一”字都有 6 画。最通行的版本是：这套文字由景宗皇帝（即李元昊）和学者野利仁荣设计。\n\n就像在中国一样，西夏书法也很发达，一个字有多达 4 种字体形式。在 Unicode 中，除非出现在同一来源中，否则它们通常被编码为一个字符。形状相似但名称不同的字形也被统一编码。\n\n西夏王国于 1227 年被成吉思汗摧毁，但这套文字又继续使用了几个世纪：最后的实物标本是 1502 年的，此外还有一个晚于 1680 年的手写标记存在。\n\n欧洲人从 1870 年开始研究这种死文字，苏联科学家尼古拉·涅夫斯基（Nikolai Nevsky）发挥了关键作用。\n\n由于版权问题，图标是原创的（由景永时教授描摹），字体是由谷歌公司重绘的现代罗马体。

[Script.Tavt]
Name=越南傣文字（Tai Viet）
Lang=黑傣语（Black Tai，越南）
Text=源自 [[ps:Thai|古泰文字]]（素可泰王国）。1961 年首次标准化，后来在 2006 年的一次联合国教科文组织赞助的研讨会上再次标准化。\n\n没有固有元音，但这套文字仍然是元音附标文字，因为其元音符号分布在左侧、顶部和右侧，非常奇特：{{sm|ꪶꪀ}}=ko, {{sm|ꪀꪱ}}=ka, {{sm|ꪀꪲ}}=ki。传统上读者需要猜测声调，在第一次标准化时增加了声调符号。

[Script.Tayo]
Name=傣侥文字（Tai Yo，莱傣文字（Lai Tai））
Lang=傣侥语（Tai Yo）
Text=一种源自 [[ps:Khmr|高棉文字]] 的元音附标文字，有两个独特的变体：\n* 它以从右向左的列式书写，明显受到了 [[ps:Hani|汉字]] 的影响。如果无法做到这一点，整个文本就会像 [[ps:Mong|蒙古文字]] 那样旋转。\n* 所有的元音符号都写在下方或右侧。没有前置或包围式的元音符号。\n\n固有元音是 {{t|ɔ}}。没有声调符号。没有标点符号，有时会使用中文的 [[pu:3001]] 和 [[pc:3002|02]]。有时音节之间用一个小空格隔开。在所有文献中，数字都是拼写出来的。现代文本使用 [[pk:FF00|全宽]] 的西方标点和数字，以及两个未编码的左侧声调符号。\n\n这种语言仍然存在，但现在使用 [[ps:Latn|拉丁文字]] 或 [[ps:Thai|泰文字]] 书写。

[Script.Telu]
Name=泰卢固文字（Telugu）
Lang=泰卢固语（Telugu）
Note=从 [[ps:Knda|卡纳达文字]] 分离出来。
Text=像大多数东南亚文字一样，源自 [[ps:Brah|婆罗米文字]]。大约在 1300 年与[[ps:Knda|卡纳达文字]]（其姊妹文字）分离。在 20 世纪后期进行了一次大规模的拼写改革，使书面泰卢固语更接近口语。\n\n字母顶部的勾号表示元音 {{t|a}}。如果添加了元音符号，这个勾号就会消失。[[pt:virama|止音符（Virama）]]的显式形式很少见，这既是因为泰卢固语偏爱开音节，也是因为其拥有发达的辅音连字 [[pt:ligature|连字]] 系统。连字的制作很简单：一个较小的字母被添加在下方或右侧。\n: ka {{sm|క}} + i {{sm|◌ి}} = ki {{sm|కి}}\n: ka {{sm|క}} + virama {{sm|◌్}} + ta {{sm|త}} = kta {{sm|క్త}}

[Script.Tfng]
Name=提非纳文字（Tifinagh，柏柏尔（Berber））
Lang=图阿雷格语（Touareg）及其他柏柏尔（Berber）语（摩洛哥）
Note=公元前2世纪之前（古老的辅音文字），约1970年（现代版本）。
Text=古利比亚文字（Old Lybian script）的起源尚不明确，通常认为源自 [[ps:Phnx|腓尼基文字]]。现存最古老的样本是两件公元前 2 世纪的双语铭文，分别来自阿特班王子（Prince Ateban）的纪念碑和马西尼萨国王（King Masinissa）的神庙。这种文字是 [[pt:abjad|辅音音位文字]]（只写辅音），通常从下往上或从右往左书写。\n\n在 20 世纪，人们基于古利比亚文字创造了一种从左往右书写的新文字。穆斯林国家（特别是卡扎菲时期的利比亚和 80 年代的摩洛哥）曾禁止使用该文字，但在 2003 年，摩洛哥国王批准了提非纳文字。利比亚过渡委员会也允许使用柏柏尔语和提非纳文字。

[Script.Tglg]
Name=他加禄文字（Tagalog，巴伊巴因文字（Baybayin））
Lang=古他加禄语及爪哇和菲律宾的其他语言
Text=一种具有固有元音 {{t|a}} 和 [[pt:virama|止音符（virama）]]的婆罗米系元音附标文字。我就写下这种文字的自称：{{sm|ᜊᜌ᜔ᜊᜌᜒᜈ᜔}} “ba-y-ba-yi-n”（巴伊巴因）。\n\n西班牙传教士（16 世纪）发现岛民的识字率几乎是 {{%|100}}，并开始亲自教授巴伊巴因文字。起初他们并不理解书写方向：文字是刻在竹板上的，刀锋是向外推的，所以他们可能朝一个方向刻写，却从另一个方向阅读。\n\n巴伊巴因文字的衰落有几个原因：西班牙人引进了纸张、钢笔和印刷术；在他加禄语中，受其影响开始区分 {{t|r/d}}、{{t|u/o}}、{{t|i/e}}。最后但同样重要的是：[[ps:Latn|拉丁文字]] 有助于生活，能获得体面的办公室工作。到了 19 世纪，巴伊巴因文几乎已经消亡，剩下的唯一事情就是排列拉丁字母表。现代有一些复兴巴伊巴因文的尝试。\n\n2021 年，一个新的音位 {{t|r}} 被编码——这两个版本都来自 19 世纪，而那个一直非正式流传至今的版本（在 Unicode 14 之前）被放到了 170D 的位置。此外，还出现了第二个止音符：十字形符号是西班牙人发明的，让人想起殖民过去，而且在窄间距下可读性很差。

[Script.Thaa]
Name=它拿文字（Thaana）
Lang=迪维希语（Dhivehi）{{nspk||=马尔代夫语（Maldivian）}}
Text=1153 年，马尔代夫从佛教改信伊斯兰教。''Gabulhi Thaana''（意为“不完整的文字”），最初可能是为了记录伊斯兰语录而发明的，在 17 世纪开始取代 [[ps:Diak|迪维希文字]]。其起源非常独特：它的辅音源自阿拉伯数字和前伊斯兰时期的数字，而元音则来自 [[ps:Arab|阿拉伯文字]] 的元音符号。随着时间的推移，线条变得更加平滑，优雅的45度倾斜书写风格变得广泛流行。探险家托尔·海尔达尔曾将它拿文字比作面条。\n\n20 世纪 70 年代，它拿文曾濒临灭绝：易卜拉欣·纳西尔总统建立了电传通信系统，政府转而使用一种设计拙劣的 [[ps:Latn|拉丁文字]] 转写方案。然而，下一任总统马姆恩·阿卜杜勒·加尧姆恢复了它拿文。如今，这两种文字被并行使用。

[Script.Thai]
Name=泰文字（Thai）
Lang=泰语（Thai）
Text=它源自 [[ps:Khmr|古高棉文字]]，而古高棉文字又源自 [[ps:Brah|婆罗米文字]]。这套字母表是由兰康亨大帝于1283年整理并颁布的。\n\n固有元音在开音节中是 {{t|a}}，在闭音节中是 {{t|o}}：例如 {{sm|ถนน}} 读作 {{t|thanon}}（道路）。字母是 [[pt:acrophonic|首音命名]] 的：例如，字母 {{sm|ช}} 被称为“cho chang”（大象）。词与词之间没有空格。

[Script.Tibt]
Name=藏文字（Tibetan）
Lang=藏语（Tibetan），宗喀语（Dzongkha，不丹），夏尔巴语（Sherpan）……
Text=像大多数南亚文字一样，它源自婆罗米文字，固有元音是 {{t|a}}。\n\n人们普遍认为，这种文字是由吞弥·桑布扎发明的，他曾前往印度，并为藏传佛教奠定了基础。从那时起，正字法（拼写规则）没有发生太大变化，但语言却发生了演变，因此书写形式与发音大相径庭。

[Script.Tirh]
Name=提尔胡塔文字（Tirhuta，迈蒂利语，弥特罗舍文字（Maithili, Mithilakshar））
Lang=迈蒂利语（Maithili，印度），梵语（Sanskrit）
Note=从“高达文字”（原始孟加拉文字）中分离出来
Text=这种文字与 [[ps:Beng|孟加拉文字]] 非常接近，大多数字符都很相似，但由于存在不同的 [[pt:ligature|连字]] 规则，两者无法进行 [[pt:unification|统一]]。它的第一副金属活字制作于20世纪20年代，而第一个数字字体则出现在20世纪90年代。大多数使用者（截至2000年约为3400万）在20世纪转用了 [[ps:Deva|天城文字]]，如今这种文字主要用于印度教仪式。在很长一段时间里，迈蒂利语被认为是印地语或孟加拉语的一种方言，但在2003年它被宣布为一种独立的语言，而天城体则被保留为主要书写文字。\n\n固有元音是 {{t|a}}。[[pt:virama|止音符]] 仅用于梵语词汇：辅音连缀写作连字，元音在词尾时变为静音。\n{{smtable|ka|*𑒏|+ i|**◌𑒱|= ki|*𑒏𑒱}}\n{{smtable|ka|*𑒏|+ virama|**◌𑓂|+ ta|*𑒞|= kta|*𑒏𑓂𑒞}}

[Script.Tnsa]
Name=唐萨文字（Tangsa）
Lang=唐萨（Tangsa）诸语言{{塔谢-那加语（Tase-Naga）}}
Text=这是一个使用不同类型的 [[ps:Latn|拉丁文字]] 书写的汉藏语系小语族。1990 年，来自印度的拉胡姆·莫桑（Lakhum Mossang）创造了这套字母表，并一直教授给大约 100 人，直到他于 2020 年去世。\n\n元音的名称由音位加上四种声调中的一种组成。相比之下，在苗文拉丁文字中，声调也是用字母来书写的。

[Script.Todr]
Name=托兹里文字（Todhri，埃尔巴桑（Elbasan）），阿尔巴尼亚文字
Lang=阿尔巴尼亚语（Albanian）
Text=由特奥多尔·哈吉菲利皮（Theodhor Haxhifilipi），也被称为托兹里老师（Teacher Todhri）所创制。他将多部基督教文本翻译成阿尔巴尼亚语，据说甚至包括整部《圣经》。只有少数文本幸存下来，特别是《约翰福音》和一些祈祷文。这种文字在他于 1805 年去世后，仍在埃尔巴桑地区使用了很长一段时间：它大约在 1849 年被约翰·冯·哈恩（Johann von Hahn）发现（尽管名字里有“托兹里”，哈恩当时怀疑这是一种古代文字），且当时已相当罕见。1900 年，人们发现了一位通晓托兹里文字的老僧侣，据说最后一批识读写的人大约在 1930 年去世。\n\n其编码顺序与哈恩当年的记录不同，更适合现代阿尔巴尼亚语研究。\n\n{{Albanian}}\n\n请勿与 [[ps:Elba|爱尔巴桑福音书文字]] 混淆！

[Script.Tols]
Name=托隆希基文字（Tolong Siki）
Lang=库鲁克语（Kurukh）{{nspk||=库鲁克斯语，奥拉翁语（Kurux, Oraon）}}
Text=由纳拉扬·奥拉翁（Narayan Oraon）创制。这是一种纯粹的字母表，没有固有元音。相比于作为库鲁克语主要文字的 [[ps:Deva|天城文字]]，这套新字母能更好地传达该语言的特点。

[Script.Toto]
Name=投投文字（Toto）
Lang=投投语（Toto）
Text=这是一种在托托帕拉村（Totopara）由托托部落（Toto tribe）使用的汉藏语系小语种。其状态为极度濒危：语言传承已经中断。大约三分之一的人口具备读写能力。其书写系统使用 [[ps:Beng|孟加拉文字]] 或由该部落长者达尼拉姆·托托（Dhaniram Toto）于2015年创制的自有文字。

[Script.Tutg]
Name=图卢提加拉里文字（Tulu-Tigalari）
Lang=图卢语（Tulu），卡纳达语（Kannada），梵语（Sanskrit）
Text=非常古老的图卢文字（Tulu）和提加拉里文字（Tigalari）十分相近，有些人甚至认为它们是同一种文字。也许很快会加入其“姐妹文字”古兰塔-马拉雅拉姆文字（Grantha-Malayalam）的字符。它们都与 [[ps:Gran|古兰塔文字]] 有关，如今在印度教中已很少使用。已知最早的铭文可追溯至 1159 年，但这种文字的历史要古老得多。作为一种少数民族语言，图卢语曾被英国当局忽视，这种文字也因此濒临消亡。\n\n现代图卢语使用 [[ps:Knda|卡纳达文字]] 和 [[ps:Mlym|马拉雅拉姆文]] 书写，或者使用复兴后的、通常与马拉雅拉姆文 [[pt:unification|统一]] 的文字书写。目前有一个共识：不将古代图卢文与现代图卢文统一：现存的婆罗米系文字倾向于简化输入，而“死文字”则倾向于简化字体设计，并能在有缺陷的字体上依然传达作者的拼写意图。\n\n古代数字极少见且尚未编码，现代数字则与卡纳达文统一。图卢语手稿中包含看起来像下标加号（+）的编辑标记（将来可能会作为泛印度标点符号进行编码），因此代表虚拟 [[pt:virama|止音符]] 的图片内部是加号而不是下方。''达达''（Danda）竖线是普通的，为了防止多语言文本出现问题，已对其进行了单独编码。

[Script.Ugar]
Name=乌加里特文字（Ugaritic）
Lang=乌加里特语（Ugaritic），胡里安语 （Hurrian，仅在乌加里特附近使用）
Text=居住在黎凡特（现代叙利亚）的闪米特人无法夸耀其经济、文化或军事实力，但他们处于贸易路线的十字路口。因此，他们为了自身需求借用了 [[ps:Xsux|楔形文字]] 的原理，创造了一个由 30 个辅音组成、从左向右书写的字母表；没人知道它是如何制造的，也不知道在此之前有过什么。许多字母的名称都是重构的，无法确切知晓。唯一的标点符号是词分隔符。\n\n许多书籍和商业文件得以幸存，它们让我们得以了解乌加里特生活的方方面面。有人怀疑这套字母表是由单一作者创造的，因为其设计非常经济——常用字母的楔形笔画更少。\n\n人们认为乌加里特文字没有衍生出子文字，尽管其字母顺序与 [[ps:Phnx|腓尼基文字]] 相近，但也存在两种不寻常的变体：一种是从右向左书写的 21 个字母的缩写字母表，另一种是带有 [[ps:Sarb|南阿拉伯文字]] 字母顺序的泥板。\n\n乌加里特城在公元前 1200 年左右随着青铜时代崩溃而被废弃，那是当时古代世界发生的一场性质尚有争议的全面衰退。

[Script.Vaii]
Name=瓦伊文字（Vai）
Lang=瓦伊语（Vai，利比里亚，根据不同来源，使用人口约 10 万至 20 万）
Text=这种文字大约出现在 1833 年。它是由莫莫卢·杜瓦卢·布克勒（Momolu Duwalu Bukele）发明的，可能受到了 [[ps:Cher|切罗基文字]] 的影响（随着一些美洲原住民迁移到利比里亚，其中一人甚至成为了瓦伊族的首领）。\n\n瓦伊文字得以幸存的原因之一，是它借用了非洲文化中的优秀字符集。另一个原因是它被用于与荷兰人和葡萄牙人的贸易中。1962 年，利比里亚大学为缺失的音节添加了字符。

[Script.Vith]
Name=维斯库奇文字（Vithkuqi）字母表用于阿尔巴尼亚语
Lang=阿尔巴尼亚语（Albanian）
Text=这套字母表是由作家、翻译家和律师纳乌姆·韦基尔哈尔吉（Naum Veqilharxhi）创造的。他从 1824 年到 1844 年，为这套字母表工作了 20 年。纳乌姆在两年后去世，这套字母表并没有得到广泛传播。它以纳乌姆出生的村庄维斯库克（Vithkuq）命名。此外，德语化的 “Büthakukye” 也很流行。\n\n这套字母表非常适合阿尔巴尼亚语的语音，但出于某种原因，它缺少现代阿尔巴尼亚语中的双字母组合 “gj”、“rr”、“xh” 和 “zh” 的对应字母。\n\n{{阿尔巴尼亚语}} 纳乌姆的理由肯定是前者：在他回应批评的信件中，他的字母留存了下来；而且这套字母表远离 [[ps:Latn|拉丁文字]]、[[ps:Grek|希腊文字]] 和 [[ps:Arab|阿拉伯文字]]，是为了保持宗教中立。

[Script.Wcho]
Name=万乔文字（Wancho）
Lang=万乔语（Wancho）
Text=万乔语是一种小型的汉藏语系语言，通常使用 [[ps:Deva|天城文字]] 或 [[ps:Latn|拉丁文字]] 书写。在 2001 年至 2012 年间，一位名叫班旺·洛苏（Banwang Losu）的教师设计了一套新的字母表。四种声调通过变音符号来书写。标点符号则采用普通的欧式标点。

[Script.Wara]
Name=瓦兰齐地文字（Warang Citi）
Lang=霍语（Ho）
Text=这套文字是由社区领袖拉科·博德拉（Lako Bodra）从零开始创造的。他声称这是来自 13 世纪一位名叫达万·图里（Dhawan Turi）的人的神圣启示。这套字母表以“Om”字符开头——这是宇宙创生的第一声。霍语是一种没有文字的语言，大约 {{%|2}} 的人使用瓦兰齐地文字书写，同样数量的人使用 [[ps:Orya|奥里亚文字]] 书写。\n\n它的类型存在争议：每个字母都有一个固元音 {{t|a}}（有些是 {{t|ɔ}} 或 {{t|ɛ}}），就像 [[pt:brahmic|婆罗米系元音附标文字]] 一样。但它也具有字母文字的特征：有大小写之分，所有元音都是独立字符而非符号。发音并不总是统一的：固元音是否会变为静音尚不清楚（在词尾位置它总是静音的）。阅读其自称 {{sm|𑢹𑣗𑣁𑣜𑣊 𑣏𑣂𑣕𑣂}}：字母的发音取自名称的最后一个音素，除了 {{sm|𑢹}}=h 和 {{sm|𑣗}}=b，这个双字母组合读作 {{t|w}}。

[Script.Xpeo]
Name=古波斯楔形文字（Old Persian Cuneiform）
Lang=古波斯语（Old Persian）
Text=书写原则取自 [[ps:Xsux|苏美尔-阿卡德]] 楔形文字，但字母却几乎完全不同。最普遍的观点是：这套文字是为了记录阿契美尼德王朝君主的功绩而人为发明的。所有已知的铭文仅覆盖了公元前 520 年至 330 年这短短两个世纪。\n\n到了 1800 年，“国王”这个词已经被识别出来。1802 年，格奥尔格·格罗特芬德（Georg Grotefend）破译了国王的名字——他手头并没有双语对照文本，仅仅是知晓“大流士”（Darius）或“薛西斯”（Xerxes）的希腊语发音，其原音分别为“Dārayavaʰuš”和“Xšaya-ṛšā”。1823 年，弗朗索瓦·商博良（François Champollion）发现了一份 [[ps:Egyp|埃及文字]]-楔形文字的双语文本，并证实格罗特芬德是正确的。1836 年，欧仁·比尔努夫（Eugène Burnouf）推测其中一份铭文是大流士的总督辖区（satrapies）列表，并破译了几乎所有的字母表。波斯楔形文字的破译成为了通往苏美尔语的钥匙。

[Script.Xsux]
Name=苏美尔-阿卡德楔形文字（Sumero-Akkadian Cuneiform）
Lang=语言=苏美尔语（Sumerian）, 阿卡德语（Akkadian）, 赫梯语（Hittite）, 埃兰语（Elamite）, 胡里语（Hurrian）, 乌拉尔图语（Urartian）……
Text=最初（约公元前 3500 年），商业文书是写在粘土上的（例如“10 头牛”）。到了公元前 3200 年出现了表意符号（Ideographs），而到了公元前 3000 年，人们开始将表意符号当作音节符号使用。书写风格也随之发生了平行演变：字符逆时针旋转了 90°，并开始使用棱柱形书写笔进行压印——因此产生了由尖锐楔形元素构成的文字。\n\n在公元前一千纪，楔形文字被更先进的文字系统所取代。例如，[[ps:Xpeo|波斯楔形文字]]（公元前一千纪）是元音附标文字（alphasyllabic），而不是意音文字（ideosyllabic）。已知的最后一个样本是在公元 75 年。\n\n泥板在波斯和伊拉克的沙漠中保存了数千年，波斯楔形文字在 19 世纪中叶被破译。这成为了通往苏美尔语的钥匙。所有已知的（楔形）语言在 1900 年前都被破译了。\n\n“Cuneiform”字块大致对应乌尔第三王朝（约公元前 2100 年）时期的楔形文字，而更晚期的形式（古亚述和新亚述）则作为变体被 [[pt:unification|统一]] 处理。“Early dynastic cuneiform”字块则描述了更早时期（约公元前 2900 年）的字符。

[Script.Yezi]
Name=雅兹迪文字（Yezidi）
Lang=北库尔德语（Northern Kurdish，=库尔曼吉语（Kurmanji））
Text=雅兹迪人是库尔德民族的一部分，他们信奉源于 [[ps:Avst|琐罗亚斯德教]] 的雅兹迪教。雅兹迪圣书——《启示书》（Book of Revelation）和《黑书》（Black Book）——是用一种特殊的文字书写的（尽管也已知有早期的 [[ps:Arab|阿拉伯文字]] 版本）。关于这些书籍的年代测定，目前尚无定论。\n\n雅兹迪人长期遭受穆斯林的压迫，因此他们的宗教主要依靠口口相传，极少有人见过书面形式的典籍。伊斯兰国（ISIS）在 2014 年至 2017 年间对雅兹迪人实施了种族灭绝：约 5000 人被杀害，至少 5000 人失踪，约 50 万人逃离了伊拉克。雅兹迪女孩娜迪亚·穆拉德（Nadia Murad）曾被俘虏，后成功逃脱，成为联合国亲善大使，并于 2018 年获得诺贝尔和平奖。

[Script.Yiii]
Name=彝文（Yi，诺苏支系）
Lang=诺苏语（Nuosu） {{nspk}} 及其他彝语支语言
Note=音节文字
Text=最早的古老（表意）彝文样本可追溯至约 1500 年，但这种文字的历史绝对更为久远。传说称其存在于唐朝（618–907）。该文字系统由 8000 到 10000 个表意字符组成。\n\n现代音节彝文是中国政府于 1974 年创制的。该语言拥有 43 个辅音、8 个元音和 4 个声调（简单声调，以及 p、t 和 x），但并非所有组合都是可能的，而彝文可以书写 1165 个音节。

[Script.Zanb]
Name=札那巴札尔方形文字（Zanabazar Square，蒙古横写方块字）
Lang=蒙古语（Mongolian），拉萨藏语（Lhasa Tibetan），梵语（Sanskrit）
Text=佛教僧侣札那巴札尔（1635–1723），语言学家兼艺术家，因开发 [[ps:Soyo|索永布文字]] 文字而闻名。鲜为人知的是，他还设计了蒙古横写方块文字，同样基于 [[ps:Tibt|藏文字]]——目前尚不清楚它是在索永布文文字之前还是之后创制的（主要假设认为是在之前），以及它为何被创制和使用范围有多广。该文字于 1801 年被重新发现，仅存少量样本。\n\n它是一种婆罗米系元音附标文字（Brahmic abugida），带有固有元音 {{t|a}} 和 [[pt:virama|止韵符]]（virama）。此外，它有两种物理止韵符，均见于文献中且无控制含义，一种用于词尾字母，另一种用于辅音连写。还有另外两种实现辅音连写的方法：使用第三种虚拟止韵符（字母堆叠在一起，有时高度会被压缩），以及使用小型化的尾辅音符号。这些方法混合使用得令人费解：例如，一个带止韵符的辅音，和三个堆叠在一起的辅音并存。初始元音是通过在 {{sm|𑨀}} 上固定元音符号形成的。所有文献中均未发现数字。其竖写方式非常奇特，且超出了 Unicode 的编码范围：一个原本位于第二个字母上方的标记，可能会出现在整个单词的上方。

[Script.Zinh]
Name=各种（Various）
Text=组合变音符号被用于多种文字系统中。

[Script.ZEMO]
Name=绘文字（Emoji）

[Script.ZCJL]
Name=全宽拉丁文字（Fullwidth Latin）

[Snip]
Albanian=阿尔巴尼亚语之所以存在多种字母系统（[[ps:Elba|爱尔巴桑文字]]、[[ps:Vith|维特库奇文字]]、[[ps:Todr|托兹里文字]]、维索贝伊、韦拉拉），主要有几个原因：民族解放运动的学者们观察周边的斯拉夫人、希腊人和土耳其人，决心创造属于自己的文字；同时，也是为了在奥斯曼帝国统治下保持秘密性（阿尔巴尼亚于 1912 年随着奥斯曼帝国的解体而获得独立）。
ArabPres1=设立该（Unicode）区块是为了与 CP864（DOS 系统）等旧编码保持 [[pt:convertibility|兼容]]。由于早期排版引擎功能的 [[pt:dynamic|局限]]，这些旧编码针对字母的独立、词首、词中和词尾形式使用了完全不同的编码。
ArabPres2=最好在普通文本中避免使用这些字符。它们唯一的合法用途是在教育材料中（用于展示字母形态），因此这些字符被归类为“阿拉伯文字”类（因为在许多旧编码中，文本是从左到右书写的）。
GrekCoptUni=在 Unicode 1.0 中，科普特文与希腊文被 [[pt:unification|统一]] 了，所有纯科普特字母也被视为希腊文。Unicode 4.1（2005 年）将这些语言分离了：因为科普特学的研究文献中经常包含希腊文。此外，只有一个科普特字母在大小写形式上具有显著不同的字形：{{smfunky|Ϧϧ}}。

[CharCat.Cc]
Name=控制字符（Control）
Text=在最初的几年里，当经常需要手动重复交换会话（使用打孔纸带或控制台）时，控制字符被用来替代数据格式和网络协议。{{k|Ctrl}} 键最初就是用来输入控制字符的。目前只有少数几个还在使用：\n* 空字符 [[pc:00]]——内存中字符串的结束标记；\n* 文件结束符 [[pc:04]] (Unix) 和 [[pc:1A]] (DOS/Windows)——在控制台中输入 {{k|Ctrl|D}}/{{k|Ctrl|Z}} 以结束文本输入；\n* 响铃 [[pc:07]]——提醒操作员注意终端或打印机。现在通常通过声卡播放声音，且不再暂停打印；\n* 退格 [[pc:08]]——将打印头向后移动一步；\n* 制表符 [[pc:09]]——移动到第 9、17、25、33… 位，用于表格格式化；\n* 换行 [[pc:0A]]——Unix 中文本文件的行尾标记；将滚筒向前转动一行；\n* 换页 [[pc:0C]]——打印机弹出纸张；\n* 回车 [[pc:0D]]。因此 DOS/Windows 中的行尾是 0D+0A——打印机将打印头归位并转动滚筒；\n* 转义 [[pc:1B]]——执行某些命令，要么是打印机的（字体、图形），要么是控制台的（光标移动、颜色）。\n\n其他有趣的指令：\n\n* 垂直制表符 [[pc:0B]]——将滚筒转到预设位置。这使得在现有表单上打印更快且更安静；\n* 移出/移入 [[pc:0E]]/[[pc:0F]]——切换色带颜色，或切换字符集；\n* 数据链路转义 [[pc:10]]——下一个字符是 [[pt:graphic|图形]] 字符，而不是控制字符；\n* 删除 [[pc:7F]]——修正打孔纸带上的错误（七个轨道都被打孔，该字符会被跳过）。在某些终端中，FF 字符扮演了这个角色，这就是为什么在文件服务器和 MUD 游戏中，[[ps:Cyrl|俄语]] 的“я”被大写字母取代了。\n\n控制类别中的所有 65 个字符都是历史产物。实际上影响文本显示的字符被称为 [[pt:format|格式]] 字符。

[CharCat.Cf]
Name=格式字符（Format）
Text=这是一类控制各种文本处理算法的不可见字符：\n\n* 文本换行控制：00AD——软连字符。\n* 赋予文本语义：2062——方程式中的不可见乘号，它允许在 a × b 处换行（而在俄罗斯排版习惯中，a × b 也可以换行），这与不可见函数应用符 2061 不同。\n* 构建或打断连字：200D——零宽连接符。\n* 指定书写方向：2066——隔离一段从左向右书写的文本。\n* 执行特定脚本任务（这些任务无法仅通过字体实现）：1D173——开始一组用符尾连接的音符。

[CharCat.Ll]
Name=小写字母（Letter/lowercase）
Text=[[pt:minuscule|小写体]] 书写出现于中世纪早期，最初是为了节省昂贵的羊皮纸，后来演变成了小写字母，并使拉丁字母成为一种极具表现力的字母系统。

[CharCat.Lm]
Name=修饰字母（Letter/modifier）
Text=这种“次级字母”在语音学中很常用，能为字母增添额外的含义。例如，修饰字母 撇号 (xʹ) 有时用于表示腭化辅音，这与数学中的撇号 (x′) 不同。

[CharCat.Lo]
Name=其他字母（Letter/other）
Text=单式文字系统的字符——即没有大写字母和小写字母之分。例如，[[ps:Hebr|希伯来文字]]、[[ps:Arab|阿拉伯文字]] 和 [[ps:Hani|中日韩统一表意文字]]。此外还包括一些特殊字符，如罗曼语族中的阳性/阴性序数词指示符（1º——阳性第一，1ª——阴性第一）。

[CharCat.Lt]
Name=混合大小写字母（Letter/mixed case）
Text=由一个大写字母和一个小写字母组成的二合字母字符。例如，克罗地亚拉丁字母表中有二合字母 ǈ。而其对应的塞尔维亚字母 Љ 并不是一个二合字母，因此也就没有混合大小写形式。

[CharCat.Lu]
Name=大写字母（Letter/uppercase）
Text=那些采用了小写（lowercase, minuscule）字母的书写系统，便开始将旧式形状的字母称为大写、上档或大写字母。

[CharCat.Mc]
Name=间距标记（Mark/spacing）
Text=具有自身宽度的组合标记存在于一些南亚和东南亚的书写系统中：天城文、孟加拉文、卡纳达文、韩文……

[CharCat.Me]
Name=封闭标记（Mark/enclosing）
Text=封闭标记用于古西里尔字母数字（如 А҈）。此外，也存在封闭用的方框、圆圈和其他形状。在 Windows 10 20H2 版本中，经过测试的排版引擎（GDI, Cairo, Skia）都无法完美支持这些字符，但如果使用像 DejaVu 这样优秀的字体，显示效果也还不算太差。

[CharCat.Mn]
Name=非间距标记（Mark/nonspacing）
Text=非间距标记（例如重音符号 á）被设计为零宽度字符，因此得名。在优秀的字体中，设计师会手动将这些标记放置在最常见的字母上。但如果这种组合未被预先考虑到（例如 8́），标记就会被随意放置，结果往往远不尽如人意。

[CharCat.Nd]
Name=十进制数字（Number/decimal）
Text=人类之所以以十为单位计数，是因为有十根手指。在许多语言中，“数字”和“手指”这两个词都有着渊源。虽然全世界都在使用起源于印度的位值计数法，但在中东和东南亚的语言中，数字的写法却很奇特。

[CharCat.Nl]
Name=字母数字（Number/letter）
Text=罗马数字、中文数字以及其他基于字母的数字。古斯拉夫数字也是基于字母的，但 Unicode 对它们使用的是普通的 А、В、Г……加上组合标记。

[CharCat.No]
Name=其他数字（Number/other）
Text=古老的数字系统、预组分数、上标、下标、带圈数字、大数缩写等等。

[CharCat.Pc]
Name=连接标点（Punctuation/connector）
Text=这是一个很小的字符组。其中最广为人知的就是下划线。

[CharCat.Pd]
Name=短横线/破折号（Punctuation/dash）
Text=这段文字揭示了 Unicode 对“横线”类字符的精细分类逻辑，主要区分了排版用途和数学用途。

[CharCat.Pe]
Name=闭合括号（Punctuation/closing bracket）
Text=括号之所以被归为一个单独的类别，是因为它们在双向书写中起着至关重要的作用。

[CharCat.Pf]
Name=结尾标点（Punctuation/final）
Text=主要是引号。

[CharCat.Pi]
Name=起始标点（Punctuation/initial）
Text=主要是引号。

[CharCat.Po]
Name=其他标点（Punctuation/other）
Text=句号、逗号、百分号、列表项目符号以及许多其他字符。

[CharCat.Ps]
Name=起始括号（Punctuation/opening bracket）
Text=括号之所以被归为一个单独的类别，是因为它们在双向书写中起着至关重要的作用。

[CharCat.Sc]
Name=货币符号（Symbol/currency）
Text=货币符号是国家形象的重要组成部分，甚至连蒙古图格里克都有一个看起来像墓碑一样的符号  <font size='+1'>₮</font>。阿尔捷米·列别杰夫在 20 世纪 90 年代末曾表示俄罗斯卢布并不需要专门的符号，但后来他的公关团队却将 <font size='+1'>₽</font> 这一符号推广成了官方标准。

[CharCat.Sk]
Name=修饰符号（Symbol/modifier）
Text=像扬抑符 ^ 这样的字符，它们看起来像组合标记，但不具备那些特殊的属性。以及另外一些字符。

[CharCat.Sm]
Name=数学符号（Symbol/mathematical）
Text=最初，计算机数学排版使用了好几种不同的系统；其中最著名的是 TᴇX（读作“tech”）和 MathType（也就是大家熟知的“微软公式编辑器”）。Unicode 的出现带来了一线希望，它有望为计算机数学提供一个统一的标准，并让我们具备了在论坛等通用系统中编写公式的有限能力。

[CharCat.So]
Name=其他符号（Symbol/other）
Text=Unicode 包含了大量不同的字符，其中包括商业符号、技术符号以及 [[pt:emoji|表情符号]]。

[CharCat.Zl]
Name=行分隔符（Separator/line）
Text=唯一字符 2028。

[CharCat.Zp]
Name=段落分隔符（Separator/paragraph）
Text=One character 2029.

[CharCat.Zs]
Name=空格分隔符（Separator/whitespace）
Text=这种字符旨在留出空白。排版精良的文本会预留恰到好处的空间：146%{{-}}（太窄），146{{_}}%（太宽），{{%|146}}（刚刚好）。正因如此，空格也有多种不同的类型。其中一些是“不换行”的：它们在两端对齐的文本中不会被拉伸，也不会换行到下一行。\n\n空格通常没有图形表示，只会移动光标。但如果开启了下划线，或者该文字系统本身带有一条公共基线（如欧甘文字），空格就可能变得可见。\n\n在「Unicodia」中，空格正是通过字身的大小来标记的，所以其狭窄度具有欺骗性。发丝空格 [[pu:200A]] 往往足以留出一点空隙。

[Term.abc]
Name=排序规则
Text=这是用于排列文本字符串的标准顺序。已知最古老的排序源自乌加里特文字。\n\n排序规则的起源：\n* 拉丁文字、希腊文字、西里尔文字、阿拉伯文字、格鲁吉亚文字、亚美尼亚文字、希伯来文字、埃塞俄比亚文字——源自腓尼基文字。腓尼基文字的排序可能源于更早的闪米特语言。\n* 如尼文字（即“弗萨克”字母）——起源未知；\n* 所有的婆罗米系元音附标文字，以及按发音排序的中日韩文字——遵循语音学顺序，即从喉咙音（如 k）到牙齿音（如 s）；\n* 按书写排序的中日韩文字——使用所谓的“部首”。\n\nUnicode 按照接近字母表的顺序来编写字符，但并不规定字母排序的规则。如果某个国家的字母顺序发生变化，该国自行更改，无需咨询 Unicode 联盟。

[Term.abjad]
Name=辅音音素文字
Text=只书写辅音音素的文字。元音要么完全省略，要么用可选的元音符号书写。“abjad”（辅音音素文字）一词源于 [[ps:Arab|阿拉伯]] 字母的自称{{-}}أبجد ''abjadiya''。\n\n尽管有明显的缺点，辅音文字也有一些优势。\n* 在闪米特语族{{-}}[[ps:Phnx|腓尼基语]]、[[ps:Hebr|希伯来语]]、阿拉伯语{{-}}中，词根是辅音的骨架，元音作为后缀起作用。在阿拉伯语中，''jihad''（圣战/努力）是由 ''mujahid''（圣战者/奋斗者）来完成的。\n* 更容易组建庞大的帝国{{-}}方言差异被抹平。\n* 差异不仅在空间上被抹平，在时间上也是如此{{-}}跨越世纪的铭文与现代语言更为对应。\n* 这种文字更短，当“纸张”和“笔”都很简陋时，这一点很重要。\n\n许多辅音音素文字都有 ''matres lectionis''（阅读之母）{{-}}表示元音音素的辅音字母。希伯来语中记录了一种现象：''bayt'' → ''bet''（房子），Yod 字母被重新解释用于从未存在过双元音的单词中。另一种选择是通过发音：[[ps:Grek|希腊]] 字母 Iota 追溯到腓尼基字母 Yod，后者有时代表“i”。当元音符号出现后，''matres lectionis'' 并没有消失，而是开始补充它们。

[Term.abugida]
Name=元音附标文字
Text=学者们对于元音附标文字（abugida）的定义存在分歧，其中最宽泛的定义是：一种 [[pt:syllabic|音节]] 文字，其中相似的音节用相似的字符书写。\n\n[[pt:brahmic|婆罗米系文字]] '''绝对是''' 元音附标文字。\n\n[[ps:Ethi|埃塞俄比亚文字]] 和 [[ps:Cans|加拿大原住民音节文字]] '''在大多数分类中''' 属于元音附标文字。\n\n[[ps:Thaa|它拿文字]]、[[ps:Wara|瓦兰齐地文字]] 和 [[ps:Sora|索拉僧平文字]] '''在某些资料中''' 被归为元音附标文字。\n\n[[ps:Hang|谚文]] 和 [[ps:Yiii|彝文]] '''绝对不是''' 元音附标文字。\n\n有趣的事实：“abugida”一词源于吉兹语（古埃塞俄比亚语）{{sm|አቡጊዳ}} (a-bu-gi-da){{-}}所以有些语言学家否认这个名称来源于其本身的文字拥有“abugida”这个名字的权利！\n

[Term.acrophonic]
Name=首音字符
Text=对于字母：它们的名称是某些以该字母本身开头的单词，就像在 [[ps:Thai|泰文]]、古 [[ps:Cyrl|西里尔字母]]/[[ps:Glag|格拉哥里字母]] 和 [[ps:Phnx|腓尼基字母]] 中一样。\n\n对于数字和其他事物：字符源自该单词的首字母。例如，符号 '''№''' 源自拉丁语 ''numero''。

[Term.alphabet]
Name=全音素文字
Text=线性文字，同时书写辅音和元音。已知最早的字母文字是 [[ps:Grek|希腊文字]]。\n\n有些资料将辅音和元音结合成音节的非线性文字视为字母文字（[[ps:Thaa|它拿文字]]、[[ps:Hang|谚文]]），或者根本不被任何人视为字母文字（[[ps:Laoo|老挝文字]]）。\n\n尽管有种种优势，字母文字也有一个严重的缺点。由于发音的转变，会出现复杂的历史拼写法，有时必须进行改革。嗯，[[ps:Cyrl|俄语]] 中的 Yat '''ѣ''' 曾是一个独立的音位，在 18 世纪完全消失，并在一个多世纪后的 1918 年从书写中废除。[[ps:Latn|英语]] 和法语的拼写大多是历史遗留的。

[Term.altcode]
Name=Alt 码（Alt codes）
Text=在 [[po:Ibm|IBM PC]] 的 BIOS（固件）中引入的按代码输入字符的方法。Windows NT 家族有三种类型的代码。\n\n'''DOS 码'''\n\n按住 {{kb|Alt}}（左侧{{-}}通用，右侧{{-}}取决于键盘布局），在 '''数字''' 小键盘上输入 1 到 255 的 '''十进制''' 字符代码。例如，{{k|Alt|51}} 打出数字 3。\n\n这种编码对所有用户都是通用的，属于某种 DOS 编码（437、866 等），具体取决于非 Unicode 应用程序选择的语言。代码 1 到 31 和 127 会生成这些字符的可打印版本：1={{em|☺}}。\n\n'''Windows 码'''\n\n按住 {{kb|Alt}}，在数字小键盘上输入 {{k|'''0'''}}, 然后输入 32 到 255 的 '''十进制''' 字符代码。{{k|Alt|0240}} 打出字母 ð。\n\n无论 Windows 设置如何，编码均为 Windows-1252。代码 127 不起作用。代码 128 到 159 是各种排版字符。其余与 [[pt:latin1|Latin-1]] 相同。\n\n'''Unicode 码'''\n\n实验性的，并不在所有应用程序中有效。要使其生效，需在注册表项\n: HKEY_CURRENT_USER\\Control Panel\\Input Method\n中添加 '''字符串''' 参数 EnableHexNumpad=1 并重启计算机。\n\n按住 {{kb|Alt}}，输入 {{kb|Num+}} 和 '''十六进制''' 字符代码。字母 A…F 从主键盘输入。只有 [[pt:bmp|基本多文种平面]] 有效。{{k|Alt|+262F}} 打出阴阳符号 {{em|☯}}。

[Term.appentry]
Name=应用程序专用输入法（application-specific input methods）
Text='''LibreOffice 和 Microsoft Office'''\n\n输入十六进制字符代码（例如 262F），然后按 {{kb|Alt|X}}。代码将转换为字符{{-}}在本例中为 {{em|☯}} [[pu:262F]] 阴阳符号。\n\n'''UnicodeInput'''\n\n一款 Windows 常驻程序，旨在解决 [[pt:altcode|Alt 码]] 的缺陷。它驻留在通知区域，通过 {{kb|Alt|Num+}} 键触发，并能向任何程序输入任意 Unicode 字符。\n\n[[https://www.fileformat.info/tool/unicodeinput/index.htm|在此下载]]

[Term.arguable]
Name=类型有争议的文字
Text=对于五种文字，各方来源并不一致它们究竟是什么。\n\n[[ps:Hang|谚文]] ''（韩语）''{{-}}[[pt:syllabic|音节文字]] ''（Unicode）'' 或 [[pt:alphabet|全音素文字]] ''（Omniglot，英文维基百科）''。\n\n[[ps:Thaa|它拿文字]] ''（马尔代夫语）''{{-}}[[pt:abjad|辅音音素文字]] ''（Omniglot）''、[[pt:abugida|元音附标文字]] ''（英文维基百科）'' 或全音素文字 ''（Unicode）''。\n\n[[ps:Wara|瓦兰齐地文字]] 和 [[ps:Sora|索拉僧平文字]]{{-}}全音素文字 ''（英文维基百科, Unicode）'' 或元音附标文字 ''（Omniglot）''。两者都是印度文字，摒弃了 [[pt:brahmic|婆罗米系元音附标文字]] 的大部分特征，但保留了固有元音 {{t|a}}。\n\n[[ps:Phag|八思巴文字]] （蒙古方体）{{-}}元音附标文字 ''（Unicode, Omniglot）'' 或全音素文字 ''（英文维基百科）''。元音附标文字仅存的迹象是固有元音以及字母结合成音节的方式。

[Term.ascii]
Name=美国信息交换标准代码

[Term.brahmic]
Name=婆罗米系元音附标文字，印度系文字
Text=学者们对 [[pt:abugida|元音附标文字]] 的定义存在分歧。但在一点上他们是一致的：'''源自 [[ps:Brah|婆罗米文字]] 的那组文字''' 绝对是元音附标文字。\n\n在闪米特语系中，词根由辅音构成，元音用于后缀：在 [[ps:Arab|阿拉伯语]] 中，''Islam''（伊斯兰教）由 ''Muslim''（穆斯林）实践。因此，他们自然地引入了 [[pt:abjad|辅音音素文字]]。当 [[ps:Armi|亚拉姆文字]] 向东传播并与印欧语系碰撞时，出现了一种音节文字，除了 [[pt:cjk|中国、韩国和日本]] 之外，这种文字以某种方式被整个东南亚采纳。\n\n婆罗米系元音附标文字的特征：\n* 辅音字母表示带有某个固有元音的音节，其余元音通过添加元音符号来表示：[[ps:Deva|天城文字]] <nobr>ka {{sm|क}} + i {{sm| ि}} = ki {{sm|कि}}</nobr>。\n* 要获得单独的辅音，使用 [[pt:virama|怛达点画]]（virama）符号：<nobr>ka {{sm|क}} + {{sm|्}} = k {{sm|क्}}</nobr>。\n* 其他变音符号：止声（anusvara，辅音后的鼻音）、月点（candrabindu，元音鼻化）、下标点（nukta，借用的音位；这个词中的字母“k”是借用的，写作带下标点）、送气符（visarga，梵语中的 {{t|h}} 音位）。\n* 与闪米特语言不同，从左向右书写。\n* 字母顺序是语音学的：首先是元音，然后是从喉咙 {{t|k}} 到牙齿 {{t|s}} 的辅音，最后是送气音 {{t|h}}。\n* 经常拥有自己的 [[pt:number|数字]]，包括实际使用的和 [[pt:obsolete|废弃的]]。\n\n有几种方法来传达复杂的音节：\n* 使用怛达点画（类似于 pa-n_-da）：单独的辅音是一个独立的音节（[[ps:Tglg|贝贝因文字]]）。\n* 使用辅音合体（pa-nda）：天城文字 {{sm|क्ष}} kša。输入时就像没有连字一样：ka+怛达点画+ša{{-}}但在显式形式中，怛达点画仅出现在词尾。通常在词尾它也不存在（固有元音变为静音）。在这些合体中，字母 R 经常变小。小的词首 R（{{sm|र्क}} rka）称为 ''repha''；小的下附 R（{{sm|क्र}} kra）是 ''rakar''。\n* 使用尾辅音（pan-da）{{-}}[[ps:Phag|八思巴文字]]。没有怛达点画。可能存在虚拟怛达点画或其他构成词首辅音合体的手段。\n* 不完整，难以传达复杂音节（pa-da）{{-}}[[ps:Bugi|布吉文字]]。有些样本退化成了辅音音素文字。\n* 失去固有元音（pa-nᵊ-da）{{-}}通过改革（[[ps:Laoo|老挝文字]]）或通过自然演变（[[ps:Guru|古木基文字]]）。在后一种情况下，它可能并不总是区分 {{t|na}} 和 {{t|n}}，并在字典中使用怛达点画。

[Term.bidi]
Name=双向文本
Text=包含至少一个从右向左书写的字符的文本。处理此类文本的算法非常复杂，我们在此简要描述一下。\n\n1. 将文本拆分为独立的行。\n\n2. 将每一行拆分为嵌套的片段：整行是从左向右的，其中包含从右向左的片段，这些片段内部又包含从左向右的片段，以此类推。在 iOS 中曾有一个漏洞：过深的片段嵌套会导致手机重启。\n\n3. 隔离欧洲数字，将其方向设定为从左向右。\n\n4. 为其余字符指定方向。如果它们是从右向左且镜像的，则进行翻转。\n\n5. 执行更高层级的协议 {{-}} 例如，定义表格的方向。\n\n\n例如：“XX,YY 1.00&lt;2.00 XX” = “ثث,حح 1.00&lt;2.00 ثث”\n\n'''普通用户该怎么办？'''\n\n* 如果你在英文文本中书写希伯来语引语，而系统格式化错误，请在引语开头使用 [[pc:LRE]] / [[pc:RLE]]，并以 [[pc:PDF]] 结尾。\n* 你可以对少量文本使用 [[pc:LRM]]、[[pc:RLM]] 和 [[pc:ALM]]。这些是带有明确指定方向的空字符，这种方向将一直保持，直到系统找到一个方向已知的字符。\n* 如果你想在从左向右的语言中从右向左书写，反之亦然，请以 [[pc:LRO]] / [[pc:RLO]] 开头，并以 PDF 结尾。请避免使用这种标记，这是一个安全隐患。

[Term.birman]
Name=伊利亚·比尔曼（Ilya Birman）排版布局
Text=提供两种语言版本，英语（美国）和俄语，它们的特殊键位是相同的。在 Windows 中使用 {{k|AltGr}} ，在 MacOS 中使用 Alt 键输入以下字符：\n\n* 欧洲字母和标点符号 ó ò ö ŏ ǒ ő õ ç ß ¡ ¿\n* 1918 年以前的西里尔字母 ѣ і ѵ ѳ\n* 数学符号 − ± ≠ ≈ ′ ″ × · ∞\n* 一些上标和分数 ¹²³ ½⅓¼\n* 排版标点符号 «» “” „“ ‹› ‘’ • — –\n* 货币符号 € £ ₽ ¢\n* 箭头 ← → ↓ ↑\n* MacOS 界面符号 ⌘ ⌥ ⌃ ⇧\n* 从俄语布局输入 ASCII 字符 [ { $\n* 计量单位 ⌀ ° ‰\n* 知识产权标志 ™ ©\n\n3.7 版本（截至 2022 年 1 月的最新版本）在 {{k|AltGr|G}} 上有一个[[pt:private|专用]] 字符，即苹果 Logo。\n\n[[https://ilyabirman.net/typography-layout/|在此下载]]

[Term.bmp]
Name=基本多文种平面
Text=包含字符 0000…FFFD 的 Unicode [[pt:plane|平面]] #0 。现存语言中最常用的字符都编码在基本平面中，从而允许直接在 [[pt:utf16|UTF-16]] 中处理这些语言。\n\n直到 1996 年，Unicode 一直是双字节编码，这提供了 {{n|65536}} 个字符的容量。当扩展问题迫在眉睫时，几种先进的语言和库（Java、Windows{{_}}NT）已经采用了 Unicode，这导致了基本平面和 UTF-16 这种折衷方案的出现。\n\n截至 Unicode{{_}}{{vleft16}} ，只有 16 个位置未分配，即 2FE 0…2FEF。\n\n基本平面包含 [[pt:ascii|ASCII]]、[[pt:latin1|Latin-1]] 和 {{n|6400}} 个 [[pt:private|专用]] 字符。

[Term.bom]
Name=字节顺序标记
Text=字符 [[pu:FEFF]]。它可以（但不是必须）放在 Unicode 文本文件的开头，以指示[[pt:serialization|序列化]] 格式。编码后的字节顺序标记如下所示：\n\n* EF{{_}}BB{{_}}BF{{-}}[[pt:utf8|UTF-8]]；\n* FE{{_}}FF{{-}}[[pt:utf16|UTF-16BE]]（最高有效字节在前）；\n* FF{{_}}FE，然后除了 00{{_}}00{{-}}UTF-16LE（最低有效字节在前）以外的所有内容；\n* 00{{_}}00{{_}}FE{{_}}FF{{-}}[[pt:utf32|UTF-32BE]]；\n* FF{{_}}FE{{_}}00{{_}}00{{-}}UTF-32LE。\n\n[[pt:utf7|UTF-7]] 和 [[pt:punycode|Punycode]] 不作为文本文件格式出现。UTF-32 极为罕见。\n\n二进制文件严格指定了序列化格式，并且不需要字节顺序标记。

[Term.character]
Name=字符，而非字形
Text=字符是意义的单位。字形是字体中包含的特定图像，绘制在屏幕或纸张上。\n\n字符和字形并不是一一对应的关系。''Nastaliq''（纳斯塔利克体），一种 [[ps:Arab|阿拉伯文字]] 文本风格，要求字体中包含数千个字形。但编码只有两百个传达意义的字符。反之亦然，尽管有 [[pt:unification|统一]]，不同的字符也可能共享一个字。

[Term.casefolding]
Name=大小写折叠
Text=用于（主要是）不依赖区域设置的不区分大小写的字符串比较的字符串转换。它有两种主要类型和一种辅助类型：\n\n* 简单（不改变长度）：ᾨ → ᾠ\n* 完整（展开 [[pt:ligature|连字]]）：ᾨ → ὠ ι\n* 突厥语系（针对土耳其语和阿塞拜疆语的特殊规则）：I → ı\n\n通常大小写折叠是转换为小写。但对于 [[ps:Cher|切罗基语]]，它是转换为大写：因为大写字母先出现。\n\n大小写折叠是幂等的：CF(CF(s))=CF(s)，即第二次折叠不执行任何操作。

[Term.cjk]
Name=中日韩
Text=与[[ps:Hani|汉字]] 相近的一组文字。它包含音节的[[ps:Kana|片假名]] 和[[ps:Hira|平假名]]，以及[[pt:arguable|有争议的]] 类型的[[ps:Hang|谚文]]。历史文字包括—— [[ps:Tang|西夏文字]]、[[ps:Kits|契丹小字]]、[[ps:Nshu|女书]]。\n\nCJK 的特征：\n* 笔墨挥毫（女书除外）；\n* 字符为等宽——对齐到不可见的网格，无论笔画多少。借用的字母通常为半宽——占据该单元格的一半；\n* 最初为竖排右起书写；现在“通常”为横排左起。即使是现在，日本漫画“manga”也是从右向左阅读；\n* 各国字符有所不同；Unicode 将这些差异留给字体处理；\n* 由于字符不适合放入 256 个 [[pt:codepoint|位置]]，因此存在专门针对表意文字的特殊编码。

[Term.codepoint]
Name=码点
Text=“字符”一词含义模糊，因此 Unicode 将其自身的代码（从 0 到 {{n|1114111}} ₁₀= {{h|10FFFF}} ₁₆ 的数字）称为 '''码点'''。码点可以是：\n\n* [[pt:graphic|图形]]（可打印）字符。\n* [[pt:control|控制]] 命令。\n* [[pt:format|格式化]] 命令。\n* 留作[[pt:private|私有]] 用途。\n* 留给 [[pt:utf16|UTF-16]] 代理对。\n* [[pt:noncharacter|非字符]]（已从编码中移除）。\n* 空缺（保留）。\n\n另请参阅[[pt:unification|统一]]（用一个码点书写不同字符）和重复（用不同码点书写单个字符）。

[Term.control]
Name=控制字符

[Term.convertibility]
Name=可转换性
Text=Unicode 用于与其他文本标准（国家的、国际的、供应商特定的）进行交换。如果某个字符的变体在这些标准中获得了不同的代码，它们在 Unicode 中就会被取消统一。这使得通过 Unicode 在编码之间进行转换成为可能，实现无损往返转换（从编码到 Unicode，反之亦然）。\n然而，有时其他编码的单个码点会转换为 Unicode 的多个字符，反之亦然。

[Term.country]
Name=国家代码（country codes）
Text=Unicode 联盟不定义什么是国家以及其国旗应该长什么样。相反，它依赖于 ISO{{_}}3166 的双字母代码。它包含所有公认的国家、一些属地以及一些有争议的地区。其中一些不寻常的原因包括：\n\n* UA（乌克兰）、BY（白俄罗斯）：苏联境内的联合国成员，独立后保留了其代码。\n* KI（基里巴斯，前身为 GE=吉尔伯特群岛）及其他：在解放和更名后获得了新代码。\n* PS（巴勒斯坦）：获得承认的一种方式。\n* DG（迪戈加西亚）及其他：电信站点。\n* EA（休达和梅利利亚）、IC（加那利群岛）：与泛欧规则不同的特殊海关规则。\n* GG（根西岛）及其他：发行自己的邮票。\n* XK（科索沃）：欧盟使用的临时代码。\n\n国家表情符号（通常是国旗）的图像由供应商决定。

[Term.code]
Name=代码与简写
Text=代码是普通书面文本的另一种形式。换句话说，我们先使用普通的拼写规则将口语转化为字母，然后进行编码。这种编码的目的各不相同：\n* 通信和信号传递（旗语、摩尔斯电码）；\n* 残障人士辅助工具（[[ps:Brai|盲文]] 凸点、手势字母表）；\n* 速记——由受过专门训练的文员完成，旨在跟上口语的速度（[[ps:Dupl|杜普雷速记文字]]）。\n\n这类系统通常跨越多种语言，拥有不同的代码表。甚至英国盲文也不同于美国盲文。

[Term.combining]
Name=组合标记
Text=附着在基础字符上的从属字符。标记用于：\n\n* 变音符号——添加到基础字母上的标记；\n* [[pt:abjad|辅音]] 文字和[[pt:abugida|元音附标文字]] 中的元音标记；\n* 字体中使用[[pt:ligature|连字]] 的各种“黑客”技巧：例如，字母 + 变体选择符 = 其他形状的字母。\n\nUnicode 将标记分为 [[pt:spacing|间距]]、非间距和包围式。\n\n组合标记在字体中有几种放置方式，从最美观的开始：\n\n* 连字：用于带标记字符的特殊 [[pt:character|字形]]。\n* 字形替换：当放置到字形 A 时，标记 B 变为形状 C。这用于大写字母上“被挤压”的变音符号，调整印度元音标记的大小。\n* 锚点：手动放置的绑定点。\n* 默认锚点：标记放置在正或负坐标处。当相对于光标绘制时，它会发现自己处于正确的位置。\n\nUnicode 无法用一个标记覆盖多个字符，但为此利用了一些字体机制：\n\n* 一些标记放置在字符上方的一半位置，另一半悬空，因此它们覆盖两个字符： {{sm|a͡b}} 。\n* 第一个字符用初始片段覆盖，第二个等用重复片段覆盖，最后一个用结束片段覆盖。这种方法在大多数字体中实现得很差。

[Term.cursive]
Name=手写体（草书）
Text=一种书写风格，书记员快速地写下内容，特别是使用易损的鹅毛笔时。特征因语言而异，但通常包括：\n\n* 简单的字母形状。\n* 除了尖锐的角之外，拐角都是圆润的。\n* 书记员很少抬起鹅毛笔——因此有了连体字母，一笔来回书写，上伸部分和下延部分带有圈环。\n* 字母连接成 [[pt:ligature|连字]]。\n\n''斜体'' 字型源于手写体，在某些语言中，它与手写体用同一个词命名。\n\n切勿与 ''速记'' 混淆，在速记中书记员要跟上语速，但需要做出牺牲：艰苦的训练、有横线的纸张、在安静的条件下解码……

[Term.deprecated]
Name=弃用字符
Text=强烈不鼓励使用的字符。\n\n这是 Unicode 的 [[pt:stability|稳定性]] 保证之一：一旦字符被分配，它就不会移动或消失。如果字符有问题，它就会变成弃用字符。弃用的原因各不相同。\n\nUnicode 联盟由西方文化背景的人士组成，他们只能参考稀有语言专家的研究——这种情况发生在[[ps:Arab|阿拉伯文字]]、[[ps:Tibt|藏文字]] 和[[ps:Khmr|高棉文字]] 的五个字符上。\n\n两个技术用的尖括号被禁用，以防止与数学符号混淆。同样被弃用的还有：语言 [[pk:E0000|标签]]（制造的麻烦比解决的问题还多），一些 [[pt:bidi|双向书写]] 字符（提出了另一种算法），以及拉丁[[pt:ligature|连字]] '''ŉ'''（荷兰语和南非荷兰语有很多类似的未编码缩写，存在[[pt:normalization|标准化]] 问题，字符类型“带标点的字母”被放弃）——截至 Unicode{{_}}{{vdeprec15}} 总共有 15 个。\n\n已知有几个将字符恢复使用的案例：\n\n* “标签”区块——它曾被用于指定语言。后来为了 [[pt:emoji|表情符号]] 中的地区旗帜（例如苏格兰）而恢复，只留下一个字符处于禁用状态。\n* 0340，0341（降调/升调标记）。被普通的变音符号 à 和 á 取代。自 Unicode {{_}} 5.2 起，它们只是不推荐使用。\n* 17D3（高棉语标记 ''bathamasat''）。随着 [[pk:19E0|农历]] 的 [[pt:precomposed|预组]] 字符的出现，它在 Unicode{{_}}4.0 中被弃用。自 Unicode{{_}}5.2 起，它只是不推荐使用——可能是因为日历连字太臃肿。''Unicodia'' 的作者曾难以找到连字能适配单元格的字体。\n\n切勿与 [[pt:obsolete|废弃]] 混淆。

[Term.dynamic]
Name=动态组合
Text=Unicode 通过使用动态组合实现了 [[pt:universality|通用性]] 这样一个雄心勃勃的目标——字符的图像是即时由各个部分构建而成的。有时为了方便会制作 [[pt:precomposed|预组]] 字符，但通常来说 <nobr>A + ¨ = Ä</nobr>。\n\n为了在不同编码变体下检查文本的相等性，使用了 [[pt:normalization|标准化]] 算法。

[Term.egyp]
Name=埃及象形文字（Egyptian hieroglyphs）
Text=2025 年初，[[ps:Egyp|埃及象形文字]] 的编码原则被制定出来。\n\n* 一个象形文字可以有多种形态：一个人轻微或深度鞠躬，一条有 2、3 圈或更多圈 coils 的蛇。这些形态由学者酌情编码。\n* 象形文字以最详细的形式编码。像臂章这样非常细微的细节由学者酌情省略。\n* 有时学者们会争论不休：[[pc:130FC]] ——是篮子还是雪花石膏盆？Unicode 不支持任何一种观点并省略细节。\n* 大小和颜色不予编码。\n* 如果这些细微细节真的很重要，Unicode 就不适合你。请插入图片。\n* 含义不同的相似符号分别编码。一个圆圈可能代表手鼓、戒指、坑……\n* 如果一个象形文字可以通过镜像、旋转和组合构建，它不会获得单独的[[pt:codepoint|码位]]。\n* 但如果这种形式带有特殊含义（腿 + 刀=受伤），它会获得。\n* 象形文字分为三种类型：核心、遗留和扩展。\n* 如果象形文字在现代出版物中广泛使用，则为扩展。\n* 如果象形文字经过可靠图像（照片或可信的描图）验证，则为核心。如果在僧侣体文本中有证明，其象形文字形式必须易于重构。如果以多种形式编码，其中一些形式可能会从核心列表中排除。\n* Unicode{{_}}5.2 中的平凡形式和组合为遗留。它们有一个等效序列：如果放在今天它们会如何编码？\n* Unicode{{_}}5.2 的其余部分（基于加德纳列表）自动为核心。\n\nUnicode {{version}} 包含：\n\n* 核心象形文字： {{hcore}}\n* 遗留： {{hlegacy}}\n* 扩展： {{hextended}}\n* 特殊字符： {{hspecial}}

[Term.emoji]
Name=表情符号（绘文字）
Text=源自日语 {{sm|絵}} ''e—图片'' + {{sm|文字}} ''moji—字符、符号''。\n\n由手机运营商 NTT DoCoMo 于 1999 年左右发明，旨在节省短信中的字符数。西方运营商于 2004 年开始开发他们的符号集，2010 年 DoCoMo 的编码被引入 Unicode{{_}}6.0。许多表情符号是日本特有的：鞠躬的商人 {{em|🙇}}，新手司机标志 {{em|🔰}}……其他的在日本以外改变了含义：最高学校成绩 {{em|💯}} 变成了“完全同意”。\n\n几个 2010 年以前的旧象形图，只有配合 [[pu:FE0F]] 字符（''又名'' 变体选择符 16）才能保证显示为表情符号。\n\n所有表情符号都是 [[pt:spacing|间距]] 字符。

[Term.efficiency]
Name=高效
Text=Unicode 致力于使高效的实现成为可能。特别是：\n\n* Unicode 没有可切换的状态。这简化了访问和搜索。相反，在电报码中，1 在字母页表示 E，在数字页表示 3。\n* 主要的 [[pt:serialization|序列化]] 形式，[[pt:utf8|UTF-8]] 和 [[pt:utf16|UTF-16]]，是自同步的。这简化了访问和搜索。\n* 字符码是 0 到 10 FFFF₁₆ 之间的数字。即使无法直接在 UTF-8/16 中工作，查找表仍然有效。\n* 在 UTF-8 中无需解码即可处理 ASCII。在 UTF-16 中无需解码即可处理[[pt:bmp|大多数语言]]。\n* 同一书写系统的字符在可行的情况下被归为一组。\n* 标点符号是所有书写系统通用的。\n* 格式字符被尽可能详细地描述。\n* 避免使用改变内部状态的 [[pt:format|格式]] 字符。这并不总是可能的，[[pt:bidi|双向书写]] 本质上就很复杂。

[Term.format]
Name=格式字符

[Term.graphic]
Name=图形字符，可打印字符
Text=在屏幕和纸张上书写的字符。任何除了 [[pt:control|控制]]、[[pt:format|格式]]、行和段落分隔符之外的字符——甚至包括空格和不可见的 [[pt:combining|标记]]。\n\n零宽空格被认为是格式字符而不是空格——所以它 '''不是''' 图形字符。\n\n悖论：不可见标记同时是图形字符且 [[pt:ignorable|默认可忽略]]。\n\n不要与 [[pt:pseudographics|伪图形]] 混淆。

[Term.inclusion]
Name=包容性与多样性
Text=[[pt:emoji|表情符号]] 的原则之一，然而，它并非从一开始就存在。它意味着表情符号必须在尽可能不导致组合爆炸的情况下支持种族、性别和其他少数群体：各种种族构成的家庭本将会有 {{n|4225}} 个字形。''（Unicode{{_}}{{version}} 包含 {{nemoji}} 个表情符号。）''\n\n最初，人物以不真实的肤色显示，通常是黄色。五种肤色之一由特殊修饰符给出： {{em|🏃}} + {{em|🏿}} = {{_}} {{em|🏃🏿}} 。\n\n大多数表情符号是无性别的；如果你想要，你可以用 {{em|🧙}} +ZWJ+ {{em|♂}} +VS 16 添加性别。只有两个纯粹的女性表情符号： {{em|🤱}} —哺乳和 {{em|🧕}} —戴头巾的女性。Unicode{{_}}13（2020）使 {{em|👰}} —新娘， {{em|🤵}} —穿无尾礼服的人和其他变为无性别。Unicode 14（2021）增加了更多无性别表情符号。\n\n具有不可见皮肤的人物— {{em|🏂}} 滑雪者—也应该支持性别和肤色修饰符，即使它不会改变字形。\n\n如果表情符号包含多个人物，性别和肤色是逐个案例实现的。在哺乳 {{em|🤱}} 中，婴儿的皮肤被遮盖，亲吻 {{em|💏}} 是从头组装的，如 {{em|👩}} +ZWJ+ {{em|❤}} +VS 16+ZWJ+ {{em|💋}} +ZWJ+ {{em|👨}} 。\n\nZWJ 序列中修饰符的顺序：基础字符，肤色（无 ZWJ），头发，其他颜色 {{em|⬛}} ，性别，移动方向 {{em|⬅}} +VS 16。Unicode {{_}} {{version}} 有 {{ncolor}} 个彩色表情符号，例如黑猫 {{em|🐈}} +ZWJ+ {{em|⬛}} 。\n\n面孔 {{em|😂}} 不具有包容性且总是黄色的。

[Term.ignorable]
Name=默认可忽略字符
Text=Unicode 庞大且不断扩展：版本 {{version}} 拥有 {{nchars}} 个字符。所以即使是庞大的字体集合也不支持整个 Unicode。\n\n如果在字体中未找到字形，该字符通常显示为 [[pt:tofu|豆腐块]] ——白色方框。'''但有些字符会被直接省略。'''\n\n大多数默认可忽略字符是 [[pt:format|格式]] 字符，但也存在非间距的 [[pt:combining|标记]]。默认可忽略字符属于以下几类：\n\n* 传达辅助语义的字符：软连字符 [[pc:00AD]]，字素连接符 [[pc:034F]]，[[pk:E0000|标签]] ……\n* 书写 [[pt:bidi|方向]] 标签：标记 [[pc:LRM]] 和 [[pc:RLM]]。\n* 可以安全静默跳过的字体机制：零宽连接符（[[pt:zwj|ZWJ]]），变体选择符（VS），[[ps:Hang|韩语]] 字母填充符。当字体中缺少连字时，Pilot（人+ZWJ+飞机）将显示为人+飞机 {{em|🧑✈️}} ，无论字体中是否存在 ZWJ。\n* 零宽空格 [[pc:ZWSP]]；[[pt:bom|字节顺序标记]] BOM 也是零宽空格；零宽非连接符 [[pt:zwnj|ZWNJ]]。\n* 用于复杂 [[pk:1BCA0|速记]] 和[[pk:1D100|音乐]] 格式化的字符。\n\n这些字符 '''不是''' 默认可忽略的：\n* 所有具有图形形式的，所有 [[pt:spacing|间距]] 字符。\n* [[pt:control|控制]]，行分隔符。\n* 在无法静默跳过的字体机制中工作的字符——例如，虚拟 [[pt:virama|止音符]]。如果止音符消失，“kta” 会变成 “kata”。\n* 用于 [[ps:Egyp|埃及象形文字]] 复杂格式化的字符。

[Term.hiero]
Name=语标（表意、象形）文字系统
Text=通常被称为''象形''或''表意''的非拼音文字系统，更准确的称呼是'''语标文字'''：一个字符（或一组字符）代表一个单词或其组成部分。\n\n这些文字系统的构造在 ''' [[ps:Hani|中日韩表意文字]] ''' 中体现得尤为明显。字符传统上分为六类。\n* 象形字指代所描绘的具体物体：{{sm|山}} 山\n* 指事字将抽象概念可视化：{{sm|上}} 上，{{sm|下}} 下\n* 会意字： {{sm|休}} 休 = {{sm|人}} 人 + {{sm|木}} 木\n* 意义不同读音也不同的新字（转注）：{{sm|樂}} （繁体）/ {{sm|乐}} （简体）yuè（音乐），以及 lè（快乐）\n* 假借读音（假借）：{{sm|自}} 鼻 → 自己（在古汉语中读音相似）\n* 形声字（读音+部首）：{{sm|樑}} liáng（梁，建筑中的横梁）= {{sm|木}} 木 + {{sm|梁}} liáng\n\n从表意文字向 [[pt:syllabic|音节文字]] 的过渡很简单：只需用合适的单音节表意字来书写一个生僻词就足够了。除了中国以外，欧亚大陆的所有主要文明在公元纪元开始时都已经放弃了表意文字。

[Term.latin1]
Name=拉丁文字西欧语言

[Term.legacy]
Name=旧式计算机
Text={{LegacyComps}}
Subhead=Unicode {1} ({2}) 支持

[Term.ligature]
Name=连字
Text=合字是将多个字符融合为一个：\n\n1. 在排版学中——由多个字符组成的字符。例如，和号 '''&''' 是拉丁语 ''et''（意为“和”）的合字。\n\n2. 在字体中——代表多个 [[pt:codepoint|码位]] 序列的 [[pt:character|字形]]。例如，在某些字体中，输入“fi”会生成合字 '''ﬁ'''。[[pt:brahmic|婆罗米系元音附标文字]] 拥有大量的此类合字。\n\n\n所有合字都是 [[pt:spacing|间距]] 字符。\n\n[[pt:casefolding|大小写折叠]] 可以破坏合字。

[Term.linebreak]
Name=换行
Text=为了将长文本分行，字符被划分为几个类别。\n\n{{LineBreakTypes}}

[Term.logical]
Name=逻辑顺序
Text=Unicode 以逻辑顺序存储字符，该顺序大致对应于发音顺序或通过键盘输入的顺序。此顺序并不对应于屏幕上的显示顺序，而 [[pt:bidi|双向文本]] 的算法正是为了将字符转换为视觉顺序而设计的。\n\n[[pt:combining|组合标记]] 存储在其基准字符之后。\n\n例外情况：一些 [[pt:brahmic|婆罗米系]] 元音附标文字（[[ps:Thai|泰文字]]、[[ps:Laoo|老挝文字]]）传统上以视觉顺序存储文本：一些元音位于辅音之前，即使它们是在辅音之后发音的。

[Term.minuscule]
Name=小写字母书写
Text=一种具有低基线以及大量上升笔画和下降笔画的书写风格。这种风格在中世纪被用于节省羊皮纸，广泛流行于 [[ps:Latn|拉丁文字]]、[[ps:Geor|格鲁吉亚文字]] 和 [[ps:Grek|希腊文字]] 中。在拉丁文中，它演变成了小写字母。相比之下，格鲁吉亚文仅在技术上属于双态文字。\n\n如果一种文字通常具有较大的上升笔画（如 [[ps:Lana|兰纳文]]），这并不被视为小写体。

[Term.mono]
Name=字符单元
Text=可以将等宽文本划分成的假想单元格。\n\n[[pt:cjk|中日韩文字]] 也将文本划分为“字符单元”，但该术语首先用于打字机、计算机的文本模式、字母数字打印机。

[Term.noncharacter]
Name=非字符
Text=66 个码点是“非字符”：所有 17 个平面中的 *FFFE 和 *FFFF，以及 FDD0…FDEF。它们将永远不会在 Unicode 中再次出现。\n\n程序员 '''可以''' 将它们用作错误代码、替换标记、影响排序的“权重”或程序内部的其他用途，例如转码为 [[pt:utf8|UTF-8]] 或 [[pt:utf16|UTF-16]]。如果程序并不使用此代码，则可以将其视为普通的未知字符。\n\n'''禁止''' 通过键盘输入这些字符，或在软件间交换时使用它们。[[pt:bom|字节顺序标记]] 之所以有效，正是因为 Unicode 中不存在字符 FFFE。

[Term.nontext]
Name=非文字符号
Text=非文本信息的书写：音乐（[[pk:1D100|音符]]）、技术图纸（[[pk:2300|技术符号]]）、手势（[[ps:Sgnw|手语书写]]）。\n\nUnicode 处理的是纯文本，并不旨在编码此类信息。然而，对这些字符进行编码可以缩短 PDF 文件的大小，并扩展通用系统（如论坛、即时通讯软件、矢量编辑器）的功能

[Term.normalization]
Name=标准化，归一化
Text=用于模糊比较的字符串转换。Unicode 有四种归一化类型：\n\n1. NFD = 规范分解：将 [[pt:precomposed|预组合]] 字符、[[ps:Hang|谚文]] 音节拆解为初声、中声、终声（字母），替换某些符号（如欧姆和埃），并将 [[pt:combining|组合标记]] 按标准顺序排序。\n\n2. NFC = 规范组合。先进行 NFD，然后重新组合预组合字符和谚文音节。\n\n3. NFKD = 兼容分解。NFD + 拆解 [[pt:ligature|连字]]，将类字母符号替换为字母，将下标替换为数字，将半宽转换为全宽，等等。\n\n4. NFKC = 兼容组合。先进行 NFKD，然后像 NFC 一样进行字符的 '''规范''' 组合。\n\n\n所有四种归一化都是幂等的：NFD(NFD(s))=NFD(s)，以此类推。换句话说，第二次归一化将不会执行任何操作。

[Term.number]
Name=数字字符
Text=Unicode 将数字字符分为三类。\n\n* 十进制位置数字 —— 既包括标准的 [[pt:ascii|ASCII]] 数字 0…9，也包括其他文字的数字（如 [[ps:Deva|天城文字]] 的 ०…९）。\n* 用于特殊语境下的相同数字——例如，用于上标和下标。\n* 其他数字和数：非十进制、非位置制和部分位置制记数系统的字符（如罗马数字、爱琴海数字、算筹），以及像 <big>½</big> 这样的 [[pt:precomposed|预组合]] 数字……\n\n[[pt:cjk|中日韩]] 数字可能分为普通（主要用作数字）、罕见（有时用作数字）、防篡改（用于会计文件以防止篡改数字）、壮文、越南文和岱依文。\n\n主要用途非数字的字符（例如像 А̄ 这样的斯拉夫数字）并不被 Unicode 视为数字。

[Term.obsolete]
Name=废弃字符
Text=不再使用的字符。例如，[[ps:Latn|拉丁文字]] 中的 Wynn '''Ƿ''' 在中古英语中演变成了 '''W'''。\n\n在适当的语境下使用它是合法的：“ƿið” = ''with''。\n\n请不要将其与 [[pt:deprecated|弃用字符]] 混淆。

[Term.plaintext]
Name=纯文本
Text=纯文本是一串字符代码，这与可能包含颜色、字体、超链接等视觉元素的 ''富文本/格式化文本'' 相反。如果从富文本中剥离这些元素，剩下的所有内容就是纯文本。\n\n要将纯文本数据转换为一行可见的文本，需要经历一个名为 ''渲染'' 的过程。如果你将纯文本输入到另一个渲染器实现中，文本看起来可能会有所不同。\n\nUnicode 标准包含两句简短的说明。\n\n1. Unicode 标准对纯文本进行编码。\n\n2. 纯文本必须包含足以允许文本被清晰渲染的信息，且仅此而已。

[Term.plane]
Name=平面
Text=字符范围从 *0000 到 *FFFD。每个平面的最后两个 [[pt:codepoint|码位]]，即 *FFFE 和 *FFFF，是 [[pt:noncharacter|非字符]]。由于 [[pt:utf16|UTF-16]] 的限制，Unicode 共有十七个平面。\n\n* 平面 #0 是 ''' [[pt:bmp|基本多文种平面]] '''，包含大多数现行语言的字符。Unicode{{_}}{{vleft16}} 中有 16 个未分配的位置。\n* 平面 #1 是 '''辅助多文种平面'''，包含罕见语言和死语言的字符，以及技术符号。其填充率为 {{plane%|1}} 。\n* 平面 #2 是 '''辅助表意文字平面'''，仅包含 [[ps:Hani|中日韩统一表意文字]]，其填充率为 {{plane%|2}} 。\n* 平面 #3 是 '''第三表意文字平面'''，仅包含中日韩统一表意文字，其填充率为 {{plane%|3}} 。\n* 平面 4 到 0D 未使用。\n* 平面 0E 是 '''辅助专用平面'''，包含少于 {{approx14}} 个特殊字符。\n* 平面 0F 和 10 留作 [[pt:private|私用区]]。

[Term.precomposed]
Name=预组合字符
Text=一个字符和一个 [[pt:combining|组合标记]] 合二为一。例如，'''á''' 是由一个字符和一个标记组装而成的，而 '''á''' 是一个预组合字符。\n\n创建预组合字符主要有三个原因：独立实体、兼容性和美观性。\n\n'''独立实体：''' 西里尔字母 Ё（''yo''）并不是带分音符的 Е（''ye''），因此存在预组合形式。而 Ю́ 只是带可选重音标记的 Ю（''yu''），并没有这种预组合字符。\n\n'''兼容性：''' 如果排版引擎功能有限无法放置标记，或者键盘驱动程序一次只能输入一个字符，那么预组合字符是唯一的选择。预组合字符通常取自现有的编码标准。\n\n'''美观性：''' 放置标记的机制往往不完美，特别是如果设计者并没有预见到在字符 B 上放置标记 A 的情况。而预组合字符可以作为给设计者的一个警告，提示''这种情况会发生''。\n\n在更广泛的意义上，预组合是指可能被样式化显示但被编码为单个字符的字符序列——例如分数 ½。\n\n所有预组合字符都是 [[pt:spacing|间距]] 字符。另见 [[pt:normalization|归一化]]。

[Term.private]
Name=私用字符
Text=[[pt:bmp|基本平面]] 中的 E000…F8FF 共 {{n|6400}} 个字符，以及两个 [[pt:plane|平面]] 0F 和 10 中的 {{n|131068}} 个字符（*FFFE 和 *FFFF 这两个 [[pt:noncharacter|非字符]] 除外），被留作满足每个人的个性化需求。\n\n通过相互协商，人们可以在这些范围内编码任何他们想要的东西，包括不符合 Unicode 收录资格的字符：商标、虚构字母表、罕见字符和文字、样式标签、替换标记。Unicode 联盟对此并不承担任何责任。让我们列出私用字符的四种常见用途。\n\n* 操作系统供应商通常在这里编码自己的徽标。终端用户从 E 000 开始向上占用代码，而软件供应商则从 F 8 FF 开始向下占用。\n* ConScript Unicode Registry 及其前身 Under-ConScript Unicode Registry——超过 60 种人造语言，来自电影、文学和游戏的文字。其中有三种，[[pk:101D0|费斯托斯圆盘]]、[[ps:Shaw|萧伯纳字母表]]、[[ps:Dsrt|德塞雷特字母表]]，已被正式 Unicode 收录。\n* 标准音乐字体布局 (SMuFL)——用于缩减 [[pk:1D100|乐谱]] PDF 文件大小的音乐字体开放标准。\n* 提交给 Unicode 的提案——区块尚未分配，且必须制作实现字体。\n\n非官方地，[[pt:control|控制]] 字符被用于自定义控制和格式字符：在大多数情况下，它们不会出现在文本中。

[Term.pseudographics]
Name=伪图形，制框符
Text=用于在文本模式下绘制几何形状——线条、方框、框架——的字符。曾被广泛用于美化文本用户界面。\n\n在现代图形操作系统中，它们已无实际意义：因为可以使用真正的图形，而且大多数字体是比例字体，线条无法精确连接。但时至今日文本控制台依然存在，而它们内部依然包含伪图形。\n\n所有伪图形字符都是 [[pt:spacing|间距]] 字符。

[Term.punycode]
Name=Punycode
Text=短 Unicode 字符串序列化为可打印 ASCII 字符串的格式。\n\n首先写出所有 ASCII 字符，然后在短横线后，通过复杂的过程对剩余字符进行编码。\n: München = Mnchen-3ya\n\n如果字符串完全是 ASCII 字符，则只附加一个短横线：\n: test{{_}}={{_}}test-\n\n如果没有任何 ASCII 字符，则省略开头的短横线：\n: правда{{_}}={{_}}80aafi6cg\n\n仅用于互联网域名系统，在该系统中，字节节省和可读性比效率更重要。前缀 “xn--” 被添加到国际名称之前：\n: münchen.example.com = xn--mnchen-3ya.example.com

[Term.reject]
Name=被驳回的提案
Text=Unicode 联盟通常会拒绝编码 [[pt:emoji|表情符号]]，实际发布的不到四分之一，而人们在组合表情符号方面表现出了惊人的创造力（ {{em|💦&#xFEFF;🔌&#xFEFF;🔥}} = 水电费账单）。旗帜和文本类表情不再被编码。\n\n两种虚构文字被拒绝，分别是厄休拉·勒古恩的 ''Aiha'' 和《星际迷航》系列中的 ''Klingon''。但约翰·托尔金发明的 ''Tengwar'' 和 ''Cirth'' 正在编码途中。\n\n[[pk:101D0|费斯托斯圆盘]] 因某种原因被编码了，但另外三种未被探索的文字被拒绝。像 [[ps:Cpmn|塞浦路斯-米诺斯]] 和印度河文字这样虽未破译但研究得相当充分的文字，最终可能会被编码。\n\n''Jindai'' 也被拒绝了。这种据称是 [[ps:Hani|汉字]] 之前的日本文字被认为是 17 世纪的伪造品。

[Term.semantics]
Name=语义
Text=字符的行为主要通过复杂的表格来指定，而不是通过其名称或代码表中的位置。这些表格的摘录出现在「Unicodia」中：[[pt:number|数值]]、大小写、书写 [[pt:bidi|方向]]……

[Term.serialization]
Name=序列化
Text=将数据（例如 Unicode 文本）转换为 ''码元'' 链的方法——对于 [[pt:utf8|UTF-8]] 是字节，对于 [[pt:utf16|UTF-16]] 是双字节字，对于 [[pt:utf32|UTF-32]] 是四字节字，对于 [[pt:utf7|UTF-7]] 和 [[pt:punycode|Punycode]] 是可打印 ASCII 字符。\n\n磁盘和数据通道处理的是字节。因此，在传输 UTF-16/32 时，字内的字节顺序开始变得重要，它们被细分为 UTF-16BE、UTF-32BE（大端序，最高有效字节在前）和 UTF-16LE、UTF-32LE（小端序，最低有效字节在前）。\n\n[[pt:bom|字节顺序标记]] 让软件能够区分这些格式。

[Term.space]
Name=空白字符

[Term.spacing]
Name=间距字符
Text=在一行中占据空间的字符。\n\n间距字符包括字母、[[pt:number|数字]]、标点符号、[[pt:space|空白字符]]、杂项符号以及间距 [[pt:combining|组合标记]]。\n\n非间距字符包括 [[pt:control|控制字符]]、[[pt:format|格式字符]] 和其他类型的标记。

[Term.stability]
Name=稳定性保证
Text=Unicode 联盟保证不会更改字符的某些属性。\n\n'''字符不会移动或消失''' (2.0+)。每一个新的 Unicode 版本都将包含之前版本的所有字符。文本使用国家/地区排序顺序进行排序。\n\n'''字符的名称不会更改''' (2.0+)。尽管存在修正名称，并且 ''Unicodia'' 会显示 '''它们'''。同义词也不会更改，包括修正后的同义词 (5.0+)。\n\n'''字符串的 [[pt:normalization|归一化]] 不会更改''' (4.1+)。3.1 版本的保证较弱：Unicode 采纳了越来越多的 [[ps:Latn|拉丁]] 字母和其他需要注意归一化的常用文字。\n\n'''字符的属性可能会更改，但不会更改到改变其性质的程度''' (1.1+)。例如，大写字母不会变成小写字母，[[pt:noncharacter|非字符]] 也不会重新投入使用。在较新版本的 Unicode 中，此规则得到了澄清。\n\n'''字符的规范性和信息性属性不会从 Unicode 基础数据中消失''' (5.2+)。其余属性可能会被重命名或删除，但在重命名时绝不会占用其他属性的位置。\n\n''' [[pt:casefolding|大小写折叠]] 不会更改''' (5.0+)。大小写折叠旨在进行与区域设置无关的字符串比较，通常是（但不一定）转换为小写字母：在 [[ps:Cher|切罗基文]] 中，它是转换为大写字母，因为它们是先被引入的。\n\n'''如果两个字符曾经（或未曾）组成大小写对，它们将保持这种关系''' (5.0+)。小写字母可能会获得对应的大写字母（反之亦然，如切罗基文），这是字母进入大小写对的唯一方式。

[Term.status]
Name=文字状态（script status）
Text='''活跃'''——至少有一种语言的状态为“安全”，该文字是唯一的文字或者没有失去重要性。\n\n'''因语言而濒危'''——所有语言的使用和/或传承都已中断（状态从“脆弱”到“极度濒危”）。\n\n'''因文字竞争而濒危'''——所有语言都有另一种文字，且该文字已经更强或正在变强。\n\n'''死文字'''——该文字不再使用，或者其使用受到极大限制。Unicode 只知道一种相对较近因语言消亡而死亡的文字——人造语言 [[ps:Medf|梅德费德林文字]]。\n\n'''宗教用'''——该文字正被一种重要的宗教使用。\n\n'''历史性，无需破译'''——因为有连续的传统（[[ps:Glag|格拉哥里文字]]）、同时代的描述（[[ps:Runr|如尼文字]]）或与其他文字相近（[[ps:Bhks|拜克舒基文字]]）。\n\n'''（未）破译'''——历史性文字尚未破译（部分破译、已破译）。\n\n'''新创'''——发明时间太短，无法确切说明其状态。\n\n'''复兴'''——在沉寂一段时间后重新投入使用。复兴可能会改变其类型和书写方向，如 [[ps:Tfng|提非纳文]]。\n\n'''为复兴死语言而创'''——仅限 [[ps:Osge|欧塞奇文字]]（事实证明用 [[ps:Latn|拉丁文字]] 书写效果不佳）。\n\n'''实验性'''——尝试进行正字法改革的失败尝试。Unicode 中现有的所有例子都属于三类：1) 英语：复杂的历史正字法；2) 阿尔巴尼亚语：约 1800 年左右既想对土耳其人保密，又渴望文化自治；3) 与 20 世纪非洲解放运动有关。

[Term.syllabic]
Name=音节文字
Text=一种文字，其字母代表由辅音和元音组成的音节。通常包含 80 到 120 个字母。[[pt:abugida|元音附标文字]] 是一种音节文字，其中相似的音节拥有相似的字母。\n\n音节文字很容易从 [[pt:hiero|表意文字]] 演变而来：人们说话是用音节而不是音素，只需用适当的单音节表意符号来书写生词就足够了。[[ps:Xsux|楔形文字]] 和 [[ps:Hira|日语]] 中记录了这样的演变过程。\n\n有几种书写辅音连缀和独立辅音的方法（让我们以单词“stop”为例）：\n* 为独立辅音创建一个字符：s-to-p（[[ps:Cans|加拿大原住民音节文字]]）。\n* 通过在音节上添加变音符号（[[pt:virama|止音符]]）来创建此字符：sⱥ-to-pⱥ（许多 [[pt:brahmic|婆罗米系]] 元音附标文字，尤其是发展不完善的）。\n* 一些婆罗米系元音附标文字（[[ps:Laoo|老挝文字]]、[[ps:Tavt|越南泰文字]]）在 20 世纪改革了书写方式并去掉了止音符。主要字符开始代表辅音。\n* 禁止连缀和韵尾，借用时添加元音：su-to-pu（日语）。''日语本会借用 su-to-ppu，但那是语音学的问题。''\n* 在某些条件下，该元音实际上变为静音：sᵊ-to-pᵊ（[[ps:Guru|古木基文]]，部分日语）。\n* 制作 [[pt:ligature|连字]]：sᵀo-p?（主要的婆罗米系元音附标文字，如 [[ps:Deva|天城文字]]）或 s?-toᴾ（[[ps:Limb|林布文字]]）。\n* 省略尾辅音：s?-to（[[ps:Linb|迈锡尼文字]]、[[ps:Buhd|布希德文字]]）。

[Term.tofu]
Name=豆腐块
Text=当字体中缺少某个字符时显示的 [[pt:character|字形]]。通常豆腐块是一个白色的方框，因此得名于切成丁的日本大豆奶酪（豆腐）。\n\n有些字体拥有充满创意的豆腐块：带有问号、叉号或草书笔画痕迹的矩形。\n\nUnicode 中的某些字符是 [[pt:ignorable|默认可忽略的]] ——不会显示为豆腐块。\n\n「Unicodia」以及其他软件中使用的 ''Noto'' 字体集意味着 ''没有豆腐块''。

[Term.unification]
Name=统一
Text=统一是用同一个 [[pt:codepoint|码位]] 书写不同的字符。重复编码是用不同的码位书写同一个字符。\n\nUnicode 避免重复编码。标点符号只编码一次，并在所有西方语言——以及它们渗透到的东方语言——之间共享。Unicode 不区分英语（“wye”）、法语（“i grec”）和德语（“ypsilon”）中的字母 Y。此外，中文和日文中相似的 [[ps:Hani|表意文字]] 也被统一了。\n\n有几个重要的例外：\n* 完全不同的实体：来自 [[ps:Latn|拉丁文字]]、[[ps:Grek|希腊文字]]、[[ps:Cyrl|西里尔文字]] 和 [[ps:Cher|切罗基文字]] 的字母 A 不是同一个字符。\n* 处理方便：存在普通连字符和不断行连字符。Unicode 有多达三个带有不同小写对应字母的字母 Ð。\n* 字体制作方便：每种南亚语言都有其自己的虚拟 [[pt:virama|止音符]]（用于构建辅音连缀的特殊字符）。设计者应阅读标准并理解止音符的作用。\n* 历史原因——为了 [[pt:convertibility|往返可转换性]]：来自旧编码的汉字始终是汉字，没有日文对应版本。\n* 普通的疏忽也可能发生：数学尖括号 ⟨ 和技术尖括号 〈，后者是 [[pt:deprecated|不推荐使用的]]。\n\n如果字符原本被统一了，但后来 Unicode 开始区分它们，这就是分化。例如，在 2005 年，[[ps:Grek|希腊文字]] 和 [[ps:Copt|科普特文字]] 被分化了。

[Term.universality]
Name=通用性
Text=Unicode 是为不同语言和职业的人设计的：适用于在商业、教育、宗教和科学领域工作的人，适用于现代文本和历史文本。\n\nUnicode 的范围之外包括：\n* 因可用信息太少而无法可靠编码字符的书写系统；\n* 其使用者未制定 ''事实'' 标准的文字；\n* 非文本（例如图形）文字。

[Term.utf7]
Name=UTF-7
Text='''Unicode 转换格式，7 位''' 是一种将 Unicode [[pt:serialization|序列化]] 为可打印 [[pt:ascii|ASCII]] 字符链的格式。\n\n52 个字母、10 个数字以及 '(),-./:? 直接书写。有时除了 ~ 之外的其他 ASCII 字符也可以直接书写。加号 + 可以编码为 +-（加号-连字符）。其余字符编码为 [[pt:utf16|UTF-16BE]]，然后转换为 Base64（62='''+'''，63='''/'''）并用 +…- 字符包围（例如，'''£1''' = +AKM-1）。\n\n如果代码后面跟着除 Base64 字符和连字符之外的任何字符，最后的连字符可以省略。如果在两个可编码字符之间有一个不可编码的字符，为了节省字节，也可以对其进行编码。\n\nUTF-7 格式不具备 [[pt:utf8|UTF-8]] 的良好特性，甚至具有歧义性：相同的文本可以用多种方式编码。\n\n仅用于电子邮件消息，作为更臃肿的 ''quoted-printable'' 的替代方案。在 IMAP 协议中，邮箱名称使用 UTF-7 的特殊无歧义版本，其中 62='''&'''，63=逗号。在万维网上，UTF-7 被明确禁止：如果你诱骗浏览器认为页面是 UTF-7 格式，就可以进行 XSS 攻击。

[Term.utf8]
Name=UTF-8
Text='''Unicode 转换格式，8 位''' 是一种将 Unicode [[pt:serialization|序列化]] 为字节链的格式。于 1992 年在 Plan{{_}}9 操作系统中发明，以兼容现有的互联网软件。每个 [[pt:codepoint|码位]] 都使用以下序列之一书写：\n* 0xxx.xxxx\n* 110x.xxxx{{_}}10xx.xxxx\n* 1110.xxxx{{_}}10xx.xxxx{{_}}10xx.xxxx\n* 1111.0xxx{{_}}10xx.xxxx{{_}}10xx.xxxx{{_}}10xx.xxxx\n\nUTF-8 的特性：\n* 理论上可以用长达 6 字节的序列书写 20 亿个码位。由于 Unicode 对 [[pt:utf16|UTF-16]] 施加了限制，因此不存在超过 4 字节的序列。\n* 向后兼容：拉丁文本与 ASCII 文本无法区分。字节 00 和 7F 是 [[pt:control|控制字符]]，字节 FF 是不可能的，这提供了与程序接口、终端协议的兼容性。\n* 存在一种非标准的 UTF-8 格式，其中空字符编码为 C0{{_}}80，将其与字符串结尾 00 区分开来。\n* 自同步：如果你添加了任何错误的字节，其余文本仍然可读。使用旧版程序在正确的 UTF-8 中搜索也不会产生误报。\n* 可靠的检测：单字节编码（除非是纯 ASCII）或 UTF-16 中的有意义文本不可能与 UTF-8 混淆。\n* 单调性：按 UTF-8 字节排序与按字符代码排序相同。\n\nUTF-8 被广泛用作软件间交换的格式，包括大多数互联网格式和协议。[[pt:bom|字节顺序标记]] 是 EF{{_}}BB{{_}}BF。作为程序接口的格式，UTF-8 用于 Linux、OpenSSL 等跨平台库中。

[Term.utf16]
Name=UTF-16，代理对
Text='''Unicode 转换格式，16 位''' 是一种将 Unicode [[pt:serialization|序列化]] 为双字节机器字链的格式。\n\nUnicode 最初被认为是双字节编码，用双字节字符书写文本被称为 UCS-2。当时的进步语言和库，如 Java 和 Windows{{_}}NT，很快采用了双字节字符，这简化了文本处理。然而，很快人们就清楚两个字节不够用了，1996 年，作为折中方案，制定了用可变数量的双字节字进行编码的标准，并命名为 UTF-16。\n* 字符 0…D7FF 和 E000…FFFF 直接书写；\n* 字符 D800…DFFF 被禁止；\n* 字符 10000 及更大值作为 '''代理对''' 书写：\n: 1101.10yy.yyyy.yyyy{{_}}1101.11yy.yyyy.yyyy，其中 y=x−10000₁₆。\n\nUTF-16 的特性：\n* 对 Unicode 容量施加限制：2²⁰+2¹⁶−2¹¹= {{n|1112064}} 个字符。\n* 向后兼容：[[pt:bmp|基本平面]] 的文本与 UCS-2 无法区分。如果工作语言位于基本平面，且不处理其他平面的字符（保持原样或删除），双字节字符适合文本处理。\n* 自同步：如果你添加任何错误的 '''字'''（不是字节），其余文本仍然可读。在 UTF-16 中搜索，即使是单个字符，也不会产生误报。\n* 检测不可靠：如果没有 [[pt:bom|字节顺序标记]]，UTF-16 格式和字节顺序只能通过间接证据检测，例如统计或存在的代理对。著名的 [[pt:ascii|ASCII]] 字符串“Bush hid the facts”会破坏 Windows 对 UCS-2 的统计检测。\n* 非单调性：按 UTF-16 字排序与按字符代码排序不同。\n\n作为软件间交换的格式，UTF-16 主要用于源自 Windows 和 Mac/Motorola 的二进制文件（例如在 TrueType 字体中）。这些文件不需要字节顺序标记；在文本文件中，UTF-16BE 是 FE{{_}}FF，UTF-16LE 是 FF{{_}}FE。作为程序接口的格式，它用于 Windows、Java、JavaScript、Qt。

[Term.utf32]
Name=UTF-32
Text='''Unicode 转换格式，32 位''' 又名 '''UCS-4'''，是一种将 Unicode [[pt:serialization|序列化]] 为四字节机器字链的格式。字符代码只是一个接一个地书写。\n\nUTF-32 的特性：\n* 定长编码。这就是为什么它最适合复杂的文本处理。\n* 极其臃肿：在 [[pt:utf8|UTF-8]] 和 [[pt:utf16|UTF-16]] 中最大字符大小是 4 字节，而在 UTF-32 中所有字符都是四字节。\n* 通过 11 个最高有效位可靠检测，它们总是零。\n\nUTF-32 几乎从不作为软件间交换的格式使用，因为太臃肿。如果你需要—— [[pt:bom|字节顺序标记]] 对于 UTF-32BE 是 00{{_}}00{{_}}FE{{_}}FF，对于 UTF-32LE 是 FF{{_}}FE{{_}}00{{_}}00。作为程序接口的格式，UTF-32 用于新版本的类 Unix 操作系统，包括 MacOS。

[Term.virama]
Name=止音符
Text=Virama（梵语“停止”）是 [[pt:brahmic|婆罗米系]] 元音附标文字中的一个符号，意为“擦除固有元音”。例如，在 [[ps:Deva|天城文字]] 中：ka {{sm|क}} + {{sm|्}} = k {{sm|क्}} 。\n\n实际上在印度语言中，它的名字是 ''halant（印地语“杀手”）、halanta、hošonto、chandrakkala（[[ps:Mlym|马拉雅拉姆语文字]]“月亮”）。\n\n有些语言不经常使用止音符。例如：\n\n* 辅音连缀的 [[pt:ligature|连字]] ——天城文字 {{sm|क्ष}} кša。它们的书写和编码方式就像没有连字一样，是 ka+止音符+ša。要拆开连字并输入两个字母和止音符，应输入 ka+止音符+ZWNJ+ša；\n* 尾辅音的符号—— [[ps:Cham|占文字]]、[[ps:Limb|林布文字]]；\n* 固有元音缩减为无—— [[ps:Guru|旁遮普文]]。印度的许多语言，包括印地语，在词尾省略止音符；\n* 拼写改革去掉了固有元音—— [[ps:Laoo|老挝文字]]；\n* 止音符可能是字母的单一实体—— [[ps:Talu|西双版纳新傣文字]]；\n* 无法书写“额外”辅音—— [[ps:Bugi|布吉文字]]。\n\n大多数止音符是 [[pt:combining|组合符号]]。但有些是 [[pt:spacing|间距符号]]（[[ps:Java|爪哇文字]]）。\n\n有些文字（[[ps:Khar|佉卢文字]]、[[ps:Mtei|曼尼普尔文字]]）具有用于组装连字的“虚拟止音符”。有时（[[ps:Sund|巽他文字]]、[[ps:Cakm|查克马文字]]）甚至与可见的止音符一起出现。虚拟止音符看起来像一个十字，但在普通文本中将其显示为可见是一个错误。

[Term.winemoji]
Name=Windows 10/11 表情符号面板
Text=在 Windows{{_}}10/11 中，按 {{kb|Win|;}} 或 {{kb|Win|.}} 打开表情符号面板。可以输入：\n* 标准字体中存在的 [[pt:emoji|表情符号]]。当字体扩展时，面板也会扩展；\n* 文本笑脸；\n* 排版字符；\n* 带变音符号的拉丁文字；\n* 货币符号；\n* [[ps:Grek|希腊文字]]；\n* 箭头；\n* 上标、分数、数学运算符。

[Term.zwj]
Name=零宽连字
Text=[[pt:format|格式]] 字符 [[pu:200D]] 旨在将字符合并为 [[pt:ligature|连字]]。它是 [[pt:ignorable|默认可忽略的]]，即静默跳过它是完全安全的。\n\n''' [[pt:brahmic|婆罗米系]] 文字'''，例如 [[ps:Deva|天城文字]]：\n{{smtable|*क|ka +|**◌्| [[pt:virama|止音符]] +|*ष|ša =|*क्ष|kša}}\n{{smtable|*क|ka +|**◌्|止音符 + ZWJ +|*ष|ša =|*क्‍ष|替代 kša}}\n\n''' [[pt:emoji|表情符号]] '''\n: {{em|👩}} 女人 + ZWJ + {{em|✈️}} 飞机+VS16 = {{em|👩‍✈️}} 女飞行员\n\n还包括肤色、性别、移动方向等。这种方法开启了构建表情符号序列的另一种方式：厂商在未经任何人许可的情况下发明一个序列，如果它被证明是成功的，联盟就会对其进行编码。\n\n'''不要''' 使用 ZWJ：肤色、按键、国家和区域旗帜。

[Term.zwnj]
Name=零宽不连字
Text=[[pt:format|格式]] 字符 [[pu:200C]] 旨在打断 [[pt:ligature|连字]]。它是 [[pt:ignorable|默认可忽略的]]，即字体中不一定非要包含它。\n\n''' [[ps:Latn|拉丁文字]] '''\n: 在某些字体中 '''stop''' → '''ﬆop'''\n: '''dys''' + ZWNJ + '''topia''' = '''dys&zwnj;topia'''（前缀和词根之间无连字）\n\n''' [[pt:brahmic|婆罗米系]] 文字'''，例如 [[ps:Deva|天城文字]]\n{{smtable|*क|ka +|**◌्| [[pt:virama|止音符]] +|**ष|ša =|*क्ष|kša}}\n{{smtable|*क|ka +|**◌्|止音符 + ZWNJ +|*ष|ša =|*क्‌ष|替代 kša}}\n:::（通常用于复合词中）

