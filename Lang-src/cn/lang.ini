[OldComp.AmstradCpc]
Text=它设计得尽可能豪华，作为家用电脑，是继 ZX Spectrum 之后的第二款英国家用电脑。它不是连接到电视上，而是配备了显示器。

[OldComp.Apple2]
Text=尽管 Macintosh（1984年）已经出现，但朴素的 Apple{{_}}II 仍是苹果公司的主要收入来源。它配备了显示器（可能是因为短暂的法规规定——控制台会对附近的电视机造成大量干扰），但显示器是通过复合线连接的，就像电视一样（那些年复合输入很少见）。
Unenc=苹果 Logo

[OldComp.Aquarius]
Text=这台电脑从一开始就过时了，只生产了几个月。

[OldComp.Atari400]
Text=电视控制台会对附近的电视机造成大量干扰，这导致了关于射频硬件的新规定（后来这些规定被放宽了）。为了使电脑可以插入电视的天线插座，Atari 最终采用了铸铝外壳和内置的 ROM 卡。电脑的视频架构类似于控制台（滚动文本和硬件精灵），并且因其编程简便而受到称赞。

[OldComp.AtariSt]
Text=Atari 没有挺过 1983 年的视频游戏危机，并被卖给了 Commodore 的前创始人 Jack Tramiel。他们制造了继 Commodore Amiga 之后的第二台先进的家用电脑。它受到了音乐家的称赞，音乐编辑器“Cu 基底”和“Logic Pro”就源自 ST。
Unenc=Atari 标志，2×2 肖像

[OldComp.BbcMaster]
Text=由 Acorn 计算机创建，作为第二款教育电脑（继 BBC Micro 之后）。它拥有不错的图形操作系统，但这款电脑针对多个细分市场却未能成功打入任何一个。低价和电视支持导致其采用了 8 位处理器和非方形像素，科学模型因内存不足而被取消。\n\n后来的型号配备了第二个 Intel CPU，但与 IBM 的兼容性较差——尽管它可以运行一些重要的程序如 ''Turbo{{_}}C''，并且在增加内存扩展模块后甚至可以运行 ''WordPerfect''。

[OldComp.C64]
Text=Commodore 64，这台主要的美国家用电脑，采用了早期 Commodore PET 的编码。它将家用电脑的“多种颜色，低分辨率”的公式发挥到了极致：游戏的主要模式是 160×200，总共 16 种颜色，每 4×8 单元格 4 种颜色。相比之下：IBM CGA 有 320×200，4 种颜色且没有冲突单元格。这 16 种颜色非常暗淡，这使得游戏更加逼真。

[OldComp.CoCo]
Text=它与旧的 TRS-80 完全不兼容，是一台低成本的家用电脑。

[OldComp.Hp]
Name=HP 终端
Text=相当罕见，且不如 DEC 终端那么有名。

[OldComp.Ibm]
Text=到 20 世纪 80 年代末，这台电脑已成为“事实上的”标准：它在 1982 年被克隆，新型号越来越强大，同时保持了与旧软件的兼容性。游戏最初很匮乏，但 VGA（320×200，256 色，1987 年）和纯粹的 CPU 性能使得相当不错的游戏成为可能——而且，更重要的是，游戏多样化，不再受低内存或图形加速器功能的限制。\n\nIBM 的另一优势是出色的文本质量（在后续适配器中，每个单元格为 9×16，共 80×25 个单元格）以及易于本地化（完全通过软件进行）。\n\n多年来，它一直运行着过时的 DOS，直到Microsoft推出了Windows{{_}}95。像 Unix  或Windows{{_}}NT 这样的早期操作系统很少见。\n\n大多数现代通用计算机都是 IBM 兼容机的后代（DOS 兼容性最终在 2010 年代被打破）。只有便携式和专用系统使用其他架构。
SalesNote=（仅 IBM，到 1989 年连同克隆机约 6000 万台）
MemNote=（直到 1990 年）

[OldComp.Kaypro]
Text=这家公司找到了一个有趣的细分市场：他们制造了非常先进的 8 位电脑。1984 年，他们转向 IBM 兼容机，但为时已晚，到 1990 年他们破产了。

[OldComp.Korvet]
Name=Korvet
Text=这台电脑很有趣，图形也很好，但生产质量很差，而且 8 位 CPU 对它来说太弱了，只有少数滚动游戏。苏联解体后，为 Korvet 制作的机箱被重新用于更小的电脑。\n\n在 Korvet 最流畅的游戏“Rally”中，只有汽车是图形的，道路是用 [[pt:pseudographics|伪图形]] 制作的。

[OldComp.Mac]
Text=Mac 配备了鼠标和出色的操作系统，其编码没有受到 [[pt:pseudographics|伪图形]] 的困扰，因此受到了排版人员的称赞。大多数设计软件，包括“Adobe Photoshop”，都源自 Mac。但第一台彩色 Mac 直到 1987 年才出现。同一款 Mac 也变成了 32 位。\n\n系统字体中的 UI 符号位于非标准位置，「Unicodia」作者试图找到它们全部。
SalesNote=（直到 1990 年）
Unenc=苹果 Logo
MemNote=（经典的 Motorola 68000，直到 1994 年）

[OldComp.Minitel]
Text=终端是免费安装的，费用按使用分钟数收取（每分钟相当于 30 欧分）。该系统提供消息传递、约会、电话簿、游戏、票务预订等功能，以及更多。法国甚至在 2000 年美国之前就有了一个小型的“网络泡沫”！该系统直到 2012 年才关闭。

[OldComp.Msx]
Text=这是由索尼、飞利浦等公司制定的日本家用电脑的开放标准。著名的游戏“Bomberman”和“Metal Gear”最初就是为这些电脑制作的。苏联曾尝试将它们用作教育电脑，称为 KUVT Yamaha。

[OldComp.Ohio]
Text=这家公司销售早期的业余电脑，并于 1980 年被遇到财务困难的电信公司 M/A-COM 收购。

[OldComp.Oric]
Text=这是一台不成功的电脑，它在南斯拉夫（Nova 64）和保加利亚（Pravetz 8D）被克隆。

[OldComp.RiscOs]
Text=Acorn Archimedes、RISC PC 等电脑在专业领域（电视、音乐）中有限使用，直到运行 Windows{{_}}NT 和 Unix 的 IBM 兼容机将它们淘汰。

[OldComp.Robotron]
Text=它几乎从未卖给过客户，而是被用作教育电脑。

[OldComp.Smalltalk]
Text=该语言的早期版本有它们自己的特殊字符。

[OldComp.Spectrum]
Text=ZX Spectrum 是英国主要的家用电脑：它很便宜（<200英镑），并且游戏种类繁多。它没有图形加速，除了最简单的游戏外，所有游戏都非常慢。\n\n最有趣的故事发生在 20 世纪 80 年代末：来自东欧的 DIY 爱好者用离散逻辑门重建了图形芯片， Spectrum 克隆机在 xUSSR 短暂地成为主要的电脑，直到 Windows 和收入增加使得 [[po:Ibm|IBM 兼容机]] 更加普及。
MemNote=（早期的 16K 版本很少见，并且有转换为 48K 的套件）
SalesNote=（Sinclair 的原装产品）

[OldComp.SharpMz]
Text=它没有在 ROM 中预装编程语言，因此拥有多家竞争公司开发的多种语言。但用户必须从磁带或磁盘中加载它们。
Unenc=Pac-Man

[OldComp.Teletext]
Name=图文电视
YearNote=（首批电视机）
Text=图文电视在电视信号的消隐间隔中传输文字和 [[pt:pseudographics|伪图形]]。如今，大多数频道仅传输字幕。

[OldComp.Trs80]
Text=这款电脑是在 RadioShack（也就是 Tandy 旗下的电子连锁店）销售的。它天生就有很多毛病，从无线电干扰到运行不畅的磁带接口都是问题。后来的型号才改用软盘。

[OldComp.Zx80]
Text=Sinclair ZX80 和 ZX81 是最便宜的可用计算机。2 千字节版本的售价为 70 英镑。

[Brk]
Hard=这条规则非常 '''重要'''：必须以某种形式存在于每一个程序中。
Soft=这条规则是 '''软性''' 的：可以根据语言、上下文（如数学公式、网页链接等）或程序的目标受众进行移除或修改。
Brah=在某些婆罗米系文字中，文本可能像一堵密不透风的墙，字与字之间没有空格。这时你需要找到合适的位置进行换行——要么按音节，要么按词。但绝对不能把一个音节拆开。
See=参见 [[pt:linebreak|换行]]。
Scr=文字

[Brk.BK]
Name=重要 / 强制性中断
Text=这个字符会强制换行。但 CR+LF（0D+0A）被视为一次换行，而不是两次。

[Brk.CM]
Name=重要 / 控制字符与标记
Text=不要在 [[pt:control|控制]] 字符和 [[pt:combining|标记]] 之前换行。

[Brk.WJ]
Name=重要 / 词连接符
Text=不要在 [[pu:2060]] 词连接符的前面或后面换行。

[Brk.ZW]
Name=重要 / 零宽空格
Text=你可以在 [[pu:200B]] 零宽空格处换行。

[Brk.GL]
Name=重要 / 连接符
Text='''重要'''（强制性）规则：不要在 [[pu:00A0]] 不换行空格及相关字符后面换行。\n\n'''软性'''（可定制）规则：不要在这些字符前面换行。不过，你可以在空格和连字符后面换行。

[Brk.SP]
Name=重要 / 空格
Text=你可以在一连串 [[pu:0020]] 空格后面换行，除非有其他字符禁止这样做。

[Brk.ZWJ]
Name=重要 / 零宽连接符
Text=不要在 U+200D [[pt:zwj|零宽连接符]] 后面换行。\n\n你只能在 [[pu:0020]] 空格和零宽连接符之间换行。

[Brk.B2]
Name=换行 / 在前面和后面
Text=你可以在 [[pu:2014]] 长破折号的前面或后面换行，除非有其他字符禁止这样做。\n\n不要断开一连串的破折号，即使中间有空格也不行。

[Brk.BA]
Name=换行 / 在后面
Text=你可以在这些字符后面换行。

[Brk.BB]
Name=换行 / 在前面
Text=你可以在这些字符前面换行。这六个欧洲字符都来自词典。

[Brk.HY]
Name=换行 / 连字符（减号）
Text=[[pu:002D]] 连字符（减号）有多种用途：连字符、减号、数字分隔符。如果进一步分析显示它是连字符，那么你可以按照 [[pl:HH|连字符的]] 规则在它后面换行。

[Brk.HH]
Name=换行 / 明确连字符
Text=你可以在连字符后面换行。\n\n你不能在希伯来语文本的前面或后面换行，也不能在词首连字符（比如 -ing）的后面换行。\n\n有些语言（比如葡萄牙语）对连字符的断行有特殊规则：\n* disparate → dispara- / te\n* dispara-te → dispara- / -te

[Brk.CB]
Name=换行 / 条件
Text=你可以在 [[pu:FFFC]] 对象替换字符附近换行，也可以不换行，这取决于对象的类型。

[Brk.CL]
Name=禁止 / 结束标点
Text=不要在这些字符前面换行，即使前面有空格也不行。

[Brk.CP]
Name=禁止 / 闭合括号
Text=不要在这些字符前面换行，即使前面有空格也不行。\n\n不要在非中日韩（CJK）闭合括号与字母或数字之间换行。

[Brk.EX]
Name=禁止 / 感叹号和问号
Text=不要在这些字符前面换行，即使前面有空格也不行。

[Brk.IN]
Name=禁止 / 不可分割
Text=这些字符经常成串使用。不要断开这些字符串。

[Brk.NS]
Name=禁止 / 非起始
Text=这些字符不能作为一行的开头。不要在这些字符前面换行，即使前面有空格也不行。

[Brk.OP]
Name=禁止 / 开始标点
Text=不要在这些字符后面换行，即使后面有空格也不行。\n\n不要在字母或数字与非中日韩（CJK）开启标点之间换行。

[Brk.QU]
Name=禁止 / 引号
Text=引号根据上下文可以是开启的，也可以是闭合的。只有在中文、日文、韩文（CJK）的语境下，它们才可以在没有空格的情况下自行换行。

[Brk.IS]
Name=数字 / 中缀符号
Text=在数字中：它是数字的一部分，不要断开。\n\n在文字中：不要在这些字符前面换行，即使前面有空格也不行。

[Brk.NU]
Name=数字 / 位数
Text=不要拆分数字。不要将字母与数字分开。

[Brk.PO]
Name=数字 / 后缀符号
Text=不要在数字和这些字符之间换行。

[Brk.PR]
Name=数字 / 前缀符号
Text=不要在这些字符和数字之间换行。

[Brk.SY]
Name=数字 / 斜杠
Text=不要在斜杠（/）前面换行。\n\n在希伯来语的数字中，不要在斜杠后面换行。\n\n在其他地方，你可以在斜杠后面换行。但这会带来一个副作用：像“w/o”（without 的缩写）这样的缩写会被断开，而且软件只有在没有其他更合适的换行机会时，才被允许在这里换行。

[Brk.AK]
Name=婆罗米系文字 / 阿克沙拉（辅音）
Text=辅音是婆罗米系文字的核心。

[Brk.AP]
Name=婆罗米系文字 / 辅音前缀符号
Text=不要在这些字符和辅音之间换行。

[Brk.AS]
Name=婆罗米系文字 / 词首辅音
Text=这个字符标志着音节的开始。

[Brk.SA]
Name=婆罗米系文字 / 上下文相关形式
Text=需要类似于自动断字的复杂分析，才能决定是否可以在这里换行。

[Brk.VI]
Name=婆罗米系文字 / 止音符
Text=这个 [[pt:virama|止音符（virama）]] 可能位于音节内部。因此，不要在这个字符周围换行。

[Brk.VF]
Name=婆罗米系文字 / 词尾止音符
Text=这个[[pt:virama|止音符（virama）]]总是位于单词的末尾。不要在这个带有止音符的辅音前面换行。但是，在这个止音符后面换行是安全的。

[Brk.AI]
Name=中日韩文字 / 字母或表意文字
Text=在 [[pt:cjk|中日韩]] 文本中，你可以在此处换行，就像它是一个表意文字（汉字）一样。否则，它的行为就像一个字母。

[Brk.CJ]
Name=中日韩文字 / 日语条件起始符
Text=小假名（独立辅音），加上长音符号 [[pc:30FC]]。仅在特定语境下（例如在报纸中），你才可以在这些字符前面换行。

[Brk.ID]
Name=中日韩文字 / 表意文字
Text=你可以在表意文字（汉字）之间换行。\n\n你不能将表意文字与数字分开。\n\n一些非中日韩文字的字符也属于这一类。

[Brk.H2]
Name=谚文 / 初声+中声
Text=不要拆分 [[ps:Hang|韩语]] 音节。

[Brk.H3]
Name=谚文 / 初声+中声+终声

[Brk.JL]
Name=谚文 / 初声

[Brk.JV]
Name=谚文 / 中声

[Brk.JT]
Name=谚文 / 终声

[Brk.EB]
Name=表情符号 / 基础
Text=不要将表情符号与修饰符分开。

[Brk.EM]
Name=表情符号 / 修饰符

[Brk.RI]
Name=表情符号 / 区域指示符
Text=保持区域指示符成对出现。

[Brk.AL]
Name=字母 / 文字
Text=不要拆分单词。不要将字母与数字分开。\n\n那些开始使用空格的婆罗米系文字也属于这一类。

[Brk.HL]
Name=字母 / 希伯来文字
Text=不要拆分单词。不要将字母与数字分开。\n\n不要将“希伯来文字+连字符+非希伯来文字”的组合拆开。\n\n不要将“斜杠+希伯来文字”的组合拆开。
