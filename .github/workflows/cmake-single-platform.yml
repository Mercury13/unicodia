# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake on a single platform

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/**'
      - 'AutoBuilder/**'
      - 'Lang-src/**'
      - 'Libs/**'
      - 'MiscFiles/**'
      - 'Unicodia/**'
  pull_request:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6
    
    - name: Clone MbedTls
      run: |
        md ~MbedTls
        cd ~MbedTls
        git clone https://github.com/Mbed-TLS/mbedtls.git
        git submodule update --init
        cd ..

    - name: Build MbedTLls
      run: |
        cd ~MbedTls
        cmake .. -DCMAKE_BUILD_TYPE=Release
        cmake --parallel
        cmake --install

    - name: Setup Qt
      uses: jurplel/install-qt-action@v4.3.1
      with:
        version: 6.2.4
        arch: win64_mingw
        archives: qtbase qtsvg qttranslations

    - name: Build AutoBuilder
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: |
        cmake -G "MinGW Makefiles" -S ${{github.workspace}}/AutoBuilder -B ${{github.workspace}}/build-AB -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}
        cmake --build ${{github.workspace}}/build-AB --config ${{env.BUILD_TYPE}} --parallel

    - name: Copy AutoBuilder's artifacts
      run: python ${{github.workspace}}/.github/copy_ab.py ${{github.workspace}}/Unicodia/Uc

    - name: Configure CMake for Unicodia
      run: cmake -G "MinGW Makefiles" -S ${{github.workspace}}/Unicodia -B ${{github.workspace}}/build-UC -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build Unicodia
      run: cmake --build ${{github.workspace}}/build-UC --config ${{env.BUILD_TYPE}} --parallel

    - name: Deploy Unicodia
      run: python ${{github.workspace}}/.github/deploy_win.py ${{github.workspace}} ${{env.QT_ROOT_DIR}}

    - name: Archive build artifacts
      uses: actions/upload-artifact@v7
      with:
        name: 'Unicodia-w64'
        path: 'deploy-UC'
        retention-days: 7
        compression-level: 9
